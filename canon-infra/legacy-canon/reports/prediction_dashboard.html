<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N6 Prediction Tracker Dashboard</title>
<style>
  :root {
    --bg: #0e1117;
    --surface: #161b22;
    --surface2: #1c2129;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --blue: #58a6ff;
    --orange: #d18616;
    --purple: #bc8cff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    padding: 24px;
  }
  h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 4px; }
  .subtitle { color: var(--text-dim); font-size: 0.85rem; margin-bottom: 24px; }

  /* --- Summary Cards --- */
  .summary-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }
  .card-label { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; }
  .card-value { font-size: 1.75rem; font-weight: 700; margin-top: 4px; }
  .card-value.green  { color: var(--green); }
  .card-value.yellow { color: var(--yellow); }
  .card-value.red    { color: var(--red); }
  .card-value.blue   { color: var(--blue); }
  .card-value.accent { color: var(--accent); }

  /* --- Tier Bar Chart --- */
  .chart-section { margin-bottom: 24px; }
  .chart-section h2 { font-size: 1rem; margin-bottom: 12px; }
  .bar-chart { display: flex; flex-direction: column; gap: 8px; }
  .bar-row { display: flex; align-items: center; gap: 10px; }
  .bar-label { width: 80px; font-size: 0.8rem; color: var(--text-dim); text-align: right; flex-shrink: 0; }
  .bar-track { flex: 1; height: 28px; background: var(--surface); border-radius: 4px; overflow: hidden; position: relative; }
  .bar-fill { height: 100%; border-radius: 4px; display: flex; align-items: center; padding-left: 10px; font-size: 0.8rem; font-weight: 600; transition: width 0.5s ease; min-width: fit-content; }
  .bar-fill.tier1 { background: var(--green); color: #0e1117; }
  .bar-fill.tier2 { background: var(--blue); color: #0e1117; }
  .bar-fill.tier3 { background: var(--yellow); color: #0e1117; }
  .bar-fill.tier4 { background: var(--purple); color: #0e1117; }

  /* --- Status Distribution --- */
  .status-bar-container { margin-bottom: 24px; }
  .status-bar-container h2 { font-size: 1rem; margin-bottom: 10px; }
  .status-bar { display: flex; height: 32px; border-radius: 6px; overflow: hidden; }
  .status-segment { display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 600; transition: width 0.5s ease; }
  .status-segment.verified { background: var(--green); color: #0e1117; }
  .status-segment.preliminary { background: var(--yellow); color: #0e1117; }
  .status-segment.partially_verified { background: var(--orange); color: #0e1117; }
  .status-segment.todo { background: #484f58; color: var(--text); }
  .status-segment.in_progress { background: var(--blue); color: #0e1117; }
  .status-segment.falsified { background: var(--red); color: #fff; }
  .status-legend { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 8px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.78rem; color: var(--text-dim); }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; }

  /* --- Filters --- */
  .filters { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .filter-group { display: flex; gap: 4px; align-items: center; }
  .filter-group-label { font-size: 0.75rem; color: var(--text-dim); margin-right: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
  .filter-btn {
    padding: 5px 14px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: var(--surface);
    color: var(--text-dim);
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: var(--accent); color: #0e1117; border-color: var(--accent); font-weight: 600; }

  .search-box {
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
    color: var(--text);
    font-size: 0.85rem;
    width: 240px;
    outline: none;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--text-dim); }

  /* --- Table --- */
  .table-wrapper {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow-x: auto;
  }
  table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
  thead th {
    position: sticky; top: 0;
    background: var(--surface2);
    padding: 10px 12px;
    text-align: left;
    font-weight: 600;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  thead th:hover { color: var(--text); }
  thead th .sort-arrow { margin-left: 4px; font-size: 0.65rem; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:hover { background: var(--surface2); }
  tbody tr:last-child { border-bottom: none; }
  td { padding: 9px 12px; vertical-align: top; }
  td.id-col { font-family: 'SF Mono', 'Fira Code', monospace; font-weight: 600; white-space: nowrap; color: var(--accent); }
  td.name-col { max-width: 260px; }
  td.name-col .claim-preview { font-size: 0.75rem; color: var(--text-dim); margin-top: 2px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

  /* Status badges */
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 0.73rem;
    font-weight: 600;
    white-space: nowrap;
  }
  .badge-verified { background: rgba(63,185,80,0.15); color: var(--green); }
  .badge-preliminary { background: rgba(210,153,34,0.15); color: var(--yellow); }
  .badge-partially_verified { background: rgba(209,134,22,0.15); color: var(--orange); }
  .badge-todo { background: rgba(139,148,158,0.12); color: var(--text-dim); }
  .badge-in_progress { background: rgba(88,166,255,0.15); color: var(--blue); }
  .badge-falsified { background: rgba(248,81,73,0.15); color: var(--red); }

  .tier-badge {
    display: inline-block; padding: 1px 7px; border-radius: 4px; font-size: 0.75rem; font-weight: 700;
  }
  .tier-1 { background: rgba(63,185,80,0.15); color: var(--green); }
  .tier-2 { background: rgba(88,166,255,0.15); color: var(--blue); }
  .tier-3 { background: rgba(210,153,34,0.15); color: var(--yellow); }
  .tier-4 { background: rgba(188,140,255,0.15); color: var(--purple); }

  .grade-col { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.78rem; }
  .domain-tags { display: flex; flex-wrap: wrap; gap: 3px; }
  .domain-tag { font-size: 0.7rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 3px; padding: 1px 6px; white-space: nowrap; }
  .cost-col { font-size: 0.78rem; color: var(--text-dim); white-space: nowrap; }
  .confidence-col { font-size: 0.78rem; }

  .row-count { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 8px; }

  /* --- Detail Panel --- */
  .detail-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100;
  }
  .detail-overlay.open { display: flex; align-items: center; justify-content: center; }
  .detail-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    max-width: 680px; width: 90vw;
    max-height: 85vh; overflow-y: auto;
    position: relative;
  }
  .detail-panel h2 { font-size: 1.15rem; margin-bottom: 4px; }
  .detail-panel .detail-id { color: var(--accent); font-family: monospace; font-size: 0.9rem; margin-bottom: 12px; }
  .detail-panel .detail-row { margin-bottom: 10px; }
  .detail-panel .detail-label { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.04em; }
  .detail-panel .detail-val { margin-top: 2px; }
  .detail-close {
    position: absolute; top: 14px; right: 16px;
    background: none; border: none; color: var(--text-dim); font-size: 1.3rem; cursor: pointer;
  }
  .detail-close:hover { color: var(--text); }
  .harness-list { list-style: none; font-size: 0.82rem; font-family: monospace; }
  .harness-list li { padding: 2px 0; }
  .harness-list li::before { content: "$ "; color: var(--green); }

  /* --- Loading / Error --- */
  .loading { text-align: center; padding: 60px; color: var(--text-dim); }
  .error { text-align: center; padding: 60px; color: var(--red); }
  .error code { display: block; margin-top: 8px; font-size: 0.8rem; color: var(--text-dim); }
</style>
</head>
<body>

<h1>N6 Prediction Tracker</h1>
<p class="subtitle">ENG-P1-4 Dashboard &mdash; <span id="genDate"></span> &mdash; _catalog.json v<span id="catVersion"></span></p>

<div id="app">
  <div class="loading" id="loadingMsg">Loading _catalog.json ...</div>
</div>

<!-- Detail Overlay -->
<div class="detail-overlay" id="detailOverlay">
  <div class="detail-panel" id="detailPanel"></div>
</div>

<script>
(function() {
  'use strict';

  // ---- Data Loading ----
  const CATALOG_PATHS = [
    '../theory/predictions/_catalog.json',
    '../../theory/predictions/_catalog.json',
    './theory/predictions/_catalog.json',
    'theory/predictions/_catalog.json'
  ];

  async function loadCatalog() {
    let lastErr;
    for (const p of CATALOG_PATHS) {
      try {
        const r = await fetch(p);
        if (r.ok) return await r.json();
      } catch(e) { lastErr = e; }
    }
    throw new Error('Could not load _catalog.json from any path. Tried: ' + CATALOG_PATHS.join(', ') + (lastErr ? ' Last error: ' + lastErr.message : ''));
  }

  // ---- State ----
  let catalog = null;
  let predictions = [];
  let currentTierFilter = 'all';
  let currentStatusFilter = 'all';
  let searchQuery = '';
  let sortCol = 'id';
  let sortAsc = true;

  // ---- Init ----
  loadCatalog().then(data => {
    catalog = data;
    predictions = data.predictions || [];
    document.getElementById('genDate').textContent = data.generated || 'unknown';
    document.getElementById('catVersion').textContent = data.catalog_version || '?';
    render();
  }).catch(err => {
    document.getElementById('app').innerHTML =
      '<div class="error">Failed to load catalog<code>' + escHtml(err.message) + '</code>' +
      '<p style="margin-top:16px;color:var(--text-dim);font-size:0.85rem;">Tip: serve this directory with a local HTTP server, e.g.<br><code>python3 -m http.server 8000</code><br>then open http://localhost:8000/reports/prediction_dashboard.html</p></div>';
  });

  // ---- Render ----
  function render() {
    const app = document.getElementById('app');
    app.innerHTML = '';

    // Summary cards
    const statusCounts = countBy(predictions, p => p.current_status);
    const tierCounts = countBy(predictions, p => p.tier);
    const harnessCount = predictions.reduce((s,p) => s + (p.verification_harnesses||[]).length, 0);

    app.appendChild(htmlToEl(`
      <div class="summary-row">
        <div class="card"><div class="card-label">Total Predictions</div><div class="card-value accent">${predictions.length}</div></div>
        <div class="card"><div class="card-label">Verified</div><div class="card-value green">${statusCounts['verified']||0}</div></div>
        <div class="card"><div class="card-label">Preliminary</div><div class="card-value yellow">${statusCounts['preliminary']||0}</div></div>
        <div class="card"><div class="card-label">Partially Verified</div><div class="card-value yellow">${statusCounts['partially_verified']||0}</div></div>
        <div class="card"><div class="card-label">Todo</div><div class="card-value red">${statusCounts['todo']||0}</div></div>
        <div class="card"><div class="card-label">Verification Harnesses</div><div class="card-value accent">${harnessCount}</div></div>
      </div>
    `));

    // Tier distribution bar chart
    const maxTier = Math.max(...Object.values(tierCounts));
    const tierMeta = [
      { key: 1, label: 'Tier 1', desc: 'Today (1 GPU)', cls: 'tier1' },
      { key: 2, label: 'Tier 2', desc: 'Medium effort', cls: 'tier2' },
      { key: 3, label: 'Tier 3', desc: 'Specialized', cls: 'tier3' },
      { key: 4, label: 'Tier 4', desc: 'Industry scale', cls: 'tier4' },
    ];
    let barHtml = '<div class="chart-section"><h2>Tier Distribution</h2><div class="bar-chart">';
    for (const t of tierMeta) {
      const c = tierCounts[t.key] || 0;
      const pct = maxTier > 0 ? (c / maxTier * 100) : 0;
      barHtml += `<div class="bar-row">
        <div class="bar-label">${t.label}</div>
        <div class="bar-track"><div class="bar-fill ${t.cls}" style="width:${pct}%">${c}</div></div>
        <div style="width:120px;font-size:0.75rem;color:var(--text-dim)">${t.desc}</div>
      </div>`;
    }
    barHtml += '</div></div>';
    app.appendChild(htmlToEl(barHtml));

    // Status distribution stacked bar
    const statusOrder = ['verified','partially_verified','preliminary','in_progress','todo','falsified'];
    const statusLabels = { verified:'Verified', partially_verified:'Partially Verified', preliminary:'Preliminary', in_progress:'In Progress', todo:'Todo', falsified:'Falsified' };
    const statusColors = { verified:'var(--green)', partially_verified:'var(--orange)', preliminary:'var(--yellow)', in_progress:'var(--blue)', todo:'#484f58', falsified:'var(--red)' };
    let statusBarHtml = '<div class="status-bar-container"><h2>Status Distribution</h2><div class="status-bar">';
    for (const s of statusOrder) {
      const c = statusCounts[s] || 0;
      if (c === 0) continue;
      const pct = (c / predictions.length * 100);
      statusBarHtml += `<div class="status-segment ${s}" style="width:${pct}%" title="${statusLabels[s]||s}: ${c}">${pct > 5 ? c : ''}</div>`;
    }
    statusBarHtml += '</div><div class="status-legend">';
    for (const s of statusOrder) {
      const c = statusCounts[s] || 0;
      if (c === 0) continue;
      statusBarHtml += `<div class="legend-item"><div class="legend-dot" style="background:${statusColors[s]}"></div>${statusLabels[s]||s} (${c})</div>`;
    }
    statusBarHtml += '</div></div>';
    app.appendChild(htmlToEl(statusBarHtml));

    // Filters
    const filterDiv = htmlToEl(`<div class="filters" id="filtersArea">
      <div class="filter-group">
        <span class="filter-group-label">Tier</span>
        <button class="filter-btn ${currentTierFilter==='all'?'active':''}" data-tier="all">All</button>
        <button class="filter-btn ${currentTierFilter==='1'?'active':''}" data-tier="1">Tier 1</button>
        <button class="filter-btn ${currentTierFilter==='2'?'active':''}" data-tier="2">Tier 2</button>
        <button class="filter-btn ${currentTierFilter==='3'?'active':''}" data-tier="3">Tier 3</button>
        <button class="filter-btn ${currentTierFilter==='4'?'active':''}" data-tier="4">Tier 4</button>
      </div>
      <div class="filter-group">
        <span class="filter-group-label">Status</span>
        <button class="filter-btn ${currentStatusFilter==='all'?'active':''}" data-status="all">All</button>
        <button class="filter-btn ${currentStatusFilter==='verified'?'active':''}" data-status="verified">Verified</button>
        <button class="filter-btn ${currentStatusFilter==='preliminary'?'active':''}" data-status="preliminary">Preliminary</button>
        <button class="filter-btn ${currentStatusFilter==='todo'?'active':''}" data-status="todo">Todo</button>
      </div>
      <input type="text" class="search-box" placeholder="Search predictions..." id="searchInput" value="${escHtml(searchQuery)}">
    </div>`);
    app.appendChild(filterDiv);

    // Wire filter events
    filterDiv.querySelectorAll('[data-tier]').forEach(btn => {
      btn.addEventListener('click', () => { currentTierFilter = btn.dataset.tier; render(); });
    });
    filterDiv.querySelectorAll('[data-status]').forEach(btn => {
      btn.addEventListener('click', () => { currentStatusFilter = btn.dataset.status; render(); });
    });
    const searchInput = filterDiv.querySelector('#searchInput');
    searchInput.addEventListener('input', () => { searchQuery = searchInput.value; renderTable(); });

    // Table container
    const tableContainer = document.createElement('div');
    tableContainer.id = 'tableContainer';
    app.appendChild(tableContainer);
    renderTable();

    // Focus search if there was a query
    if (searchQuery) {
      const si = document.getElementById('searchInput');
      if (si) { si.focus(); si.setSelectionRange(si.value.length, si.value.length); }
    }
  }

  function renderTable() {
    const container = document.getElementById('tableContainer');
    if (!container) return;

    // Filter
    let filtered = predictions.filter(p => {
      if (currentTierFilter !== 'all' && String(p.tier) !== currentTierFilter) return false;
      if (currentStatusFilter !== 'all' && p.current_status !== currentStatusFilter) return false;
      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        const hay = [p.id, p.name, p.claim, p.grade, p.cost_estimate, ...(p.domain||[])].join(' ').toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });

    // Sort
    filtered.sort((a,b) => {
      let va = getSortVal(a, sortCol);
      let vb = getSortVal(b, sortCol);
      if (typeof va === 'string') { va = va.toLowerCase(); vb = vb.toLowerCase(); }
      let cmp = va < vb ? -1 : va > vb ? 1 : 0;
      return sortAsc ? cmp : -cmp;
    });

    container.innerHTML = '';
    container.appendChild(htmlToEl(`<div class="row-count">Showing ${filtered.length} of ${predictions.length} predictions</div>`));

    // Table
    const cols = [
      { key: 'id', label: 'ID' },
      { key: 'name', label: 'Name' },
      { key: 'tier', label: 'Tier' },
      { key: 'current_status', label: 'Status' },
      { key: 'grade', label: 'Grade' },
      { key: 'confidence', label: 'Conf.' },
      { key: 'cost_estimate', label: 'Cost' },
      { key: 'domain', label: 'Domain' },
    ];

    let html = '<div class="table-wrapper"><table><thead><tr>';
    for (const c of cols) {
      const arrow = sortCol === c.key ? (sortAsc ? ' &#9650;' : ' &#9660;') : '';
      html += `<th data-sort="${c.key}">${c.label}<span class="sort-arrow">${arrow}</span></th>`;
    }
    html += '</tr></thead><tbody>';
    for (const p of filtered) {
      html += `<tr data-pid="${escHtml(p.id)}" style="cursor:pointer">`;
      html += `<td class="id-col">${escHtml(p.id)}</td>`;
      html += `<td class="name-col">${escHtml(p.name)}<div class="claim-preview">${escHtml(p.claim||'')}</div></td>`;
      html += `<td><span class="tier-badge tier-${p.tier}">T${p.tier}</span></td>`;
      html += `<td><span class="badge badge-${p.current_status}">${statusDisplay(p.current_status)}</span></td>`;
      html += `<td class="grade-col">${escHtml(p.grade||'')}</td>`;
      html += `<td class="confidence-col">${escHtml(p.confidence||'')}</td>`;
      html += `<td class="cost-col">${escHtml(p.cost_estimate||'')}</td>`;
      html += `<td><div class="domain-tags">${(p.domain||[]).map(d=>'<span class="domain-tag">'+escHtml(d)+'</span>').join('')}</div></td>`;
      html += '</tr>';
    }
    if (filtered.length === 0) {
      html += `<tr><td colspan="${cols.length}" style="text-align:center;padding:32px;color:var(--text-dim)">No predictions match filters</td></tr>`;
    }
    html += '</tbody></table></div>';

    const tableEl = htmlToEl(html);
    container.appendChild(tableEl);

    // Sort headers
    tableEl.querySelectorAll('th[data-sort]').forEach(th => {
      th.addEventListener('click', () => {
        const col = th.dataset.sort;
        if (sortCol === col) { sortAsc = !sortAsc; } else { sortCol = col; sortAsc = true; }
        renderTable();
      });
    });

    // Row click -> detail
    tableEl.querySelectorAll('tr[data-pid]').forEach(tr => {
      tr.addEventListener('click', () => showDetail(tr.dataset.pid));
    });
  }

  // ---- Detail Panel ----
  function showDetail(pid) {
    const p = predictions.find(x => x.id === pid);
    if (!p) return;
    const panel = document.getElementById('detailPanel');
    const harnesses = (p.verification_harnesses||[]);
    const bts = (p.source_bt||[]);
    panel.innerHTML = `
      <button class="detail-close" id="detailCloseBtn">&times;</button>
      <div class="detail-id">${escHtml(p.id)}</div>
      <h2>${escHtml(p.name)}</h2>
      <div style="margin:12px 0">
        <span class="tier-badge tier-${p.tier}" style="margin-right:6px">Tier ${p.tier}</span>
        <span class="badge badge-${p.current_status}">${statusDisplay(p.current_status)}</span>
        <span style="margin-left:8px;font-family:monospace;font-size:0.85rem">${escHtml(p.grade||'')}</span>
      </div>
      <div class="detail-row"><div class="detail-label">Claim</div><div class="detail-val">${escHtml(p.claim||'')}</div></div>
      <div class="detail-row"><div class="detail-label">Falsification Criteria</div><div class="detail-val" style="color:var(--red)">${escHtml(p.falsification_criteria||'N/A')}</div></div>
      <div class="detail-row"><div class="detail-label">Cost Estimate</div><div class="detail-val">${escHtml(p.cost_estimate||'N/A')}</div></div>
      <div class="detail-row"><div class="detail-label">Confidence</div><div class="detail-val">${escHtml(p.confidence||'N/A')}</div></div>
      <div class="detail-row"><div class="detail-label">Domain</div><div class="detail-val"><div class="domain-tags">${(p.domain||[]).map(d=>'<span class="domain-tag">'+escHtml(d)+'</span>').join(' ')}</div></div></div>
      <div class="detail-row"><div class="detail-label">Source BTs</div><div class="detail-val" style="font-family:monospace;font-size:0.85rem">${bts.length ? bts.map(b=>escHtml(b)).join(', ') : 'None'}</div></div>
      <div class="detail-row"><div class="detail-label">Source File</div><div class="detail-val" style="font-family:monospace;font-size:0.82rem;color:var(--text-dim)">${escHtml(p.source_file||'')}</div></div>
      <div class="detail-row"><div class="detail-label">Verification Harnesses (${harnesses.length})</div>
        <div class="detail-val">${harnesses.length ? '<ul class="harness-list">' + harnesses.map(h=>'<li>'+escHtml(h)+'</li>').join('') + '</ul>' : '<span style="color:var(--text-dim)">None</span>'}</div>
      </div>
      ${(p.related_products||[]).length ? '<div class="detail-row"><div class="detail-label">Related Products</div><div class="detail-val">' + p.related_products.map(r=>escHtml(r)).join(', ') + '</div></div>' : ''}
    `;
    const overlay = document.getElementById('detailOverlay');
    overlay.classList.add('open');
    document.getElementById('detailCloseBtn').addEventListener('click', closeDetail);
    overlay.addEventListener('click', function handler(e) {
      if (e.target === overlay) { closeDetail(); overlay.removeEventListener('click', handler); }
    });
  }
  function closeDetail() { document.getElementById('detailOverlay').classList.remove('open'); }

  // ---- Helpers ----
  function countBy(arr, fn) {
    const m = {};
    for (const item of arr) { const k = fn(item); m[k] = (m[k]||0)+1; }
    return m;
  }
  function getSortVal(p, col) {
    if (col === 'id') {
      const m = p.id.match(/\d+/);
      return m ? parseInt(m[0],10) : p.id;
    }
    if (col === 'domain') return (p.domain||[]).join(',');
    return p[col] != null ? p[col] : '';
  }
  function statusDisplay(s) {
    return (s||'').replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase());
  }
  function escHtml(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function htmlToEl(html) {
    const t = document.createElement('template');
    t.innerHTML = html.trim();
    return t.content.firstChild;
  }
})();
</script>
</body>
</html>
