<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Orbitron:wght@400;700;900&display=swap');
:root {
  --bg: #0b0b10; --panel: #0e0e14; --card: #13131c;
  --border: #1e1e28; --cyan: #5a9ab5; --green: #5aaa7a;
  --magenta: #a05a80; --yellow: #b89a40; --orange: #a07040;
  --red: #a04848; --text: #9898a8; --dim: #484858;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'JetBrains Mono',monospace; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; overflow:hidden; }

/* ── Header ── */
.hdr { display:flex; align-items:center; justify-content:space-between; padding:10px 20px; border-bottom:1px solid var(--border); background:linear-gradient(180deg,#0e0e1c,var(--bg)); flex-shrink:0; }
.hdr h1 { font-family:'Orbitron',sans-serif; font-size:1em; font-weight:900; letter-spacing:.15em; color:#7090a8; }
.hdr-stats { display:flex; gap:20px; font-size:.7em; color:var(--dim); }
.hdr-stats b { color:var(--cyan); }

/* ── Controls ── */
.ctrl { display:flex; gap:8px; align-items:center; padding:8px 20px; border-bottom:1px solid var(--border); flex-shrink:0; background:var(--panel); }
.ctrl button { font-family:'JetBrains Mono',monospace; font-size:.7em; padding:5px 14px; border-radius:3px; cursor:pointer; border:1px solid var(--border); background:var(--card); color:var(--text); transition:all .15s; }
.ctrl button:hover { border-color:var(--cyan); color:var(--cyan); }
.ctrl button.active { border-color:var(--green); color:var(--green); background:rgba(0,255,136,.08); }
.ctrl button:disabled { opacity:.3; cursor:not-allowed; pointer-events:none; }
.ctrl button.running-pulse { animation:pulse .8s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
.ctrl button.danger { border-color:var(--red); color:var(--red); }
.ctrl button.danger:hover { background:rgba(255,34,68,.1); }
.ctrl .spacer { flex:1; }
.ctrl .status { font-size:.65em; color:var(--dim); }
.ctrl .status.running { color:var(--green); }
.ctrl .status.running::before { content:'● '; }

/* ── Charts 2x2 ── */
.grid { flex:1; display:grid; grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr; gap:1px; background:var(--border); min-height:0; }
.cell { background:var(--panel); display:flex; flex-direction:column; min-height:0; overflow:hidden; }
.cell-hdr { padding:8px 14px 4px; font-family:'Orbitron',sans-serif; font-size:.6em; font-weight:700; letter-spacing:.08em; color:var(--dim); display:flex; align-items:center; gap:8px; flex-shrink:0; }
.cell-hdr .dot { width:7px; height:7px; border-radius:50%; }
.cell-hdr .bt-mark { margin-left:auto; color:var(--yellow); font-size:1.1em; }
.cell canvas { flex:1; min-height:0; width:100%; }

/* ── Breakthroughs ── */
.bt-bar { flex-shrink:0; border-top:1px solid var(--border); background:rgba(255,200,0,.02); max-height:100px; overflow:hidden; }
.bt-bar-hdr { padding:5px 14px; font-family:'Orbitron',sans-serif; font-size:.55em; font-weight:700; letter-spacing:.12em; color:var(--yellow); border-bottom:1px solid rgba(255,200,0,.1); display:flex; align-items:center; gap:6px; }
.bt-bar-hdr::before { content:'★'; font-size:1.1em; }
.bt-bar-hdr span { margin-left:auto; color:var(--dim); font-weight:400; }
.bt-list { display:flex; gap:6px; padding:6px 14px; overflow-x:auto; }
.bt-card { flex-shrink:0; background:rgba(255,200,0,.04); border:1px solid rgba(255,200,0,.12); border-radius:3px; padding:6px 10px; min-width:180px; font-size:.65em; }
.bt-card .t { color:var(--dim); font-size:.9em; }
.bt-card .n { color:var(--yellow); font-weight:600; margin:2px 0; }
.bt-card .d { color:var(--dim); font-size:.85em; }

/* ── Log ── */
.log { flex-shrink:0; height:200px; border-top:2px solid var(--border); display:flex; flex-direction:column; background:var(--bg); }
.log-hdr { padding:5px 14px; font-family:'Orbitron',sans-serif; font-size:.55em; font-weight:700; letter-spacing:.12em; color:var(--dim); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; flex-shrink:0; }
.log-hdr b { color:var(--cyan); font-weight:600; }
.log-hdr span { margin-left:auto; color:#333; font-weight:400; }
.log-body { flex:1; overflow-y:auto; scrollbar-width:thin; scrollbar-color:#222 transparent; }
.le { display:flex; align-items:center; gap:8px; padding:3px 14px; font-size:.65em; border-bottom:1px solid rgba(255,255,255,.02); }
.le:hover { background:rgba(255,255,255,.015); }
.le.bt { background:rgba(255,200,0,.05); border-left:2px solid var(--yellow); }
.le .star { width:16px; text-align:center; color:var(--yellow); flex-shrink:0; }
.le .ts { color:var(--dim); width:65px; flex-shrink:0; }
.le .cn { font-weight:600; width:85px; flex-shrink:0; }
.le .vl { color:var(--green); width:45px; flex-shrink:0; }
.le .sr { color:var(--cyan); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
</style>

// ═══ Draw Charts (pure Canvas) ═══
function drawChart(canvasId, group) {
  const canvas = document.getElementById(canvasId);
  const rect = canvas.parentElement.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = rect.width * dpr;
  canvas.height = (rect.height - 30) * dpr;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = (rect.height - 30) + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const W = rect.width, H = rect.height - 30;
  const pad = {l:50, r:16, t:24, b:28};
  const pw = W - pad.l - pad.r, ph = H - pad.t - pad.b;

  ctx.clearRect(0,0,W,H);

  // Compute % of target for each dim at each snapshot
  const series = group.dims.map(dim =>
    G.map(g => Math.min((g[dim]||0) / (TGT[dim]||1) * 100, 250))
  );
  const maxY = Math.max(120, ...series.flat()) * 1.1;
  const n = G.length;

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,.04)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.t + ph * i / 4;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(pad.l + pw, y); ctx.stroke();
    ctx.fillStyle = '#444';
    ctx.font = '9px JetBrains Mono';
    ctx.textAlign = 'right';
    ctx.fillText(Math.round(maxY * (1 - i/4)) + '%', pad.l - 6, y + 3);
  }

  // 100% target line
  const y100 = pad.t + ph * (1 - 100/maxY);
  ctx.strokeStyle = 'rgba(255,255,255,.12)';
  ctx.setLineDash([6,4]);
  ctx.beginPath(); ctx.moveTo(pad.l, y100); ctx.lineTo(pad.l+pw, y100); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = 'rgba(255,255,255,.15)';
  ctx.font = '8px JetBrains Mono';
  ctx.textAlign = 'left';
  ctx.fillText('TARGET', pad.l + pw - 40, y100 - 4);

  // X labels
  ctx.fillStyle = '#555';
  ctx.font = '9px JetBrains Mono';
  ctx.textAlign = 'center';
  G.forEach((g, i) => {
    const x = pad.l + (i / (n-1)) * pw;
    const t = g.ts.split('T')[1];
    ctx.fillText(t, x, H - 6);
  });

  // Breakthrough markers
  BT.forEach(bt => {
    // Find nearest snapshot
    let best = 0, bestD = Infinity;
    G.forEach((g, i) => {
      const d = Math.abs(new Date(bt.t) - new Date(g.ts));
      if (d < bestD) { bestD = d; best = i; }
    });
    const x = pad.l + (best / (n-1)) * pw;
    ctx.strokeStyle = 'rgba(255,200,0,.4)';
    ctx.setLineDash([3,3]);
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(x, pad.t); ctx.lineTo(x, pad.t + ph); ctx.stroke();
    ctx.setLineDash([]);
    // Star
    ctx.fillStyle = '#ffc800';
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('★', x, pad.t - 2);
    ctx.font = '8px JetBrains Mono';
    ctx.fillText(bt.count + '', x, pad.t + 10);
  });

  // Lines + fill
  series.forEach((data, si) => {
    const col = group.colors[si];
    const pts = data.map((v, i) => ({
      x: pad.l + (i / (n-1)) * pw,
      y: pad.t + ph * (1 - v / maxY)
    }));

    // Fill
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pad.t + ph);
    pts.forEach(p => ctx.lineTo(p.x, p.y));
    ctx.lineTo(pts[pts.length-1].x, pad.t + ph);
    ctx.closePath();
    ctx.fillStyle = col + '10';
    ctx.fill();

    // Line
    ctx.beginPath();
    pts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
    ctx.strokeStyle = col;
    ctx.lineWidth = 2;
    ctx.stroke();

    // Points
    pts.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
      ctx.fillStyle = col;
      ctx.fill();
      ctx.strokeStyle = '#08080f';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    });
  });

  // Legend
  ctx.textAlign = 'left';
  let lx = pad.l + 4;
  group.dims.forEach((dim, i) => {
    ctx.fillStyle = group.colors[i];
    ctx.fillRect(lx, 4, 8, 8);
    ctx.fillStyle = '#888';
    ctx.font = '8px JetBrains Mono';
    const label = dim.replace('_',' ').substring(0,10);
    ctx.fillText(label, lx + 11, 12);
    lx += ctx.measureText(label).width + 22;
  });
}

// ═══ Breakthrough cards ═══
function renderBT() {
  const el = document.getElementById('bt-list');
  document.getElementById('bt-total').textContent = BT.length + ' total';
  if (!BT.length) { el.innerHTML = '<div style="padding:8px;color:#444;font-size:.7em">No breakthroughs</div>'; return; }
  el.innerHTML = BT.map(b => {
    const t = new Date(b.t);
    const ts = t.toLocaleString('ko-KR',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
    return '<div class="bt-card"><div class="t">' + ts + '</div><div class="n">★ ' + b.count + ' constants</div><div class="d">' + b.consts.slice(0,5).join(', ') + (b.consts.length>5?'...':'') + '</div><div class="d">' + b.src.substring(0,35) + '</div></div>';
  }).join('');

  // Badge marks on chart headers
  [0,1,2,3].forEach(i => {
    document.getElementById('bm'+i).textContent = BT.length > 0 ? '★'+BT.length : '';
  });
}

// ═══ Log ═══
function renderLog() {
  const el = document.getElementById('log-body');
  document.getElementById('log-n').textContent = D.length;
  const sorted = [...D].reverse();
  el.innerHTML = sorted.map(d => {
    const isBt = btSet.has(d.t);
    const t = new Date(d.t);
    const ts = t.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    const col = CMAP[d.c] || '#888';
    return '<div class="le' + (isBt?' bt':'') + '"><span class="star">' + (isBt?'★':'') + '</span><span class="ts">' + ts + '</span><span class="cn" style="color:' + col + '">' + d.c + '</span><span class="vl">' + d.v + '</span><span class="sr">' + d.s + '</span></div>';
  }).join('');
  el.scrollTop = 0;
}

// ═══ Control buttons ═══
let daemonRunning = false;

function setStatus(text, running) {
  const el = document.getElementById('daemon-status');
  el.textContent = text;
  el.className = 'status' + (running ? ' running' : '');
  daemonRunning = running;
  const btnStart = document.getElementById('btn-start');
  const btnStop = document.getElementById('btn-stop');
  const btnCycle = document.getElementById('btn-cycle');
  const btnDry = document.getElementById('btn-dry');
  if (running) {
    btnStart.disabled = true;
    btnStart.classList.add('running-pulse');
    btnStart.textContent = '● RUNNING';
    btnCycle.disabled = true;
    btnDry.disabled = true;
    btnStop.disabled = false;
  } else {
    btnStart.disabled = false;
    btnStart.classList.remove('running-pulse');
    btnStart.textContent = '▶ START';
    btnCycle.disabled = false;
    btnDry.disabled = false;
    btnStop.disabled = false;
  }
}

// Check if daemon is already running (PID file)
async function checkDaemon() {
  try {
    const r = await fetch('http://localhost:6600/status');
    if (r.ok) { setStatus('RUNNING — daemon detected', true); return; }
  } catch(e) {}
  // Fallback: just show idle
}

function startDaemon() {
  if (daemonRunning) return;
  setStatus('STARTING...', true);
  // Simulate start — in production, this calls the daemon API or shell
  setTimeout(() => setStatus('RUNNING — daemon active', true), 300);
}

function stopDaemon() {
  setStatus('STOPPING...', true);
  setTimeout(() => setStatus('STOPPED', false), 300);
}

function runOneCycle() {
  if (daemonRunning) return;
  setStatus('RUNNING — 1 cycle...', true);
  setTimeout(() => setStatus('IDLE — cycle complete', false), 3000);
}

function dryRun() {
  if (daemonRunning) return;
  setStatus('DRY-RUN — analyzing...', true);
  setTimeout(() => setStatus('IDLE — dry-run complete', false), 2000);
}

// ═══ Init ═══
function init() {
  checkDaemon();
  renderBT();
  renderLog();
  GROUPS.forEach((g, i) => drawChart('c' + i, g));
}

window.addEventListener('load', init);
window.addEventListener('resize', () => GROUPS.forEach((g, i) => drawChart('c' + i, g)));
</script>
