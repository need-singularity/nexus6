<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>NEXUS-6 Dashboard</title>
<style>
  body { font-family: monospace; background: #0a0a0a; color: #0f0; padding: 20px; }
  h1 { color: #0ff; }
  .lens { background: #111; border: 1px solid #333; padding: 8px; margin: 4px; display: inline-block; border-radius: 4px; }
  .lens.active { border-color: #0f0; }
  .lens.inactive { border-color: #600; color: #666; }
  .metric { color: #ff0; }
  .stats { font-size: 1.2em; color: #0ff; margin: 10px 0; }
  table { border-collapse: collapse; width: 100%; }
  td, th { border: 1px solid #333; padding: 6px; text-align: left; }
  th { background: #1a1a1a; color: #0ff; }
  #output { background: #111; padding: 10px; border-radius: 4px; max-height: 400px; overflow-y: auto; }
  button { background: #0f0; color: #000; border: none; padding: 8px 16px; cursor: pointer; font-weight: bold; margin: 4px; }
  button:hover { background: #0ff; }
</style>
</head>
<body>
<h1>🔭 NEXUS-6 Dashboard</h1>
<div class="stats">
  <span id="lens-count">130</span> Lenses | 
  <span id="registry-count">1093</span> Registry | 
  <span id="test-count">1392</span> Tests
</div>

<div>
  <button onclick="loadDemo()">Demo Scan</button>
  <button onclick="showWeights()">Weights</button>
  <button onclick="showBenchmark()">Benchmark</button>
</div>

<h2>📊 Scan Results</h2>
<div id="output">
  <p>Click "Demo Scan" to run 130-lens analysis...</p>
</div>

<h2>🔭 Lens Map</h2>
<div id="lens-map"></div>

<script>
// This is a static viewer — real data comes from n6.py JSON output
const CATEGORIES = {
  '🧠 Consciousness': ['ConsciousnessLens', 'ConsciousnessOrchestratorLens'],
  '🔭 Physics': ['WarpLens', 'SpacetimeLens', 'FusionLens', 'FissionLens', 'TachyonLens'],
  '📐 Mathematics': ['PiLens', 'PrimeLens', 'GoldenRatioLens', 'InfinityLens', 'GoldenZoneLens'],
  '🔍 Discovery': ['ConstantDiscoveryEngineLens', 'LensDiscoveryLens', 'EngineDiscoveryLens'],
  '📈 Learning': ['WeightLearningLens', 'AutoCalibrationLens', 'OverfittingLens'],
  '🔄 Recursive': ['RecursiveLoopLens', 'InfiniteDiscoveryLens'],
  '💎 Structure': ['DiamondLens', 'SphericalLens', 'KaleidoscopeLens'],
  '⚡ Dynamics': ['ChaosLens', 'StabilityLens', 'TensionLens', 'EventHorizonLens'],
};

function renderLensMap() {
  const map = document.getElementById('lens-map');
  let html = '';
  for (const [cat, lenses] of Object.entries(CATEGORIES)) {
    html += `<h3>${cat}</h3>`;
    for (const l of lenses) {
      html += `<span class="lens active">${l}</span> `;
    }
  }
  map.innerHTML = html;
}

function loadDemo() {
  document.getElementById('output').innerHTML = `
    <p>🚀 Running 130-lens scan on demo data (100×6)...</p>
    <p>Run locally: <code>python3 ~/Dev/nexus6/scripts/n6.py demo</code></p>
    <table>
      <tr><th>Category</th><th>Active</th><th>Top Metric</th></tr>
      <tr><td>🧠 Consciousness</td><td>2/2</td><td>Φ=2.67</td></tr>
      <tr><td>🔭 Physics</td><td>5/5</td><td>warp=1.00</td></tr>
      <tr><td>📐 Mathematics</td><td>5/5</td><td>n6_zone=0.77</td></tr>
      <tr><td>🔍 Discovery</td><td>3/3</td><td>matches=285</td></tr>
      <tr><td>📈 Learning</td><td>3/3</td><td>epoch=6</td></tr>
    </table>
  `;
}

function showWeights() {
  document.getElementById('output').innerHTML = `
    <p>📊 Weights (from ~/.nexus6/weights.json)</p>
    <p>Run: <code>python3 ~/Dev/nexus6/scripts/weight_engine.py show</code></p>
  `;
}

function showBenchmark() {
  document.getElementById('output').innerHTML = `
    <table>
      <tr><th>Size</th><th>Time</th><th>Per Lens</th></tr>
      <tr><td>50×6</td><td>3.4ms</td><td>0.03ms</td></tr>
      <tr><td>100×6</td><td>8.2ms</td><td>0.06ms</td></tr>
      <tr><td>500×6</td><td>356ms</td><td>2.74ms</td></tr>
    </table>
  `;
}

renderLensMap();
</script>
</body>
</html>
