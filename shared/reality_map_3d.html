<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8">
<title>n=6 Reality Map 3D (fetch · live)</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#07071a;color:#eee;font-family:'Segoe UI',sans-serif;overflow:hidden}
#stats{position:fixed;top:12px;left:50%;transform:translateX(-50%);background:rgba(10,10,30,.92);border:1px solid #334;border-radius:8px;padding:10px 24px;z-index:100;font-size:13px;display:flex;gap:18px;backdrop-filter:blur(6px)}
#stats b{color:#fff}
.exact{color:#4fc3f7}.close{color:#ffd54f}.miss{color:#ef5350}.total{color:#b0bec5}
#tooltip{position:fixed;display:none;background:rgba(10,10,30,.95);border:1px solid #556;border-radius:6px;padding:10px 14px;font-size:12px;max-width:380px;z-index:200;pointer-events:none;backdrop-filter:blur(8px);line-height:1.5}
.grade-tag{display:inline-block;padding:1px 8px;border-radius:3px;font-weight:bold;font-size:11px;margin-left:6px}
.grade-EXACT{background:#1565c0;color:#fff}.grade-CLOSE{background:#f9a825;color:#000}.grade-MISS{background:#c62828;color:#fff}
#legend{position:fixed;bottom:12px;left:12px;background:rgba(10,10,30,.9);border:1px solid #334;border-radius:8px;padding:10px 14px;font-size:12px;z-index:100;line-height:1.7;max-width:260px}
#legend .dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;vertical-align:middle}
#controls{position:fixed;top:12px;right:12px;background:rgba(10,10,30,.9);border:1px solid #334;border-radius:8px;padding:10px 14px;font-size:12px;z-index:100;line-height:1.9;min-width:200px}
#controls label{display:block;cursor:pointer;user-select:none}
#controls input[type=checkbox]{margin-right:6px;vertical-align:middle}
#controls .group{margin-top:6px;border-top:1px solid #223;padding-top:6px}
#status{position:fixed;left:12px;top:12px;background:rgba(10,10,30,.9);border:1px solid #334;border-radius:8px;padding:8px 12px;font-size:12px;z-index:100}
canvas{display:block}
</style></head><body>
<div id="status">loading…</div>
<div id="stats" style="display:none">
  <span class="total">Total <b id="s-total">0</b></span>
  <span class="exact">EXACT <b id="s-exact">0</b></span>
  <span class="close">CLOSE <b id="s-close">0</b></span>
  <span class="miss">MISS <b id="s-miss">0</b></span>
  <span class="total">|</span>
  <span class="exact">EXACT <b id="s-pct">0</b>%</span>
  <span class="total">v<b id="s-ver">?</b></span>
</div>
<div id="tooltip"></div>
<div id="controls">
  <b>Origin 필터</b>
  <label><input type="checkbox" id="f-natural" checked> <span style="color:#66ff99">natural</span></label>
  <label><input type="checkbox" id="f-engineering" checked> <span style="color:#ffaa55">engineering</span></label>
  <label><input type="checkbox" id="f-convention" checked> <span style="color:#aaaaaa">convention</span></label>
  <div class="group"><b>Grade 필터</b>
  <label><input type="checkbox" id="g-EXACT" checked> <span class="exact">EXACT</span></label>
  <label><input type="checkbox" id="g-CLOSE" checked> <span class="close">CLOSE</span></label>
  <label><input type="checkbox" id="g-MISS" checked> <span class="miss">MISS</span></label>
  </div>
  <div class="group"><b>Edges</b>
  <label><input type="checkbox" id="e-parent" checked> parent</label>
  <label><input type="checkbox" id="e-sibling" checked> sibling</label>
  <label><input type="checkbox" id="e-thread" checked> thread</label>
  </div>
  <div class="group"><b>색상 모드</b>
  <label><input type="radio" name="cmode" value="origin" checked> origin</label>
  <label><input type="radio" name="cmode" value="level"> level</label>
  <label><input type="radio" name="cmode" value="grade"> grade</label>
  </div>
</div>
<div id="legend">
  <b>축</b><br>X = level (L0→L6) · Y = grade(EXACT↑) · Z = origin<br>
  <b>Origin 색상</b><br>
  <span class="dot" style="background:#66ff99"></span>natural
  <span class="dot" style="background:#ffaa55;margin-left:6px"></span>engineering
  <span class="dot" style="background:#aaaaaa;margin-left:6px"></span>convention<br>
  <b>조작</b>: 좌클릭 회전 · 우클릭 이동 · 휠 줌
</div>
<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const LEVEL_ORDER=['L0_particle','L1_atom','L2_bond','L3_molecule','L4_genetic','L5_material','L5_bio','L6_geology','L6_meteorology','L6_economics','L6_linguistics','L6_music'];
const LEVEL_COLOR={L0_particle:0xef5350,L1_atom:0xff9800,L2_bond:0xffee58,L3_molecule:0x66bb6a,L4_genetic:0x42a5f5,L5_material:0xab47bc,L5_bio:0xec407a,L6_geology:0x8d6e63,L6_meteorology:0x29b6f6,L6_economics:0x9ccc65,L6_linguistics:0xba68c8,L6_music:0xffd54f};
const ORIGIN_COLOR={natural:0x66ff99,engineering:0xffaa55,convention:0xaaaaaa};
const GRADE_COLOR={EXACT:0x4fc3f7,CLOSE:0xffd54f,MISS:0xef5350};

const statusEl=document.getElementById('status');
const tooltipEl=document.getElementById('tooltip');

let scene,camera,renderer,controls,raycaster,mouse;
let nodeMeshes=[]; let edgeLines={parent:null,sibling:null,thread:null};
let DATA=null;

init();
loadData();

function init(){
  scene=new THREE.Scene();
  scene.background=new THREE.Color(0x07071a);
  scene.fog=new THREE.Fog(0x07071a,200,900);
  camera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,0.1,3000);
  camera.position.set(180,140,260);
  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth,innerHeight);
  renderer.setPixelRatio(devicePixelRatio);
  document.body.appendChild(renderer.domElement);
  controls=new OrbitControls(camera,renderer.domElement);
  controls.enableDamping=true;
  scene.add(new THREE.AmbientLight(0xffffff,0.7));
  const dl=new THREE.DirectionalLight(0xffffff,0.6); dl.position.set(1,2,1); scene.add(dl);
  // axes
  scene.add(new THREE.AxesHelper(80));
  raycaster=new THREE.Raycaster(); mouse=new THREE.Vector2();
  addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
  addEventListener('mousemove',onMove);
  // filter listeners
  document.querySelectorAll('#controls input').forEach(el=>el.addEventListener('change',rebuild));
  animate();
}

// LOCKED LIVE ENDPOINT: reality_map_live.json (n6 merge) → fallback reality_map.json
async function loadData(){
  let src='reality_map_live.json';
  try{
    let r=await fetch(src,{cache:'no-store'});
    if(!r.ok){ src='reality_map.json'; r=await fetch(src,{cache:'no-store'}); }
    if(!r.ok) throw new Error('HTTP '+r.status);
    DATA=await r.json();
    statusEl.style.display='none';
    document.getElementById('stats').style.display='flex';
    rebuild();
  }catch(e){
    statusEl.innerHTML='<b style="color:#ef5350">load failed</b>: '+e.message+'<br><span style="color:#888">reality_map_live.json or reality_map.json next to this html</span>';
  }
}
// 30초 주기 자동 폴링 — 라이브 endpoint (n6_map_live.hexa loop)과 쌍
setInterval(loadData, 30000);

function nodePos(n,idx,total){
  const li=Math.max(0,LEVEL_ORDER.indexOf(n.level));
  const x=(li-5.5)*28;
  const gradeY={EXACT:60,CLOSE:20,MISS:-20}[n.grade]||0;
  const originZ={natural:-60,engineering:60,convention:0}[n.origin]||0;
  // jitter via id hash to spread
  let h=0; const s=n.id||('n'+idx); for(let i=0;i<s.length;i++){h=(h*31+s.charCodeAt(i))|0;}
  const jx=((h&255)/255-0.5)*22;
  const jy=(((h>>8)&255)/255-0.5)*22;
  const jz=(((h>>16)&255)/255-0.5)*22;
  return [x+jx,gradeY+jy,originZ+jz];
}

function colorFor(n,mode){
  if(mode==='origin') return ORIGIN_COLOR[n.origin]||0xffffff;
  if(mode==='level')  return LEVEL_COLOR[n.level]||0xffffff;
  return GRADE_COLOR[n.grade]||0xffffff;
}

function rebuild(){
  if(!DATA) return;
  // wipe
  nodeMeshes.forEach(m=>{scene.remove(m);m.geometry.dispose();m.material.dispose();});
  nodeMeshes=[];
  for(const k of Object.keys(edgeLines)){ if(edgeLines[k]){scene.remove(edgeLines[k]);edgeLines[k].geometry.dispose();edgeLines[k].material.dispose();edgeLines[k]=null;} }

  const filt={
    natural:document.getElementById('f-natural').checked,
    engineering:document.getElementById('f-engineering').checked,
    convention:document.getElementById('f-convention').checked,
    EXACT:document.getElementById('g-EXACT').checked,
    CLOSE:document.getElementById('g-CLOSE').checked,
    MISS:document.getElementById('g-MISS').checked,
  };
  const cmode=document.querySelector('input[name=cmode]:checked').value;

  const nodes=DATA.nodes||[];
  const posMap={};
  const visible={};
  let cE=0,cC=0,cM=0;
  nodes.forEach((n,i)=>{
    const p=nodePos(n,i,nodes.length);
    posMap[n.id]=p;
    if(!filt[n.origin]) return;
    if(!filt[n.grade]) return;
    visible[n.id]=true;
    if(n.grade==='EXACT')cE++; else if(n.grade==='CLOSE')cC++; else if(n.grade==='MISS')cM++;
    const geom=new THREE.SphereGeometry(1.6,12,10);
    const mat=new THREE.MeshStandardMaterial({color:colorFor(n,cmode),emissive:colorFor(n,cmode),emissiveIntensity:0.35,roughness:0.5});
    const mesh=new THREE.Mesh(geom,mat);
    mesh.position.set(p[0],p[1],p[2]);
    mesh.userData=n;
    scene.add(mesh); nodeMeshes.push(mesh);
  });

  // edges
  function buildEdges(list,color,key,enabled){
    if(!enabled||!list) return;
    const pts=[];
    list.forEach(e=>{
      const a=e.from||e[0]||e.parent||e.src||e.source;
      const b=e.to  ||e[1]||e.child ||e.dst||e.target;
      if(!a||!b) return;
      if(!visible[a]||!visible[b]) return;
      const pa=posMap[a],pb=posMap[b]; if(!pa||!pb) return;
      pts.push(pa[0],pa[1],pa[2],pb[0],pb[1],pb[2]);
    });
    if(!pts.length) return;
    const g=new THREE.BufferGeometry();
    g.setAttribute('position',new THREE.Float32BufferAttribute(pts,3));
    const m=new THREE.LineBasicMaterial({color,transparent:true,opacity:0.45});
    const l=new THREE.LineSegments(g,m);
    scene.add(l); edgeLines[key]=l;
  }
  buildEdges(DATA.parent_edges,0xffffff,'parent',document.getElementById('e-parent').checked);
  buildEdges(DATA.sibling_edges,0x888888,'sibling',document.getElementById('e-sibling').checked);
  buildEdges(DATA.thread_edges,0x4fc3f7,'thread',document.getElementById('e-thread').checked);

  const total=cE+cC+cM;
  document.getElementById('s-total').textContent=total;
  document.getElementById('s-exact').textContent=cE;
  document.getElementById('s-close').textContent=cC;
  document.getElementById('s-miss').textContent=cM;
  document.getElementById('s-pct').textContent=total?((cE/total)*100).toFixed(1):'0';
  document.getElementById('s-ver').textContent=(DATA._meta&&DATA._meta.version)||DATA.version||'?';
}

function onMove(ev){
  mouse.x=(ev.clientX/innerWidth)*2-1;
  mouse.y=-(ev.clientY/innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObjects(nodeMeshes);
  if(hits.length){
    const n=hits[0].object.userData;
    tooltipEl.style.display='block';
    tooltipEl.style.left=(ev.clientX+14)+'px';
    tooltipEl.style.top=(ev.clientY+14)+'px';
    tooltipEl.innerHTML='<b>'+(n.id||'')+'</b><span class="grade-tag grade-'+n.grade+'">'+n.grade+'</span><br>'+
      '<span style="color:#aaa">'+(n.level||'')+' · '+(n.origin||'')+'</span><br>'+
      (n.claim||'')+'<br>'+
      '<span style="color:#888">measured:</span> '+(n.measured!==undefined?n.measured:'?')+' '+(n.unit||'')+'<br>'+
      '<span style="color:#888">n6:</span> '+(n.n6_expr||'?')+' = '+(n.n6_value!==undefined?n.n6_value:'?')+'<br>'+
      (n.cause?('<span style="color:#888">cause:</span> '+n.cause):'');
  } else {
    tooltipEl.style.display='none';
  }
}

function animate(){ requestAnimationFrame(animate); controls.update(); renderer.render(scene,camera); }
</script></body></html>
