<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>n=6 Reality Map 3D</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a1a; color: #eee; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
#stats {
  position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
  background: rgba(10,10,30,0.92); border: 1px solid #334; border-radius: 8px;
  padding: 10px 24px; z-index: 100; font-size: 14px; display: flex; gap: 20px;
  backdrop-filter: blur(6px);
}
#stats .exact { color: #4fc3f7; }
#stats .close { color: #ffd54f; }
#stats .miss  { color: #ef5350; }
#stats .total { color: #b0bec5; }
#tooltip {
  position: fixed; display: none; background: rgba(10,10,30,0.95);
  border: 1px solid #556; border-radius: 6px; padding: 10px 14px;
  font-size: 13px; max-width: 380px; z-index: 200; pointer-events: none;
  backdrop-filter: blur(8px); line-height: 1.5;
}
#tooltip .grade-tag {
  display: inline-block; padding: 1px 8px; border-radius: 3px;
  font-weight: bold; font-size: 11px; margin-left: 6px;
}
#tooltip .grade-EXACT { background: #1565c0; color: #fff; }
#tooltip .grade-CLOSE { background: #f9a825; color: #000; }
#tooltip .grade-MISS  { background: #c62828; color: #fff; }
#legend {
  position: fixed; bottom: 12px; left: 12px; background: rgba(10,10,30,0.9);
  border: 1px solid #334; border-radius: 8px; padding: 10px 14px;
  font-size: 12px; z-index: 100; line-height: 1.8;
}
#legend .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }
#axes-label {
  position: fixed; bottom: 12px; right: 12px; background: rgba(10,10,30,0.9);
  border: 1px solid #334; border-radius: 8px; padding: 10px 14px;
  font-size: 12px; z-index: 100; line-height: 1.6;
}
canvas { display: block; }
</style>
</head>

<div id="stats">

<div id="tooltip"></div>

  <span style="color:#888">--- sibling (gray)</span><br>
  <span style="color:#4fc3f7">--- thread (colored)</span>

<div id="axes-label">

</div>

// 3D positions: spread out
const SCALE_X = 120;
const SCALE_Y = 70;
const SCALE_Z = 50;
const OFFSET_X = 0;
const OFFSET_Y = 0;

DATA.nodes.forEach(n => {
  n.px = (n.x - 3) * SCALE_X;
  n.py = (n.y - 5) * SCALE_Y;
  n.pz = (n.z - 2) * SCALE_Z;
});

// Camera
let rotX = -0.3;
let rotY = 0.5;
let zoom = 1.0;
let panX = 0, panY = 0;

// Projection
function project(px, py, pz) {
  // Rotate Y
  let x1 = px * Math.cos(rotY) - pz * Math.sin(rotY);
  let z1 = px * Math.sin(rotY) + pz * Math.cos(rotY);
  let y1 = py;
  // Rotate X
  let y2 = y1 * Math.cos(rotX) - z1 * Math.sin(rotX);
  let z2 = y1 * Math.sin(rotX) + z1 * Math.cos(rotX);
  let x2 = x1;
  // Perspective
  let d = 800;
  let scale = d / (d + z2) * zoom;
  return {
    sx: W / 2 + x2 * scale + panX,
    sy: H / 2 + y2 * scale + panY,
    z: z2,
    scale: scale
  };
}

// Draw
function draw() {
  ctx.clearRect(0, 0, W, H);

  // Draw grid lines faintly
  ctx.globalAlpha = 0.06;
  ctx.strokeStyle = '#4488aa';
  ctx.lineWidth = 0.5;
  for (let lx = 0; lx < 7; lx++) {
    for (let ly = 0; ly < 11; ly++) {
      let a = project((lx - 3) * SCALE_X, (ly - 5) * SCALE_Y, -3 * SCALE_Z);
      let b = project((lx - 3) * SCALE_X, (ly - 5) * SCALE_Y, 5 * SCALE_Z);
      ctx.beginPath(); ctx.moveTo(a.sx, a.sy); ctx.lineTo(b.sx, b.sy); ctx.stroke();
    }
  }
  ctx.globalAlpha = 1;

  // Collect projected nodes
  let projected = DATA.nodes.map(n => {
    let p = project(n.px, n.py, n.pz);
    return { ...n, sx: p.sx, sy: p.sy, z: p.z, scale: p.scale };
  });

  // Sort by z (back to front)
  projected.sort((a, b) => b.z - a.z);

  // Draw thread edges first (behind everything)
  ctx.lineWidth = 0.8;
  DATA.thread_edges.forEach(e => {
    let a = nodeById[e[0]], b = nodeById[e[1]];
    if (!a || !b) return;
    let pa = project(a.px, a.py, a.pz);
    let pb = project(b.px, b.py, b.pz);
    ctx.globalAlpha = 0.15;
    ctx.strokeStyle = THREAD_COLORS[e[2]] || '#555';
    ctx.beginPath(); ctx.moveTo(pa.sx, pa.sy); ctx.lineTo(pb.sx, pb.sy); ctx.stroke();
  });

  // Draw parent edges
  ctx.lineWidth = 1.2;
  DATA.parent_edges.forEach(e => {
    let a = nodeById[e[0]], b = nodeById[e[1]];
    if (!a || !b) return;
    let pa = project(a.px, a.py, a.pz);
    let pb = project(b.px, b.py, b.pz);
    ctx.globalAlpha = 0.35;
    ctx.strokeStyle = '#ffffff';
    ctx.beginPath(); ctx.moveTo(pa.sx, pa.sy); ctx.lineTo(pb.sx, pb.sy); ctx.stroke();
  });

  // Draw sibling edges
  ctx.lineWidth = 0.8;
  DATA.sibling_edges.forEach(e => {
    let a = nodeById[e[0]], b = nodeById[e[1]];
    if (!a || !b) return;
    let pa = project(a.px, a.py, a.pz);
    let pb = project(b.px, b.py, b.pz);
    ctx.globalAlpha = 0.2;
    ctx.strokeStyle = '#888888';
    ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.moveTo(pa.sx, pa.sy); ctx.lineTo(pb.sx, pb.sy); ctx.stroke();
    ctx.setLineDash([]);
  });

  ctx.globalAlpha = 1;

  // Draw nodes
  projected.forEach(n => {
    let r = Math.max(3, 6 * n.scale);
    let color = LEVEL_COLORS[n.level] || '#888';
    let alpha = GRADE_ALPHA[n.grade] || 0.6;

    // Glow
    if (n.grade === 'EXACT') {
      ctx.globalAlpha = alpha * 0.2;
      ctx.fillStyle = color;
      ctx.beginPath(); ctx.arc(n.sx, n.sy, r * 2.5, 0, Math.PI * 2); ctx.fill();
    }

    // Node
    ctx.globalAlpha = alpha;
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.arc(n.sx, n.sy, r, 0, Math.PI * 2); ctx.fill();

    // Border for MISS
    if (n.grade === 'MISS') {
      ctx.strokeStyle = '#ef5350';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(n.sx, n.sy, r + 1, 0, Math.PI * 2); ctx.stroke();
    }

    // Store screen coords for hover
    n._r = r;
  });

  ctx.globalAlpha = 1;

  // Axis labels
  ctx.font = '11px monospace';
  ctx.fillStyle = '#667';
  const levelNames = ['L0\nParticle','L1\nAtom','L2\nBond','L3\nMolecule','L4\nGenetic','L5\nMaterial','L5\nBio'];
  for (let i = 0; i < 7; i++) {
    let p = project((i - 3) * SCALE_X, -6 * SCALE_Y, 0);
    ctx.fillText(levelNames[i].replace('\\n',' '), p.sx - 20, p.sy);
  }

  requestAnimationFrame(draw);
}

draw();

// Mouse interaction
let dragging = false, lastMX, lastMY, rightDrag = false;

canvas.addEventListener('mousedown', e => {
  if (e.button === 2) { rightDrag = true; } else { dragging = true; }
  lastMX = e.clientX; lastMY = e.clientY;
  e.preventDefault();
});

canvas.addEventListener('contextmenu', e => e.preventDefault());

window.addEventListener('mouseup', () => { dragging = false; rightDrag = false; });

window.addEventListener('mousemove', e => {
  if (dragging) {
    let dx = e.clientX - lastMX, dy = e.clientY - lastMY;
    rotY += dx * 0.005;
    rotX += dy * 0.005;
    lastMX = e.clientX; lastMY = e.clientY;
  }
  if (rightDrag) {
    panX += e.clientX - lastMX;
    panY += e.clientY - lastMY;
    lastMX = e.clientX; lastMY = e.clientY;
  }

  // Hover detection
  let mx = e.clientX, my = e.clientY;
  let hit = null, minDist = Infinity;
  DATA.nodes.forEach(n => {
    if (!n.sx) return;
    let p = project(n.px, n.py, n.pz);
    let dx = p.sx - mx, dy = p.sy - my;
    let dist = Math.sqrt(dx*dx + dy*dy);
    let r = Math.max(3, 6 * p.scale);
    if (dist < r + 4 && dist < minDist) { minDist = dist; hit = n; }
  });

  if (hit) {
    tooltip.style.display = 'block';
    tooltip.style.left = (mx + 16) + 'px';
    tooltip.style.top = (my - 10) + 'px';
    // Keep tooltip on screen
    if (mx + 400 > W) tooltip.style.left = (mx - 390) + 'px';
    if (my + 150 > H) tooltip.style.top = (my - 140) + 'px';

    let gradeClass = 'grade-' + hit.grade;
    tooltip.innerHTML =
      '<b>' + hit.claim + '</b>' +
      '<span class="grade-tag ' + gradeClass + '">' + hit.grade + '</span><br>' +
      '<span style="color:#aaa">measured:</span> ' + hit.measured + '<br>' +
      '<span style="color:#aaa">n6 expr:</span> <span style="color:#4fc3f7">' + hit.n6_expr + '</span><br>' +
      '<span style="color:#aaa">thread:</span> ' + hit.thread +
      ' &nbsp; <span style="color:#aaa">level:</span> ' + hit.level + '<br>' +
      '<span style="color:#888;font-size:11px">' + hit.source + '</span>';
  } else {
    tooltip.style.display = 'none';
  }
});

canvas.addEventListener('wheel', e => {
  zoom *= e.deltaY > 0 ? 0.93 : 1.07;
  zoom = Math.max(0.2, Math.min(5, zoom));
  e.preventDefault();
}, { passive: false });

// Touch support
let lastTouchDist = 0;
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    dragging = true;
    lastMX = e.touches[0].clientX;
    lastMY = e.touches[0].clientY;
  } else if (e.touches.length === 2) {
    let dx = e.touches[0].clientX - e.touches[1].clientX;
    let dy = e.touches[0].clientY - e.touches[1].clientY;
    lastTouchDist = Math.sqrt(dx*dx + dy*dy);
  }
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  if (e.touches.length === 1 && dragging) {
    let dx = e.touches[0].clientX - lastMX;
    let dy = e.touches[0].clientY - lastMY;
    rotY += dx * 0.005;
    rotX += dy * 0.005;
    lastMX = e.touches[0].clientX;
    lastMY = e.touches[0].clientY;
  } else if (e.touches.length === 2) {
    let dx = e.touches[0].clientX - e.touches[1].clientX;
    let dy = e.touches[0].clientY - e.touches[1].clientY;
    let dist = Math.sqrt(dx*dx + dy*dy);
    if (lastTouchDist > 0) {
      zoom *= dist / lastTouchDist;
      zoom = Math.max(0.2, Math.min(5, zoom));
    }
    lastTouchDist = dist;
  }
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchend', () => { dragging = false; lastTouchDist = 0; });
</script>
