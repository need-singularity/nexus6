# Sector classification keywords + value ranges
# Used by classify_sector_v2 in mk2

strong:
  keywords:
    - quark
    - color
    - gluon
    - QCD
    - asymptotic_freedom
    - confinement
    - baryon
  value_ranges:
    - [0.33, 0.34]  # d quark charge
    - [0.66, 0.67]  # u quark charge
  prime_set_preferred: [[2], [3], [2, 3]]

electroweak:
  keywords:
    - Weinberg
    - theta_W
    - "sin²θ_W"
    - Cabibbo
    - theta_C
    - W_boson
    - Z_boson
    - electroweak
    - CKM
    - Jarlskog
  value_ranges:
    - [0.20, 0.25]  # sin²θ_W, sin θ_C
  prime_set_required: [2, 3, 5, 7]

cosmology:
  keywords:
    - Omega_m
    - Omega_Lambda
    - Omega_b
    - Omega_DM
    - dark_energy
    - dark_matter
    - Hubble
    - H0
    - flatness
    - curvature
    - Planck_2018
  value_ranges:
    - [0.0, 1.0]
  prime_set_preferred:
    - [5, 7]      # Ω_Λ
    - [2, 3, 5]   # Ω_DM
    - [2, 3]      # meta FP

primordial:
  keywords:
    - BBN
    - nucleosynthesis
    - helium
    - deuterium
    - Y_p
    - eta_baryon
    - baryogenesis
    - CMB
    - inflation
    - recombination
  value_ranges:
    - [0.24, 0.26]  # Y_p
  prime_set_preferred: [[2, 3, 5, 13]]

particle_physics:
  keywords:
    - PDG
    - mass
    - lifetime
    - decay
    - lepton
    - meson
    - hadron
    - fermion
    - boson
  value_ranges: []
  prime_set_preferred: []

cosmology_compound:
  keywords:
    - horizon
    - sound_horizon
    - structure_formation
    - galaxy_cluster
  value_ranges: []
  prime_set_preferred: []
