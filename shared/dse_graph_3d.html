<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8">
<title>DSE Cross-Resonance 3D Graph</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#07071a;color:#eee;font-family:'Segoe UI',sans-serif;overflow:hidden}
#stats{position:fixed;top:12px;left:50%;transform:translateX(-50%);background:rgba(10,10,30,.92);border:1px solid #334;border-radius:8px;padding:10px 24px;z-index:100;font-size:13px;display:flex;gap:18px;backdrop-filter:blur(6px)}
#stats b{color:#fff}
.s-domain{color:#4fc3f7}.s-pair{color:#ffd54f}.s-high{color:#66ff99}.s-avg{color:#b0bec5}
#tooltip{position:fixed;display:none;background:rgba(10,10,30,.95);border:1px solid #556;border-radius:6px;padding:10px 14px;font-size:12px;max-width:380px;z-index:200;pointer-events:none;backdrop-filter:blur(8px);line-height:1.5}
#controls{position:fixed;top:12px;right:12px;background:rgba(10,10,30,.9);border:1px solid #334;border-radius:8px;padding:10px 14px;font-size:12px;z-index:100;line-height:1.9;min-width:220px}
#controls label{display:block;cursor:pointer;user-select:none}
#controls input[type=checkbox],#controls input[type=radio]{margin-right:6px;vertical-align:middle}
#controls .group{margin-top:6px;border-top:1px solid #223;padding-top:6px}
#controls input[type=range]{width:140px;vertical-align:middle}
#status{position:fixed;left:12px;top:12px;background:rgba(10,10,30,.9);border:1px solid #334;border-radius:8px;padding:8px 12px;font-size:12px;z-index:100}
#event-log{position:fixed;bottom:12px;right:12px;width:340px;max-height:200px;background:rgba(10,10,30,.92);border:1px solid #334;border-radius:8px;padding:8px;font-size:10px;z-index:100;overflow-y:auto;line-height:1.5;display:none}
canvas{display:block}
.label2d{color:#aac;font-size:10px;pointer-events:none;text-shadow:0 0 4px #000}
</style></head><body>
<div id="status">loading...</div>
<div id="stats" style="display:none">
  <span class="s-domain">Domains <b id="s-domains">0</b></span>
  <span class="s-pair">Pairs <b id="s-pairs">0</b></span>
  <span class="s-high">High-conf <b id="s-high">0</b></span>
  <span class="s-avg">Avg res <b id="s-avg">0</b></span>
</div>
<div id="tooltip"></div>
<div id="controls">
  <b>공명 임계값</b>
  <label><input type="range" id="thresh" min="0" max="1" step="0.01" value="0.3"> <span id="thresh-val">0.30</span></label>
  <div class="group"><b>색상 모드</b>
  <label><input type="radio" name="cmode" value="resonance" checked> resonance</label>
  <label><input type="radio" name="cmode" value="keywords"> keywords</label>
  <label><input type="radio" name="cmode" value="n6sim"> n6 sim</label>
  </div>
  <div class="group"><b>노드 크기</b>
  <label><input type="radio" name="nsize" value="uniform" checked> uniform</label>
  <label><input type="radio" name="nsize" value="connections"> connections</label>
  </div>
  <div class="group">
  <label><input type="checkbox" id="show-labels" checked> 라벨 표시</label>
  <label><input type="checkbox" id="show-joint"> Joint 결과 오버레이</label>
  </div>
</div>
<div id="event-log">
  <b style="color:#4fc3f7">📡 Growth Bus</b><hr style="border-color:#223;margin:4px 0">
  <div id="bus-events"></div>
</div>
<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

const statusEl=document.getElementById('status');
const tooltipEl=document.getElementById('tooltip');

let scene,camera,renderer,labelRenderer,controls,raycaster,mouse;
let nodeMeshes=[], edgeLines=null, jointLines=null, labelObjects=[];
let DSE_DATA=null, JOINT_DATA=null;
let domainMap={};  // domain -> {pos, connections, pairs}

init();
loadData();

function init(){
  scene=new THREE.Scene();
  scene.background=new THREE.Color(0x07071a);
  scene.fog=new THREE.Fog(0x07071a,300,1200);
  camera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,0.1,3000);
  camera.position.set(120,90,180);
  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth,innerHeight);
  renderer.setPixelRatio(devicePixelRatio);
  document.body.appendChild(renderer.domElement);
  labelRenderer=new CSS2DRenderer();
  labelRenderer.setSize(innerWidth,innerHeight);
  labelRenderer.domElement.style.position='absolute';
  labelRenderer.domElement.style.top='0';
  labelRenderer.domElement.style.pointerEvents='none';
  document.body.appendChild(labelRenderer.domElement);
  controls=new OrbitControls(camera,renderer.domElement);
  controls.enableDamping=true;
  scene.add(new THREE.AmbientLight(0xffffff,0.7));
  const dl=new THREE.DirectionalLight(0xffffff,0.6); dl.position.set(1,2,1); scene.add(dl);
  raycaster=new THREE.Raycaster(); mouse=new THREE.Vector2();
  addEventListener('resize',()=>{
    camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
    labelRenderer.setSize(innerWidth,innerHeight);
  });
  addEventListener('mousemove',onMove);
  document.querySelectorAll('#controls input').forEach(el=>el.addEventListener('change',rebuild));
  document.getElementById('thresh').addEventListener('input',function(){
    document.getElementById('thresh-val').textContent=parseFloat(this.value).toFixed(2);
    rebuild();
  });
  animate();
}

async function loadData(){
  try{
    const r=await fetch('dse_cross_results.json',{cache:'no-store'});
    if(!r.ok) throw new Error('HTTP '+r.status);
    DSE_DATA=await r.json();
    statusEl.style.display='none';
    document.getElementById('stats').style.display='flex';
    rebuild();
  }catch(e){
    statusEl.innerHTML='<b style="color:#ef5350">load failed</b>: '+e.message+'<br><span style="color:#888">dse_cross_results.json next to this html</span>';
  }
  // optional joint
  try{
    const r2=await fetch('dse_joint_results.json',{cache:'no-store'});
    if(r2.ok) JOINT_DATA=await r2.json();
  }catch(e){}
  loadGrowthBus();
}

setInterval(loadData,30000);

function rebuild(){
  if(!DSE_DATA) return;
  // cleanup
  nodeMeshes.forEach(m=>{scene.remove(m);m.geometry.dispose();m.material.dispose();});
  nodeMeshes=[];
  labelObjects.forEach(l=>scene.remove(l));
  labelObjects=[];
  if(edgeLines){scene.remove(edgeLines);edgeLines.geometry.dispose();edgeLines.material.dispose();edgeLines=null;}
  if(jointLines){scene.remove(jointLines);jointLines.geometry.dispose();jointLines.material.dispose();jointLines=null;}

  const thresh=parseFloat(document.getElementById('thresh').value);
  const cmode=document.querySelector('input[name=cmode]:checked').value;
  const nsize=document.querySelector('input[name=nsize]:checked').value;
  const showLabels=document.getElementById('show-labels').checked;
  const showJoint=document.getElementById('show-joint').checked;

  // collect domains from pairs
  const domains=new Set();
  const connCount={};
  const pairList=[];
  const allPairs=[...(DSE_DATA.top_pairs||[]),...(DSE_DATA.high_confidence||[])];
  // dedupe
  const seen=new Set();
  allPairs.forEach(p=>{
    const key=[p.a,p.b].sort().join('|');
    if(seen.has(key)) return;
    seen.add(key);
    const res=p.resonance||0;
    if(res<thresh) return;
    domains.add(p.a); domains.add(p.b);
    connCount[p.a]=(connCount[p.a]||0)+1;
    connCount[p.b]=(connCount[p.b]||0)+1;
    pairList.push(p);
  });
  // also add domains from domain_stats
  if(DSE_DATA.domain_stats){
    Object.keys(DSE_DATA.domain_stats).forEach(d=>domains.add(d));
  }

  // circular layout
  const domArr=[...domains].sort();
  domainMap={};
  const radius=80;
  domArr.forEach((d,i)=>{
    const ang=(i/domArr.length)*Math.PI*2;
    const x=Math.cos(ang)*radius;
    const z=Math.sin(ang)*radius;
    const y=(Math.sin(ang*3))*15; // slight vertical wave
    domainMap[d]={pos:[x,y,z], connections:connCount[d]||0, pairs:[]};
  });
  pairList.forEach(p=>{
    if(domainMap[p.a]) domainMap[p.a].pairs.push(p);
    if(domainMap[p.b]) domainMap[p.b].pairs.push(p);
  });

  // nodes
  domArr.forEach(d=>{
    const info=domainMap[d];
    const sz=nsize==='connections'?Math.max(1.5, Math.min(5, 1.5+info.connections*0.5)):2.2;
    const geom=new THREE.SphereGeometry(sz,14,12);
    const col=domainNodeColor(d,info);
    const mat=new THREE.MeshStandardMaterial({color:col,emissive:col,emissiveIntensity:0.4,roughness:0.4});
    const mesh=new THREE.Mesh(geom,mat);
    mesh.position.set(info.pos[0],info.pos[1],info.pos[2]);
    mesh.userData={domain:d,connections:info.connections,pairs:info.pairs};
    scene.add(mesh); nodeMeshes.push(mesh);

    if(showLabels){
      const div=document.createElement('div');
      div.className='label2d';
      div.textContent=d.length>18?d.slice(0,16)+'..':d;
      const lbl=new CSS2DObject(div);
      lbl.position.set(info.pos[0],info.pos[1]+sz+1.5,info.pos[2]);
      scene.add(lbl); labelObjects.push(lbl);
    }
  });

  // edges colored by resonance
  const pts=[], colors=[];
  pairList.forEach(p=>{
    const pa=domainMap[p.a], pb=domainMap[p.b];
    if(!pa||!pb) return;
    const c=resonanceColor(p, cmode);
    pts.push(pa.pos[0],pa.pos[1],pa.pos[2], pb.pos[0],pb.pos[1],pb.pos[2]);
    colors.push(c.r,c.g,c.b, c.r,c.g,c.b);
  });
  if(pts.length){
    const g=new THREE.BufferGeometry();
    g.setAttribute('position',new THREE.Float32BufferAttribute(pts,3));
    g.setAttribute('color',new THREE.Float32BufferAttribute(colors,3));
    const m=new THREE.LineBasicMaterial({vertexColors:true,transparent:true,opacity:0.6});
    edgeLines=new THREE.LineSegments(g,m);
    scene.add(edgeLines);
  }

  // joint overlay
  if(showJoint && JOINT_DATA && JOINT_DATA.results){
    const jpts=[];
    JOINT_DATA.results.forEach(r=>{
      const pa=domainMap[r.domain_a], pb=domainMap[r.domain_b];
      if(!pa||!pb) return;
      jpts.push(pa.pos[0],pa.pos[1],pa.pos[2], pb.pos[0],pb.pos[1],pb.pos[2]);
    });
    if(jpts.length){
      const g=new THREE.BufferGeometry();
      g.setAttribute('position',new THREE.Float32BufferAttribute(jpts,3));
      const m=new THREE.LineBasicMaterial({color:0x00ff88,transparent:true,opacity:0.25,linewidth:1});
      jointLines=new THREE.LineSegments(g,m);
      scene.add(jointLines);
    }
  }

  // stats
  const highConf=(DSE_DATA.high_confidence||[]).length;
  const avgRes=pairList.length? (pairList.reduce((s,p)=>s+(p.resonance||0),0)/pairList.length) : 0;
  document.getElementById('s-domains').textContent=domArr.length;
  document.getElementById('s-pairs').textContent=pairList.length;
  document.getElementById('s-high').textContent=highConf;
  document.getElementById('s-avg').textContent=avgRes.toFixed(3);
}

function domainNodeColor(d,info){
  const hue=(hashStr(d)%360)/360;
  const c=new THREE.Color(); c.setHSL(hue,0.7,0.55);
  return c.getHex();
}

function resonanceColor(pair, mode){
  let t=0;
  if(mode==='resonance') t=pair.resonance||0;
  else if(mode==='keywords') t=Math.min(1,(pair.kw_overlap||0)/5);
  else if(mode==='n6sim') t=pair.n6_sim||0;
  // blue(0) -> yellow(0.5) -> red(1)
  const c=new THREE.Color();
  if(t<0.5){
    c.setRGB(t*2, t*2, 1-t*2); // blue to yellow
  } else {
    c.setRGB(1, 1-(t-0.5)*2, 0); // yellow to red
  }
  return c;
}

function hashStr(s){
  let h=0; for(let i=0;i<s.length;i++){h=(h*31+s.charCodeAt(i))|0;} return Math.abs(h);
}

function onMove(ev){
  mouse.x=(ev.clientX/innerWidth)*2-1;
  mouse.y=-(ev.clientY/innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObjects(nodeMeshes);
  if(hits.length){
    const n=hits[0].object.userData;
    tooltipEl.style.display='block';
    tooltipEl.style.left=(ev.clientX+14)+'px';
    tooltipEl.style.top=(ev.clientY+14)+'px';
    const pairInfo=n.pairs.slice(0,5).map(p=>{
      const other=p.a===n.domain?p.b:p.a;
      return '<div style="color:#aaa;font-size:11px">'+other+' <span style="color:#4fc3f7">res:'+((p.resonance||0).toFixed(3))+'</span></div>';
    }).join('');
    tooltipEl.innerHTML='<b style="color:#4fc3f7">'+n.domain+'</b><br>'+
      '<span style="color:#888">connections:</span> '+n.connections+'<br>'+
      (pairInfo||'<span style="color:#555">no pairs above threshold</span>');
  } else {
    tooltipEl.style.display='none';
  }
}

function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene,camera);
  labelRenderer.render(scene,camera);
}

// ═══ GROWTH BUS ═══
async function loadGrowthBus(){
  try{
    const r=await fetch('growth_bus.jsonl',{cache:'no-store'});
    if(!r.ok) return;
    const text=await r.text();
    const lines=text.trim().split('\n').filter(l=>l).slice(-20).reverse();
    const el=document.getElementById('bus-events');
    el.innerHTML=lines.map(l=>{
      try{const e=JSON.parse(l);return '<div style="border-bottom:1px solid #1a1a2a;padding:2px 0"><span style="color:#555;font-size:9px">'+(e.ts||'')+'</span> '+(e.type||'?')+'</div>';}
      catch{return '';}
    }).join('');
    document.getElementById('event-log').style.display='block';
  }catch(e){}
}

</script></body></html>
