# =============================================================
# Compatibility Rules
# =============================================================

# Spatial audio requires neural codec or Opus codec
[[rule]]
type       = "require"
if_level   = 5
if_id      = "DolbyAtmos,Ambisonics,WaveFieldSynth"
then_level = 3
then_ids   = "EnCodec-N6,OpusN6,DiffusionAudio"

# Cochlear/BCI require advanced processor
[[rule]]
type       = "require"
if_level   = 6
if_id      = "Cochlear-N6,AuditoryBCI"
then_level = 3
then_ids   = "EnCodec-N6,OpusN6"

# Cinema audio requires spatial audio
[[rule]]
type       = "require"
if_level   = 4
if_id      = "Cinema"
then_level = 5
then_ids   = "DolbyAtmos,Ambisonics,WaveFieldSynth"

# Synesthetic-6 requires neural interface
[[rule]]
type       = "require"
if_level   = 7
if_id      = "Synesthetic6"
then_level = 6
then_ids   = "EEG-Haptic,Cochlear-N6,AuditoryBCI"
