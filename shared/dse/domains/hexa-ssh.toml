# =============================================================
# HEXA-SSH DSE Domain Definition
# n=6 based SSH/terminal remote shell architecture
# Levels: 전송 -> 암호 -> 세션 -> 터미널 -> UI
# Total raw combos: 6x6x6x6x6 = 7776 (pre-filter)
# Source: docs/software-design/hexa-ssh/goal.md
# =============================================================

[meta]
name = "hexa-ssh"
desc = "HEXA-SSH Remote Shell DSE (transport/crypto/session/terminal/ui)"

[scoring]
