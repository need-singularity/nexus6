# ============================================================
# Filter rules — incompatible combos
# ============================================================
[[rule]]
name = "3DES-deprecated"
forbid_any = ["3DES"]

[[rule]]
name = "no-mux-no-sessions"
require_all = ["NoMux"]
forbid_any = ["Mux-144", "Mux-72", "Mux-48", "Mux-24", "Mux-12"]
