# ============================================================
# Compatibility Rules
# ============================================================

# Mk.III DFD fusion pairs with D-T or D-³He
[[rule]]
type = "prefer"
if_level = 2
if_id = "DFD_Fusion"
then_level = 4
then_ids = "DT_Fuel,D_He3"

# Mk.IV antimatter pairs with antiproton
[[rule]]
type = "prefer"
if_level = 2
if_id = "AntimatterCat"
then_level = 4
then_ids = "Antiproton"

# Laser sail core pairs with photon beam
[[rule]]
type = "prefer"
if_level = 2
if_id = "LaserSail"
then_level = 4
then_ids = "PhotonBeam"

# Ion engine pairs with Xenon
[[rule]]
type = "prefer"
if_level = 2
if_id = "IonEngine"
then_level = 4
then_ids = "Xenon"

# NTP pairs with LH2 or chem
[[rule]]
type = "prefer"
if_level = 2
if_id = "NTP"
then_level = 4
then_ids = "Chem_LH2_LOX"

# Alcubierre pairs with metamaterial shell
[[rule]]
type = "prefer"
if_level = 2
if_id = "Alcubierre"
then_level = 5
then_ids = "Meta_Hull"

# DFD fusion cruise trajectory
[[rule]]
type = "prefer"
if_level = 2
if_id = "DFD_Fusion"
then_level = 7
then_ids = "PulsedFusion"

# Laser sail → relativistic
[[rule]]
type = "prefer"
if_level = 2
if_id = "LaserSail"
then_level = 7
then_ids = "Relativistic"

# Antimatter → relativistic
[[rule]]
type = "prefer"
if_level = 2
if_id = "AntimatterCat"
then_level = 7
then_ids = "Relativistic"

# Graphene material with CVD process
[[rule]]
type = "prefer"
if_level = 0
if_id = "Graphene"
then_level = 1
then_ids = "CVD,AtomAssembly"

# Metamaterial with atomic assembler
[[rule]]
type = "prefer"
if_level = 0
if_id = "Metamaterial"
then_level = 1
then_ids = "AtomAssembly"
