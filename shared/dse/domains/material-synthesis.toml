# =============================================================
# Compatibility Rules
# =============================================================

# Nanobot swarm only with Hybrid or AI/ML control
[[rule]]
type       = "require"
if_level   = 2
if_id      = "NanobotSwarm"
then_level = 3
then_ids   = "Hybrid,AI_ML"

# NanobotSwarm pairs with DistributedSwarm or SelfReplicating
[[rule]]
type       = "require"
if_level   = 2
if_id      = "NanobotSwarm"
then_level = 4
then_ids   = "DistributedSwarm,SelfReplicating"

# FIB only with SingleStation or ParallelArray (subtractive, slow)
[[rule]]
type       = "exclude"
if_level   = 2
if_id      = "FIB"
then_level = 4
then_ids   = "ConvergentAssembly,DistributedSwarm,SelfReplicating"

# Mechanosynthesis requires Quantum Sensing or Hybrid control
[[rule]]
type       = "require"
if_level   = 1
if_id      = "Mechanosynthesis"
then_level = 3
then_ids   = "QuantumSensing,Hybrid"

# SelfReplicating requires Hybrid control (safety-critical)
[[rule]]
type       = "require"
if_level   = 4
if_id      = "SelfReplicating"
then_level = 3
then_ids   = "Hybrid"

# Optical tweezer incompatible with ConvergentAssembly+ scale
[[rule]]
type       = "exclude"
if_level   = 2
if_id      = "OpticalTweezer"
then_level = 4
then_ids   = "DistributedSwarm,SelfReplicating"
