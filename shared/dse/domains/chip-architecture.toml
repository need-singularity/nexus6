# =============================================================
# Compatibility Rules
# =============================================================

# Diamond/Graphene materials require advanced process
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "Diamond"
then_level = 1
then_ids   = "TSMC_N2,Intel_18A,Samsung_2nm"

[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "Graphene"
then_level = 1
then_ids   = "TSMC_N2,Intel_18A,Samsung_2nm"

# RSFQ core requires Cryogenic DC
[[rule]]
type       = "require"
if_level   = 2
if_id      = "RSFQ_Core"
then_level = 4
then_ids   = "Cryo_DC"

# Photonic MAC pairs well with Photonic DC
[[rule]]
type       = "require"
if_level   = 2
if_id      = "Photonic_MAC"
then_level = 4
then_ids   = "Photonic_DC,AI_DC,Wafer_Scale"

# Wafer Scale system requires CoWoS or HBM packaging
[[rule]]
type       = "require"
if_level   = 4
if_id      = "Wafer_Scale"
then_level = 3
then_ids   = "HBM4_288,HBM5_576,3D_CoWoS"

# 2D FET only with CFET or 2D_FET process (research stage)
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "InGaAs"
then_level = 2
then_ids   = "RSFQ_Core"

# Edge cluster incompatible with Wafer Scale core
[[rule]]
type       = "exclude"
if_level   = 4
if_id      = "Edge_Cluster"
then_level = 2
then_ids   = "RSFQ_Core,Photonic_MAC"
