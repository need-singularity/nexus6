# =============================================================
# HEXA Chip Architecture DSE Domain Definition
# 궁극의 칩 아키텍처 — n=6 기반 소재→공정→코어→칩→시스템
# BT-28 (Computing ladder) + BT-37 (Pitch) + BT-55 (HBM) +
# BT-69 (Chiplet) + BT-90 (SM=phi*K6) + BT-93 (Carbon Z=6)
# Total raw combos: 6x6x6x5x6 = 6,480 (pre-filter)
# =============================================================

[meta]
name = "chip-architecture"
desc = "Ultimate Chip Architecture DSE (BT-28/37/55/69/90/93)"
levels = ["Material", "Process", "Core", "Chip", "System"]
vision = "n=6 arithmetic-aligned computing from material to wafer-scale"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

