# =============================================================
# Compatibility Rules
# =============================================================

# Hybrid driver requires Custom-IEM or Sealed-IEM acoustic
[[rule]]
type       = "require"
if_level   = 1
if_id      = "Hybrid-6+2"
then_level = 2
then_ids   = "Custom-IEM,Sealed-IEM"

# Neural-Feedback requires Health-Monitor AI engine
[[rule]]
type       = "require"
if_level   = 7
if_id      = "Neural-Feedback"
then_level = 6
then_ids   = "Health-Monitor"

# HEXA-Codec wireless requires any AI-Engine
[[rule]]
type       = "require"
if_level   = 4
if_id      = "HEXA-Codec"
then_level = 6
then_ids   = "HRTF-Personal,AutoEQ-N6,Health-Monitor,Spatial-Head-Track"

# Bone-Conduction excludes Sealed-IEM and Custom-IEM
[[rule]]
type       = "exclude"
if_level   = 1
if_id      = "Bone-Conduction"
then_level = 2
then_ids   = "Sealed-IEM,Custom-IEM"
