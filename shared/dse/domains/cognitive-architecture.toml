# =============================================================
# Cross-Domain Rules (교차 도메인 규칙)
# =============================================================

[[rule]]
type = "bonus"
condition = "level0.n6 >= 0.8 AND level2.n6 >= 0.8"
bonus = 0.10
reason = "Carbon Z=6 material + 6-layer cortical core synergy"

[[rule]]
type = "bonus"
condition = "level1.id == 'Memristor' AND level2.id == 'SixLayer_Column'"
bonus = 0.15
reason = "Memristive synapse (sigma=12 states) + n=6 cortical column = optimal pairing"

[[rule]]
type = "bonus"
condition = "level3.id == 'HEXA_COGNI' AND level4.id == 'MultiChip_Mesh'"
bonus = 0.10
reason = "HEXA-COGNI chip + sigma=12 mesh = full n=6 cognitive system"

[[rule]]
type = "penalty"
condition = "level0.id == 'GaAs' AND level4.id == 'Hybrid_Bio'"
penalty = -0.20
reason = "GaAs incompatible with bio-hybrid (toxicity, thermal)"

[[rule]]
type = "penalty"
condition = "level2.id == 'Reservoir' AND level3.id == 'HEXA_COGNI'"
penalty = -0.15
reason = "Reservoir computing lacks n=6 cortical structure required by HEXA-COGNI"

[[rule]]
type = "bonus"
condition = "level0.id == 'Carbon_Z6' AND level1.id == 'BioHybrid'"
bonus = 0.10
reason = "Carbon biocompatible interface + living neurons = seamless integration"
