# =============================================================
# HEXA-COGNI DSE Domain Definition
# Cognitive Architecture (인지공학)
# 핵심: 대뇌피질 n=6 층, 격자세포 n=6 육각, 뇌신경 σ=12 쌍
# 뇌엽 τ=4, 해마 CA τ=4, 주요 신경전달물질 n=6 종
# Total raw combos: 5x6x5x5x5 = 3,750 (pre-filter)
# =============================================================

[meta]
name = "cognitive-architecture"
desc = "Cognitive Architecture DSE (n=6 cortical layers, σ=12 cranial nerves, τ=4 lobes)"
levels = ["Neuron-Material", "Synapse-Process", "Cortical-Core", "Brain-Chip", "Cognitive-System"]
vision = "n=6 cortical architecture -- 6 layers × σ=12 connections × J₂=24 areas × τ=4 lobes"

[scoring]
n6   = 0.40
perf = 0.25
power = 0.20
cost  = 0.15

