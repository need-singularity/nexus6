# =============================================================
# Compatibility Rules
# =============================================================

# Li-Air requires Li Metal anode
[[rule]]
type       = "require"
if_level   = 0
if_id      = "LiAir"
then_level = 1
then_ids   = "Li_Metal"

# Li Metal / Pure Si anode requires SSE or SSB cell
[[rule]]
type       = "require"
if_level   = 1
if_id      = "Li_Metal"
then_level = 2
then_ids   = "SSB_Cell,Bipolar"

# SSE Garnet electrolyte pairs with SSB Cell
[[rule]]
type       = "require"
if_level   = 1
if_id      = "SSE_Garnet"
then_level = 2
then_ids   = "SSB_Cell"

# Li-S incompatible with standard Graphite anode
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "LiS"
then_level = 1
then_ids   = "Graphite_LiC6"

# 192S system needs advanced BMS
[[rule]]
type       = "require"
if_level   = 4
if_id      = "EV_192S"
then_level = 3
then_ids   = "BMS_AI,BMS_Integrated"

# Grid ESS needs standard or AI BMS (scale)
[[rule]]
type       = "exclude"
if_level   = 4
if_id      = "Grid_ESS"
then_level = 3
then_ids   = "BMS_Wireless"
