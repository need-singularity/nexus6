# ============================================================
# Compatibility Rules
# ============================================================

# In-wheel motors + Monocoque = n6 synergy bonus (structural integration)
[[rule]]
type = "bonus"
if_level = 2
if_id = "InWheel-4x288"
then_level = 3
then_id = "Monocoque-C6"
bonus_n6 = 0.05

# H2 Fuel Cell incompatible with Track Pure (refueling infrastructure)
[[rule]]
type = "exclude"
if_level = 2
if_id = "H2-FC-Hybrid"
then_level = 4
then_ids = ["Track-Pure", "Drift-Spec"]

# Ground Effect chassis requires Hyper Aero or Track Pure system
[[rule]]
type = "require"
if_level = 3
if_id = "Ground-Effect"
then_level = 4
then_ids = ["Track-Pure", "Hyper-Aero", "Street-Legal"]
