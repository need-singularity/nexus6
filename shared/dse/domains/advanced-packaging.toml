# =============================================================
# Advanced Packaging DSE Domain Definition
# 반도체 첨단 패키징 — 칩렛/인터포저/3D 적층
# n=6: 6층 적층=n, σ=12 μm 범프 피치, τ=4 본딩 방식
# Total raw combos: 6x6x6x6x6 = 7,776 (pre-filter)
# =============================================================

[meta]
name = "advanced-packaging"
description = "반도체 첨단 패키징 DSE — 칩렛/인터포저/3D 적층 아키텍처"
category = "semiconductor"

[n6]
# n=6 관련 상수 및 비율
stack_layers = 6          # n=6 적층 레이어
bump_pitch_um = 12        # σ=12 μm 마이크로 범프 피치
bonding_types = 4         # τ=4 본딩 방식 (TC, hybrid, fusion, adhesive)
interposer_channels = 24  # J₂=24 인터포저 채널
chiplet_count = 6         # n=6 칩렛 통합
tsv_diameter_um = 6       # n=6 μm TSV 직경
redistribution_layers = 12 # σ=12 RDL 재배선층

[status]
grade = "SEED"
