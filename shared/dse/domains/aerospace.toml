# ============================================================
# Rules: compatibility and preference constraints
# ============================================================

# YBCO requires SC-MHD or Compact Fusion (needs superconducting magnets)
[[rule]]
type = "prefer"
if_level = 0
if_id = "YBCO"
then_level = 1
then_ids = "SC_MHD,CompactFusion"

# YBCO pairs with cryogenic power (Compact Tokamak)
[[rule]]
type = "prefer"
if_level = 0
if_id = "YBCO"
then_level = 2
then_ids = "CompactTokamak,HybridFusionBatt"

# Scramjet is atmospheric-only, incompatible with Deep Space
[[rule]]
type = "exclude"
if_level = 1
if_id = "Scramjet"
then_level = 4
then_ids = "DeepSpace,SSTO"

# eVTOL requires Solid-State Battery (safety + weight for urban ops)
[[rule]]
type = "prefer"
if_level = 4
if_id = "eVTOL"
then_level = 2
then_ids = "SolidStateBattery,Supercapacitor"

# Quantum QPU requires cryogenic environment (YBCO material or Compact Tokamak)
[[rule]]
type = "prefer"
if_level = 3
if_id = "QuantumQPU"
then_level = 0
then_ids = "YBCO"

[[rule]]
type = "prefer"
if_level = 3
if_id = "QuantumQPU"
then_level = 2
then_ids = "CompactTokamak,HybridFusionBatt"

# Diamond material pairs with extreme environments
[[rule]]
type = "prefer"
if_level = 0
if_id = "Diamond"
then_level = 4
then_ids = "ExtremeEnv,AllDomain"

# Photonic propulsion best for Deep Space
[[rule]]
type = "prefer"
if_level = 1
if_id = "Photonic"
then_level = 4
then_ids = "DeepSpace"

# Photonic compute pairs with photonic propulsion and HEXA Solar
[[rule]]
type = "prefer"
if_level = 3
if_id = "PhotonicCompute"
then_level = 1
then_ids = "Photonic,HybridProp"

[[rule]]
type = "prefer"
if_level = 3
if_id = "PhotonicCompute"
then_level = 2
then_ids = "HEXASolar,HybridFusionBatt"

# Compact Fusion propulsion pairs with fusion power
[[rule]]
type = "prefer"
if_level = 1
if_id = "CompactFusion"
then_level = 2
then_ids = "CompactTokamak,DT_Direct,HybridFusionBatt"

# HEXA-1 GPU pairs with Hybrid Fusion+Battery for sustained compute
[[rule]]
type = "prefer"
if_level = 3
if_id = "HEXA1_GPU"
then_level = 2
then_ids = "HybridFusionBatt,CompactTokamak"

# Neuromorphic ideal for eVTOL (low power, fast reaction)
[[rule]]
type = "prefer"
if_level = 3
if_id = "Neuromorphic"
then_level = 4
then_ids = "eVTOL,Atmospheric"

# All-domain system prefers hybrid propulsion and hybrid compute
[[rule]]
type = "prefer"
if_level = 4
if_id = "AllDomain"
then_level = 1
then_ids = "HybridProp,SC_MHD"

[[rule]]
type = "prefer"
if_level = 4
if_id = "AllDomain"
then_level = 3
then_ids = "HybridCompute,HEXA1_GPU"

# Graphene pairs well with lightweight systems
[[rule]]
type = "prefer"
if_level = 0
if_id = "Graphene"
then_level = 4
then_ids = "eVTOL,Atmospheric,SSTO"

# Hall Ion engine best for Deep Space
[[rule]]
type = "prefer"
if_level = 1
if_id = "HallIon"
then_level = 4
then_ids = "DeepSpace"

# SSTO needs high-thrust propulsion (exclude low-thrust options)
[[rule]]
type = "exclude"
if_level = 4
if_id = "SSTO"
then_level = 1
then_ids = "HallIon,Photonic"

# Carbon Fiber best for atmospheric and SSTO (proven aerospace)
[[rule]]
type = "prefer"
if_level = 0
if_id = "CarbonFiber"
then_level = 4
then_ids = "Atmospheric,SSTO,eVTOL"

# Ti-6Al-4V for extreme environments and SSTO (heat resistance)
