# =============================================================
# Aerospace Transport DSE Domain Definition
# 항공우주 수송 시스템 — 도심항공/극초음속/궤도 수송
# n=6: SE(3)=6 DOF, σ=12 km/s 궤도 속도, Mach 6=n 극초음속
# Total raw combos: 6x6x6x6x6 = 7,776 (pre-filter)
# =============================================================

[meta]
name = "aerospace-transport"
description = "항공우주 수송 DSE — 도심항공(eVTOL)/극초음속/궤도 수송 아키텍처"
category = "aerospace"

[n6]
# n=6 관련 상수 및 비율
dof = 6                    # SE(3)=n=6 자유도
hypersonic_mach = 6        # Mach 6=n 극초음속 설계점
orbital_velocity_kms = 12  # σ=12 km/s 궤도 투입 속도
rotor_count = 6            # n=6 로터 (eVTOL)
redundant_systems = 4      # τ=4 다중 안전 계통
subsystem_modules = 24     # J₂=24 서브시스템
payload_capacity_t = 6     # n=6 톤 페이로드
engine_clusters = 6        # n=6 엔진 클러스터

[status]
grade = "SEED"
