<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Growth Bus Dashboard</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{min-height:100vh;background:#07071a;color:#e0e0e0;font-family:'Segoe UI',system-ui,sans-serif}

/* Header */
header{padding:16px 24px;background:rgba(7,7,26,.95);border-bottom:1px solid #223;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:10}
header h1{font-size:17px;font-weight:600;color:#8bf;white-space:nowrap}
header .stats{margin-left:auto;font-size:12px;color:#666}
header .refresh-btn{padding:4px 12px;border:1px solid #334;border-radius:4px;background:transparent;color:#aaa;cursor:pointer;font-size:12px;transition:.2s}
header .refresh-btn:hover{background:rgba(255,255,255,.08);color:#fff}

/* Grid */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:20px 24px;max-width:1400px;margin:0 auto}
@media(max-width:900px){.grid{grid-template-columns:1fr}}

.card{background:rgba(10,10,30,.94);border:1px solid #223;border-radius:8px;padding:16px;min-height:320px}
.card h2{font-size:14px;color:#adf;margin-bottom:12px;font-weight:500}
.card.wide{grid-column:1/-1}

/* KPI row */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;padding:0 24px 8px;max-width:1400px;margin:0 auto}
.kpi{background:rgba(10,10,30,.94);border:1px solid #223;border-radius:8px;padding:14px 16px;text-align:center}
.kpi .value{font-size:28px;font-weight:700;color:#8bf}
.kpi .label{font-size:11px;color:#666;margin-top:4px}

/* Loading */
#loading{display:flex;align-items:center;justify-content:center;height:60vh;font-size:18px;color:#668}

/* Table */
.event-table{width:100%;border-collapse:collapse;font-size:12px}
.event-table th{text-align:left;padding:6px 8px;color:#888;border-bottom:1px solid #334;font-weight:500}
.event-table td{padding:5px 8px;border-bottom:1px solid #1a1a2e;color:#ccc}
.event-table tr:hover td{background:rgba(255,255,255,.03)}
.event-table .domain-tag{display:inline-block;padding:1px 8px;border-radius:10px;font-size:10px}
</style>
</head>
<body>

<div id="loading">Loading growth_bus.jsonl...</div>

<header style="display:none" id="header">
  <h1>Growth Bus Dashboard</h1>
  <span class="stats" id="header-stats"></span>
  <button class="refresh-btn" onclick="loadData()">Reload</button>
</header>

<div id="content" style="display:none">
  <div class="kpi-row" id="kpis"></div>

  <div class="grid">
    <div class="card wide">
      <h2>Discovery Rate Over Time (events per minute)</h2>
      <canvas id="rateChart"></canvas>
    </div>

    <div class="card">
      <h2>Domain Distribution</h2>
      <canvas id="domainChart"></canvas>
    </div>

    <div class="card">
      <h2>Event Type Distribution</h2>
      <canvas id="typeChart"></canvas>
    </div>

    <div class="card">
      <h2>Hourly Activity Heatmap</h2>
      <canvas id="hourlyChart"></canvas>
    </div>

    <div class="card">
      <h2>Grade Distribution</h2>
      <canvas id="gradeChart"></canvas>
    </div>

    <div class="card wide">
      <h2>Recent Events</h2>
      <div style="max-height:300px;overflow-y:auto">
        <table class="event-table" id="eventsTable">
          <thead><tr><th>Time</th><th>Domain</th><th>Type</th><th>Event</th><th>ID</th><th>Value</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
// ── Color palette (matches 3D map dark theme) ──
const DOMAIN_COLORS = {
  nexus:            '#8888ff',
  airgenome:        '#44ff88',
  anima:            '#cc66ff',
  'n6-architecture':'#44bbff',
  void:             '#ff6666',
  _default:         '#ffaa44'
};

const TYPE_COLORS = {
  tick:              '#555577',
  anomaly_observed:  '#ff6666',
  offload:           '#44ff88',
  gpu_idle_forge:    '#ffaa44',
  _default:          '#8888ff'
};

function domainColor(d) { return DOMAIN_COLORS[d] || DOMAIN_COLORS._default; }
function typeColor(t)   { return TYPE_COLORS[t]   || TYPE_COLORS._default; }

let allEvents = [];
let rateChart, domainChart, typeChart, hourlyChart, gradeChart;

// ── Load JSONL ──
async function loadData() {
  try {
    const resp = await fetch('growth_bus.jsonl');
    if (!resp.ok) {
      // try relative from shared/discovery/
      const resp2 = await fetch('../discovery/growth_bus.jsonl');
      if (!resp2.ok) throw new Error('growth_bus.jsonl not found');
      return processText(await resp2.text());
    }
    return processText(await resp.text());
  } catch (e) {
    document.getElementById('loading').textContent = 'Error: ' + e.message;
  }
}

function processText(text) {
  allEvents = [];
  for (const line of text.split('\n')) {
    const trimmed = line.trim();
    if (!trimmed) continue;
    try {
      const obj = JSON.parse(trimmed);
      if (obj.ts) allEvents.push(obj);
    } catch(e) { /* skip malformed */ }
  }
  allEvents.sort((a, b) => (a.ts || '').localeCompare(b.ts || ''));

  document.getElementById('loading').style.display = 'none';
  document.getElementById('header').style.display = '';
  document.getElementById('content').style.display = '';

  renderKPIs();
  renderRateChart();
  renderDomainChart();
  renderTypeChart();
  renderHourlyChart();
  renderGradeChart();
  renderEventsTable();
}

// ── KPIs ──
function renderKPIs() {
  const domains = new Set(allEvents.map(e => e.domain).filter(Boolean));
  const types   = new Set(allEvents.map(e => e.type).filter(Boolean));

  // time span
  const firstTs = allEvents[0]?.ts || '';
  const lastTs  = allEvents[allEvents.length - 1]?.ts || '';
  const spanMs  = new Date(lastTs) - new Date(firstTs);
  const spanMin = Math.max(1, spanMs / 60000);
  const rate    = (allEvents.length / spanMin).toFixed(1);

  // non-tick events (actual discoveries/anomalies)
  const nonTick = allEvents.filter(e => e.type !== 'tick').length;

  const kpis = [
    { value: allEvents.length.toLocaleString(), label: 'Total Events' },
    { value: nonTick.toLocaleString(), label: 'Non-tick Events' },
    { value: domains.size, label: 'Active Domains' },
    { value: types.size, label: 'Event Types' },
    { value: rate + '/min', label: 'Event Rate' },
    { value: Math.round(spanMin) + 'm', label: 'Time Span' }
  ];

  const el = document.getElementById('kpis');
  el.innerHTML = kpis.map(k =>
    `<div class="kpi"><div class="value">${k.value}</div><div class="label">${k.label}</div></div>`
  ).join('');

  document.getElementById('header-stats').textContent =
    `${allEvents.length} events | ${firstTs.slice(0,16)} ~ ${lastTs.slice(11,16)}`;
}

// ── Chart.js defaults ──
Chart.defaults.color = '#888';
Chart.defaults.borderColor = '#223';
Chart.defaults.font.family = "'Segoe UI',system-ui,sans-serif";

// ── Rate Chart (events per minute, 1-min buckets) ──
function renderRateChart() {
  if (rateChart) rateChart.destroy();
  const buckets = new Map();

  for (const e of allEvents) {
    const t = e.ts?.slice(0, 16) || 'unknown'; // truncate to minute
    buckets.set(t, (buckets.get(t) || 0) + 1);
  }

  const labels = Array.from(buckets.keys());
  const data   = Array.from(buckets.values());

  // thin out labels if too many
  const skipLabels = labels.map((l, i) => {
    if (labels.length > 60) return i % Math.ceil(labels.length / 30) === 0 ? l.slice(11, 16) : '';
    return l.slice(11, 16);
  });

  const ctx = document.getElementById('rateChart').getContext('2d');
  rateChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: skipLabels,
      datasets: [{
        label: 'Events/min',
        data: data,
        borderColor: '#8888ff',
        backgroundColor: 'rgba(136,136,255,0.1)',
        fill: true,
        tension: 0.3,
        pointRadius: data.length > 100 ? 0 : 2,
        borderWidth: 1.5
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { maxRotation: 45 } },
        y: { grid: { color: 'rgba(255,255,255,0.05)' }, beginAtZero: true, title: { display: true, text: 'events', color: '#666' } }
      }
    }
  });
}

// ── Domain Distribution (doughnut) ──
function renderDomainChart() {
  if (domainChart) domainChart.destroy();
  const counts = {};
  for (const e of allEvents) {
    const d = e.domain || 'unknown';
    counts[d] = (counts[d] || 0) + 1;
  }
  const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
  const labels = sorted.map(s => s[0]);
  const data   = sorted.map(s => s[1]);
  const colors = labels.map(l => domainColor(l));

  const ctx = document.getElementById('domainChart').getContext('2d');
  domainChart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{ data, backgroundColor: colors, borderColor: '#07071a', borderWidth: 2 }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { position: 'right', labels: { padding: 12, usePointStyle: true, pointStyle: 'circle' } }
      }
    }
  });
}

// ── Event Type Distribution (horizontal bar) ──
function renderTypeChart() {
  if (typeChart) typeChart.destroy();
  const counts = {};
  for (const e of allEvents) {
    const t = e.type || 'unknown';
    counts[t] = (counts[t] || 0) + 1;
  }
  const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
  const labels = sorted.map(s => s[0]);
  const data   = sorted.map(s => s[1]);
  const colors = labels.map(l => typeColor(l));

  const ctx = document.getElementById('typeChart').getContext('2d');
  typeChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{ data, backgroundColor: colors, borderColor: 'transparent', borderRadius: 4 }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: 'rgba(255,255,255,0.05)' }, beginAtZero: true },
        y: { grid: { display: false } }
      }
    }
  });
}

// ── Hourly Activity ──
function renderHourlyChart() {
  if (hourlyChart) hourlyChart.destroy();
  const hours = new Array(24).fill(0);
  for (const e of allEvents) {
    if (!e.ts) continue;
    const h = parseInt(e.ts.slice(11, 13));
    if (!isNaN(h)) hours[h]++;
  }

  const labels = hours.map((_, i) => String(i).padStart(2, '0') + ':00');
  const maxVal = Math.max(...hours);

  const ctx = document.getElementById('hourlyChart').getContext('2d');
  hourlyChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data: hours,
        backgroundColor: hours.map(h => {
          const intensity = maxVal > 0 ? h / maxVal : 0;
          return `rgba(136,136,255,${0.15 + intensity * 0.7})`;
        }),
        borderColor: 'transparent',
        borderRadius: 3
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { maxRotation: 45 } },
        y: { grid: { color: 'rgba(255,255,255,0.05)' }, beginAtZero: true }
      }
    }
  });
}

// ── Grade Distribution (bar) ──
function renderGradeChart() {
  if (gradeChart) gradeChart.destroy();
  const counts = {};
  for (const e of allEvents) {
    const g = e.grade || '(none)';
    counts[g] = (counts[g] || 0) + 1;
  }
  const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
  const labels = sorted.map(s => s[0]);
  const data   = sorted.map(s => s[1]);

  const gradeColors = {
    'INFO':    '#44ff88',
    'WARN':    '#ffaa44',
    'ERROR':   '#ff6666',
    'DEBUG':   '#555577',
    '(none)':  '#334',
    _default:  '#8888ff'
  };

  const ctx = document.getElementById('gradeChart').getContext('2d');
  gradeChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data,
        backgroundColor: labels.map(l => gradeColors[l] || gradeColors._default),
        borderColor: 'transparent',
        borderRadius: 4
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { display: false } },
        y: { grid: { color: 'rgba(255,255,255,0.05)' }, beginAtZero: true }
      }
    }
  });
}

// ── Events Table (most recent 50) ──
function renderEventsTable() {
  const tbody = document.querySelector('#eventsTable tbody');
  const recent = allEvents.slice(-50).reverse();

  tbody.innerHTML = recent.map(e => {
    const dc = domainColor(e.domain || 'unknown');
    return `<tr>
      <td style="white-space:nowrap;color:#666">${(e.ts || '').slice(11, 19)}</td>
      <td><span class="domain-tag" style="background:${dc}22;color:${dc}">${e.domain || '-'}</span></td>
      <td style="color:${typeColor(e.type)}">${e.type || '-'}</td>
      <td>${e.event || e.mode || '-'}</td>
      <td style="color:#555;font-size:11px">${e.id || '-'}</td>
      <td>${e.value != null ? e.value : '-'}</td>
    </tr>`;
  }).join('');
}

// ── Init ──
loadData();
</script>
</body>
</html>
