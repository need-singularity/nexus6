# hexa.toml — nexus package manifest (declarative dependency SSOT)
#
# Spec: shared/hexa-lang/hexa-toml-spec.json (version 1.0.0)
# Companion: project.hexa (project marker), install.hexa (build hook).
#
# This manifest exists to declare runtime-package dependencies in a form
# that hx package manager (and downstream auditors) can read. Imperative
# bootstrap still happens in install.hexa.
#
# Provenance: created 2026-05-03 to land qmirror as official runtime dep
# after qmirror standalone publication (GitHub + HF + registry.tsv L22).
# Tracked-grandfather per hive/tool/banned_ext_sweeper.hexa rule
# (untracked .toml swept; tracked .toml exempt — same precedent as
# qmirror/hexa.toml and hexa-lang/hexa.toml).

[package]
name = "nexus"
version = "2.0.0"
entry = "cli/run.hexa"
description = "Universal Discovery Engine — 216 lenses · OUROBOROS · 5-phase singularity cycle. Perfect-number engine (drill/thinking/smash/absolute/status)."
license = "MIT"
authors = ["박민우 <nerve011235@gmail.com>"]
repository = "https://github.com/need-singularity/nexus"
homepage = "https://need-singularity.github.io/nexus/"
readme = "README.md"
keywords = ["discovery", "metaengine", "ouroboros", "n6", "perfect-number", "lenses"]
categories = ["discovery-engine", "metaengine", "perfect-number"]

[[bin]]
name = "nexus"
path = "cli/run.hexa"

# ── hx install hook ───────────────────────────────────────
# install.hexa runs under hx package manager at install time.
# Responsibilities (each idempotent):
#   pre   → ensure runtime-package dependencies present (hx install qmirror)
#   verify → canonical entry cli/run.hexa exists
#   post  → workspace register + optional launchd plist stage
[scripts]
install = "install.hexa"

# ── Dependencies ───────────────────────────────────────────
# Runtime-package deps (other hx-installed CLIs nexus consumes at runtime).
# hx CLI does NOT auto-resolve nested [dependencies] today (per
# hexa-lang/tool/pkg/hx L240-285 — only build hook is invoked); the
# install.hexa hook bootstraps each declared dep imperatively. This table
# is the declarative SSOT — auditors, downstream tooling, and a future
# hx-resolver consume it. Keep table and install.hexa in lockstep.
#
# Caret semver per node/cargo convention: ^1.0.0 admits >=1.0.0,<2.0.0.
[dependencies]
qmirror = "^1.0.0"
# qmirror — Quantum Mirror substrate (CHSH/IIT/NIST/QRNG).
#   Repo: https://github.com/need-singularity/qmirror
#   Registry: hexa-lang/tool/pkg/registry.tsv L22 (qmirror 1.0.0)
#   Consumer: nexus/modules/qmirror/* delegates to `qmirror` CLI
#   Install: hx install qmirror   (auto-invoked by nexus install.hexa)

# ── n=6 alignment ──────────────────────────────────────────
# keywords count = 6 = sigma(6)/2
# categories count = 3 < tau(6)=4
# dependencies count = 1 (minimal — single first-class consumed CLI)
