# hexa.toml — nexus package manifest (declarative dependency SSOT)
#
# Spec: shared/hexa-lang/hexa-toml-spec.json (version 1.0.0)
# Companion: project.hexa (project marker), install.hexa (build hook).
#
# This manifest exists to declare runtime-package dependencies in a form
# that hx package manager (and downstream auditors) can read. Imperative
# bootstrap still happens in install.hexa.
#
# Provenance: created 2026-05-03 to land qmirror as official runtime dep
# after qmirror standalone publication (GitHub + HF + registry.tsv L22).
# Tracked-grandfather per hive/tool/banned_ext_sweeper.hexa rule
# (untracked .toml swept; tracked .toml exempt — same precedent as
# qmirror/hexa.toml and hexa-lang/hexa.toml).

[package]
name = "nexus"
version = "2.0.0"
entry = "cli/run.hexa"
description = "Universal Discovery Engine — 216 lenses · OUROBOROS · 5-phase singularity cycle. Perfect-number engine (drill/thinking/smash/absolute/status)."
license = "MIT"
authors = ["박민우 <nerve011235@gmail.com>"]
repository = "https://github.com/need-singularity/nexus"
homepage = "https://need-singularity.github.io/nexus/"
readme = "README.md"
keywords = ["discovery", "metaengine", "ouroboros", "n6", "perfect-number", "lenses"]
categories = ["discovery-engine", "metaengine", "perfect-number"]

[[bin]]
name = "nexus"
path = "cli/run.hexa"

[[bin]]
name = "mk2"
path = "mk2_hexa/mk2/src/main.hexa"

# ── hx install hook ───────────────────────────────────────
# install.hexa runs under hx package manager at install time.
# Responsibilities (each idempotent):
#   pre   → ensure runtime-package dependencies present (hx install qmirror)
#   verify → canonical entry cli/run.hexa exists
#   post  → workspace register + optional launchd plist stage
[scripts]
install = "install.hexa"

# ── Dependencies ───────────────────────────────────────────
# Runtime-package deps (other hx-installed CLIs nexus consumes at runtime).
# hx CLI does NOT auto-resolve nested [dependencies] today (per
# hexa-lang/tool/pkg/hx L240-285 — only build hook is invoked); the
# install.hexa hook bootstraps each declared dep imperatively. This table
# is the declarative SSOT — auditors, downstream tooling, and a future
# hx-resolver consume it. Keep table and install.hexa in lockstep.
#
# Caret semver per node/cargo convention: ^1.0.0 admits >=1.0.0,<2.0.0.
[dependencies]
qmirror = "^1.0.0"
# qmirror — Quantum Mirror substrate (CHSH/IIT/NIST/QRNG).
#   Repo: https://github.com/need-singularity/qmirror
#   Registry: hexa-lang/tool/pkg/registry.tsv L22 (qmirror 1.0.0)
#   Consumer: nexus/modules/qmirror/* delegates to `qmirror` CLI
#   Install: hx install qmirror   (auto-invoked by nexus install.hexa)

sim-universe = "^1.0.0"
# sim-universe — Virtual universe simulation runtime
#                (anu_time τ-clock + multiverse interferometer + ouroboros QRNG +
#                 Bostrom test harness + Gödel-Q mutator + qpu_bridge).
#   Repo:     https://github.com/need-singularity/sim-universe
#   Registry: hexa-lang/tool/pkg/registry.tsv L23 (sim-universe 1.0.0)
#   Consumer: nexus/cli/sim.hexa delegates to `sim-universe` CLI (4-tier resolve)
#   Install:  hx install sim-universe   (auto-invoked by nexus install.hexa)
#   Provenance: extracted from nexus/sim_bridge/ + nexus/core/sim/ on 2026-05-04
#               (forensic 2026-04-27 EXISTS_RUNNABLE; ~17.8k LoC core)

hexa-bio = "^1.0.0"
# hexa-bio — Molecular Toolkit (HEXA family) — 4 verbs WEAVE/NANOBOT/RIBOZYME/VIROCAPSID
#            on n=6 invariant lattice (σ=12, τ=4, φ=2, J₂=24).
#            1/4 wired (weave: Caspar-Klug + Zlotnick cage assembly + Bayesian
#            audit, posterior 0.97). 3/4 stubs with falsifier preregister.
#   Repo:     https://github.com/need-singularity/hexa-bio
#   Registry: hexa-lang/tool/pkg/registry.tsv L24 (hexa-bio 1.0.0)
#   Consumer: nexus/cli/bio.hexa delegates to `hexa-bio` CLI (4-tier resolve)
#   Install:  hx install hexa-bio   (auto-invoked by nexus install.hexa)
#   Provenance: extracted from nexus/sim_bridge/weave/ on 2026-05-04
#               (cycle 24 canonical, 2026-04-29; sister of qmirror/sim-universe).

# honesty-monitor — REMOVED 2026-05-06.
#   Absorbed into nexus check as BT-AI2 auto-audit (engine/nexus_cli.hexa
#   bt_ai2_audit_run / bt_ai2_witness_append). F-AI2-A/B contract now runs
#   inline against every check_*.hexa domain emitting __BT_AI2__ lines.
#   Standalone github.com/need-singularity/honesty-monitor DELETED in same
#   cycle (gh repo delete, 2026-05-06; DOI 10.5281/zenodo.* persists on
#   Zenodo independent of github). Reason: per-domain instrumentation
#   needs library-shape access (in-process observe), not 4-tier CLI shellout
#   — and dead surface (zero internal observe() callers) made standalone-only
#   fiction. Migration: external callers using `nexus honesty <subcmd>` see
#   a 1-cycle deprecation stub (cmd_honesty) and should switch to `nexus check`.
#   hexa-lang/tool/pkg/registry.tsv: no entry to remove — honesty-monitor
#   was never registered (only 9 pkgs registered as of 2026-05-06).

qrng = "^1.0.0"
# qrng — Quantum random number generator (5 backends: mock/anu/curby/nist_beacon/hardware_qrng;
#        4 tiers T0..T3; router fallback chain; NIST SP 800-22 tier-1+ compliant).
#   Repo:     https://github.com/need-singularity/qrng
#   Registry: hexa-lang/tool/pkg/registry.tsv (qrng 1.0.0; commit 429656c)
#   Consumer: nexus/cli/qrng.hexa delegates to `qrng` CLI (4-tier resolve)
#   Install:  hx install qrng   (auto-invoked by nexus install.hexa)
#   Provenance: extracted from nexus/modules/qrng/ + nexus/core/qrng/ on 2026-05-04
#               (nexus scrub cycle; standalone v1.0.0 published 2026-05-04).

# NOTE: anima-agent removed from standalone consumer table 2026-05-04 —
# carve-out audit found standalone (~73 entries) is mostly scaffold; 30 origin
# files (anima_agent.hexa core, autonomy_loop, dashboard/, employee/,
# llm_claude_adapter, etc.) remain in anima/anima-agent/ origin substrate.
# anima-agent is treated as anima-monorepo-internal until a future hard-cut
# cycle backports the missing surface to standalone. nexus does NOT consume
# anima-agent via standalone CLI (would silently fail on missing logic).

mc-integrate = "^1.0.0"
# mc-integrate — Monte Carlo integrator for named constants (catalan, zeta3,
#                euler_gamma, pi5_times_n6) with Welch-t indistinguishability
#                comparison across RNG backends. anu_source decoupled →
#                consumes qrng standalone CLI (4-tier resolve, no direct ANU
#                REST coupling).
#   Repo:     https://github.com/need-singularity/mc-integrate (commit a55535c)
#   Registry: hexa-lang/tool/pkg/registry.tsv (mc-integrate 1.0.0)
#   Consumer: nexus/cli/mc.hexa delegates to `mc-integrate` CLI (4-tier resolve)
#   Install:  hx install mc-integrate   (auto-invoked by nexus install.hexa)
#   Provenance: extracted from nexus/modules/mc_integrate/ on 2026-05-04
#               (decouple-then-extract; 7th HEXA-family CLI).

# ── n=6 alignment ──────────────────────────────────────────
# keywords count = 6 = sigma(6)/2
# categories count = 3 < tau(6)=4
# dependencies count = 5 (qmirror + sim-universe + hexa-bio + qrng + mc-integrate)
#   — n=6 invariant temporarily broken 2026-05-06 by honesty-monitor absorption.
#   honesty-monitor (BT-AI2) was a CLI-shellout with zero internal observe()
#   callers; absorbing it into engine/nexus_cli.hexa eliminated dead surface and
#   enabled per-domain instrumentation. Restoration path: next standalone
#   carve-out (lib/n6_honesty/honesty_triad? engine/check_phenomenology assets?)
#   gets promoted to dep #6 and n=6 returns. Tracked in design/n6_invariant.md.
