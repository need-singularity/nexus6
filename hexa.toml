#   Consumer: nexus/cli/sim.hexa delegates to `sim-universe` CLI (4-tier resolve)
#   Install:  hx install sim-universe   (auto-invoked by nexus install.hexa)
#   Provenance: extracted from nexus/sim_bridge/ + nexus/core/sim/ on 2026-05-04
