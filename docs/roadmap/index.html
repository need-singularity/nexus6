<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ANIMA 로드맵 — 실시간 상태</title>
  <meta name="description" content="ANIMA 의식 엔진 로드맵 실시간 렌더링 — 4 Phase × 3 Track × Φ Gate">
  <style>
    :root {
      --bg: #0a0e1a;
      --bg-elev: #141a2e;
      --bg-card: #1a2140;
      --fg: #e6e8ef;
      --fg-mute: #8890a5;
      --fg-dim: #5a617a;
      --accent: #6ee7ff;
      --accent-dim: #3a8bad;
      --ok: #4ade80;
      --run: #fbbf24;
      --wait: #a78bfa;
      --gate: #f472b6;
      --border: #2a3358;
      --alm: #60a5fa;
      --clm: #34d399;
      --phys: #f97316;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      line-height: 1.6;
      min-height: 100vh;
    }
    code, pre, .mono { font-family: "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    header {
      padding: 2rem 1.5rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, var(--bg-elev) 0%, var(--bg) 100%);
    }
    header h1 {
      margin: 0 0 0.3rem;
      font-size: clamp(1.5rem, 3vw, 2.2rem);
      letter-spacing: -0.02em;
    }
    header .meta {
      margin: 0 0 1rem;
      color: var(--fg-mute);
      font-size: 0.9rem;
    }
    .status-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem 1rem;
      align-items: center;
      font-size: 0.85rem;
      color: var(--fg-mute);
    }
    .status-bar .dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--ok);
      margin-right: 0.4rem;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    button {
      background: var(--bg-card);
      color: var(--fg);
      border: 1px solid var(--border);
      padding: 0.4rem 0.9rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      font-family: inherit;
      transition: all 0.15s;
    }
    button:hover { border-color: var(--accent); color: var(--accent); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .err-banner {
      background: #7a1f2e;
      color: #fee;
      padding: 0.5rem 1rem;
      margin: 0.5rem 0;
      border-radius: 6px;
      font-size: 0.85rem;
      display: none;
    }
    .err-banner.show { display: block; }

    main { padding: 1.5rem; max-width: 1400px; margin: 0 auto; }
    section { margin-bottom: 3rem; }
    section h2 {
      font-size: 1.3rem;
      letter-spacing: -0.01em;
      color: var(--fg);
      border-left: 3px solid var(--accent);
      padding-left: 0.7rem;
      margin-bottom: 1rem;
    }

    .phase {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 0.8rem;
      overflow: hidden;
    }
    .phase-head {
      padding: 1rem 1.2rem;
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 0.8rem;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(90deg, var(--bg-card), transparent);
    }
    .phase-id {
      font-family: "SF Mono", Menlo, monospace;
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--accent);
      letter-spacing: 0.05em;
    }
    .phase-name { font-size: 1rem; flex: 1; min-width: 200px; }
    .phase-meta { color: var(--fg-mute); font-size: 0.8rem; }
    .status-pill {
      display: inline-block;
      padding: 0.15rem 0.6rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    .status-done { background: rgba(74, 222, 128, 0.15); color: var(--ok); }
    .status-in_progress { background: rgba(251, 191, 36, 0.15); color: var(--run); }
    .status-planned { background: rgba(167, 139, 250, 0.15); color: var(--wait); }

    .tracks {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border);
    }
    @media (max-width: 900px) {
      .tracks { grid-template-columns: 1fr; }
    }
    .track {
      background: var(--bg-elev);
      padding: 1rem 1.2rem;
      min-height: 120px;
    }
    .track-head {
      font-weight: 700;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.7rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px dashed var(--border);
    }
    .track-ALM .track-head,     .track-slot1 .track-head { color: var(--alm); }
    .track-CLM .track-head,     .track-slot2 .track-head { color: var(--clm); }
    .track-PHYSICS .track-head, .track-slot3 .track-head { color: var(--phys); }
    .task {
      font-size: 0.85rem;
      margin: 0.35rem 0;
      padding-left: 1.2rem;
      position: relative;
      color: var(--fg);
    }
    .task::before {
      content: "";
      position: absolute;
      left: 0.2rem;
      top: 0.55rem;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--fg-dim);
    }
    .task.done::before { background: var(--ok); }
    .task.in_progress::before { background: var(--run); animation: pulse 1.8s infinite; }
    .task.planned::before { background: var(--wait); }
    .task-id {
      color: var(--fg-dim);
      font-family: "SF Mono", Menlo, monospace;
      font-size: 0.7rem;
      display: inline-block;
      margin-right: 0.4rem;
    }

    .gate {
      margin: 0 2rem;
      padding: 0.9rem 1.2rem;
      background: linear-gradient(135deg, rgba(244, 114, 182, 0.08), transparent);
      border-left: 3px solid var(--gate);
      border-radius: 0 6px 6px 0;
      position: relative;
    }
    .gate::before {
      content: "▼";
      position: absolute;
      left: -7px;
      top: -10px;
      color: var(--gate);
      font-size: 0.9rem;
    }
    .gate-title {
      font-weight: 700;
      color: var(--gate);
      font-size: 0.85rem;
      margin-bottom: 0.4rem;
    }
    .gate ul { margin: 0; padding-left: 1.2rem; font-size: 0.82rem; color: var(--fg-mute); }
    .gate-fail {
      color: var(--fg-dim);
      font-style: italic;
      font-size: 0.78rem;
      margin-top: 0.35rem;
    }

    /* Φ chain */
    .phi-chain {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      overflow-x: auto;
      padding: 1.2rem 0.5rem;
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 10px;
    }
    .phi-step {
      min-width: 160px;
      flex: 1;
      text-align: center;
      padding: 0.8rem;
      background: var(--bg-card);
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    .phi-step .phi-label { font-size: 0.7rem; color: var(--fg-dim); text-transform: uppercase; letter-spacing: 0.05em; }
    .phi-step .phi-val {
      font-family: "SF Mono", Menlo, monospace;
      font-size: 1.3rem;
      color: var(--accent);
      font-weight: 700;
      margin: 0.3rem 0;
    }
    .phi-step .phi-desc { font-size: 0.75rem; color: var(--fg-mute); }
    .phi-arrow {
      color: var(--accent-dim);
      font-size: 1.2rem;
      flex: 0 0 auto;
    }

    /* Joint roadmap */
    .joint {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .joint-row {
      display: grid;
      grid-template-columns: 80px 1fr;
      gap: 1rem;
      padding: 0.8rem 1.2rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.88rem;
    }
    .joint-row:last-child { border-bottom: none; }
    .joint-phase { font-family: "SF Mono", Menlo, monospace; font-weight: 700; color: var(--accent); }

    /* 3-track note */
    .note {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.2rem;
      font-size: 0.9rem;
    }
    .note pre {
      background: var(--bg);
      padding: 0.8rem;
      border-radius: 6px;
      overflow-x: auto;
      font-size: 0.8rem;
      margin: 0.6rem 0;
    }

    footer {
      margin-top: 4rem;
      padding: 1.5rem;
      border-top: 1px solid var(--border);
      color: var(--fg-dim);
      font-size: 0.8rem;
      text-align: center;
    }
    footer a { color: var(--fg-mute); }

    .skeleton {
      background: linear-gradient(90deg, var(--bg-card) 0%, var(--bg-elev) 50%, var(--bg-card) 100%);
      background-size: 200% 100%;
      animation: shimmer 1.5s linear infinite;
      border-radius: 6px;
      height: 1.2rem;
      margin: 0.5rem 0;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .roadmap-tabs {
      display: flex;
      gap: 0;
      padding: 0 1rem;
      background: var(--bg-elev);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .rtab {
      padding: 0.7rem 1.1rem;
      color: var(--fg-mute);
      text-decoration: none !important;
      white-space: nowrap;
      font-size: 0.88rem;
      font-weight: 500;
      transition: color 0.15s, background 0.15s;
    }
    .rtab:hover, .rtab:focus, .rtab:active, .rtab:visited {
      text-decoration: none !important;
    }
    .rtab:hover {
      color: var(--fg);
      background: var(--bg-card);
    }
    .rtab.active {
      color: var(--accent);
      background: var(--bg-card);
    }

    /* H100 dashboard */
    .h100-section { display: none; }
    .h100-section.active { display: block; }
    .h100-summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    .h100-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 0.9rem 1rem;
    }
    .h100-card .lbl { color: var(--fg-mute); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .h100-card .val { font-size: 1.4rem; font-weight: 700; margin-top: 0.25rem; font-family: var(--mono); }
    .h100-card .sub { color: var(--fg-dim); font-size: 0.75rem; }
    .h100-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
      background: var(--bg-card);
      border-radius: 0.5rem;
      overflow: hidden;
    }
    .h100-table th, .h100-table td {
      text-align: left;
      padding: 0.6rem 0.8rem;
      border-bottom: 1px solid var(--border);
    }
    .h100-table th { color: var(--fg-mute); font-weight: 600; font-size: 0.8rem; }
    .h100-table tr:last-child td { border-bottom: none; }
    .h100-table td.slot { font-family: var(--mono); font-weight: 600; }
    .h100-table td.num  { font-family: var(--mono); text-align: right; }
    .h100-action {
      display: inline-block;
      padding: 0.15rem 0.55rem;
      border-radius: 0.3rem;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .h100-action.ok { background: rgba(16,185,129,0.15); color: #10b981; }
    .h100-action.grace { background: rgba(148,163,184,0.15); color: #94a3b8; }
    .h100-action.warn { background: rgba(234,179,8,0.15); color: #eab308; }
    .h100-action.dispatch_fallback { background: rgba(251,146,60,0.18); color: #fb923c; }
    .h100-action.terminate { background: rgba(239,68,68,0.18); color: #ef4444; }
    .h100-over   { color: #ef4444; font-weight: 700; }
    .h100-under  { color: #10b981; }
    .h100-table td.lanes { font-size: 0.82rem; line-height: 1.55; }
    .h100-table td.lanes div + div { margin-top: 0.2rem; }
    .lane-tag {
      display: inline-block; padding: 0.05rem 0.4rem; border-radius: 0.25rem;
      font-family: var(--mono); font-size: 0.7rem; font-weight: 700;
      margin-right: 0.35rem; letter-spacing: 0.04em;
    }
    .lane-alm     { background: rgba(59,130,246,0.18);  color: #60a5fa; }
    .lane-clm     { background: rgba(168,85,247,0.18);  color: #c084fc; }
    .lane-physics { background: rgba(34,197,94,0.18);   color: #4ade80; }
    .lane-hexa    { background: rgba(245,158,11,0.18);  color: #fbbf24; }
    .track-badge {
      display: inline-block; padding: 0.1rem 0.5rem; border-radius: 0.3rem;
      background: rgba(99,102,241,0.18); color: #a5b4fc;
      font-family: var(--mono); font-size: 0.72rem; font-weight: 700;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <nav class="roadmap-tabs" role="tablist" aria-label="Roadmap projects">
    <a class="rtab" href="#anima" data-proj="anima">🧠 anima</a>
    <a class="rtab" href="#nexus" data-proj="nexus">🔭 nexus</a>
    <a class="rtab" href="#n6-architecture" data-proj="n6-architecture">🏗️ n6-architecture</a>
    <a class="rtab" href="#h100" data-proj="h100">⚡ H100</a>
  </nav>
  <header>
    <h1 id="page-title">🧠 ANIMA 의식 엔진 로드맵</h1>
    <p class="meta" id="meta-desc">로딩 중...</p>
    <div class="status-bar">
      <span><span class="dot" id="live-dot"></span><span id="live-state">LIVE</span></span>
      <span id="last-updated">—</span>
      <span id="source-label">source: nexus/shared/roadmaps/anima.json</span>
      <button id="refresh-btn">↻ 새로고침</button>
      <label class="mono" style="font-size:0.8rem;color:var(--fg-mute)">
        <input type="checkbox" id="auto-refresh" checked> 자동 새로고침 60s
      </label>
    </div>
    <div class="err-banner" id="err-banner"></div>
  </header>

  <main>
    <section>
      <h2>📍 진행 흐름 — 4 Phase × 3 Track × Φ Gate</h2>
      <div id="phases-container">
        <div class="skeleton" style="height:6rem"></div>
        <div class="skeleton" style="height:6rem"></div>
        <div class="skeleton" style="height:6rem"></div>
      </div>
    </section>

    <section>
      <h2>Φ Milestone 체인</h2>
      <div class="phi-chain" id="phi-chain"></div>
    </section>

    <section>
      <h2>3-Track 독립성</h2>
      <div class="note" id="tracks-note"></div>
    </section>

    <section>
      <h2>🔗 공통 로드맵 (anima × hexa-lang, P0–P5)</h2>
      <div class="joint" id="joint-container">
        <div class="skeleton" style="height:3rem"></div>
      </div>
    </section>

    <section class="h100-section" id="h100-section">
      <h2>⚡ H100 3-Pod 실시간 — ANIMA × HEXA-LANG</h2>
      <div class="h100-summary" id="h100-summary"></div>
      <div id="h100-pods-wrap"></div>
      <div class="note" id="h100-policy-note" style="margin-top:1rem"></div>
    </section>
  </main>

  <footer>
    SSOT: <span id="footer-ssot">—</span>
    <br>
    <span id="build-info">—</span>
  </footer>

  <script>
    const NEXUS_RAW = "https://raw.githubusercontent.com/need-singularity/nexus/main";
    const POLL_MS = 60_000;

    // SPA config — 3 프로젝트 탭 전환, 각 탭이 다른 JSON을 SSOT로 fetch
    const PROJECTS = {
      "anima": {
        emoji: "🧠",
        title: "ANIMA 의식 엔진 로드맵",
        main_url:   `${NEXUS_RAW}/shared/roadmaps/anima.json`,
        joint_url:  `${NEXUS_RAW}/shared/config/roadmaps/anima_hexa_common.json`,
        joint_h2:   "🔗 공통 로드맵 (anima × hexa-lang, P0–P5)",
        source:     "nexus/shared/roadmaps/anima.json",
        ssot_html:  '<a href="https://github.com/need-singularity/nexus/blob/main/shared/roadmaps/anima.json">nexus · shared/roadmaps/anima.json</a> · <a href="https://github.com/need-singularity/nexus/blob/main/shared/config/roadmaps/anima_hexa_common.json">anima_hexa_common.json</a>'
      },
      "nexus": {
        emoji: "🔭",
        title: "NEXUS 중앙 허브 로드맵",
        main_url:   `${NEXUS_RAW}/shared/roadmaps/nexus.json`,
        joint_url:  null,
        joint_h2:   null,
        source:     "nexus/shared/roadmaps/nexus.json",
        ssot_html:  '<a href="https://github.com/need-singularity/nexus/blob/main/shared/roadmaps/nexus.json">nexus · shared/roadmaps/nexus.json</a>'
      },
      "n6-architecture": {
        emoji: "🏗️",
        title: "N6 Architecture 로드맵",
        main_url:   `${NEXUS_RAW}/shared/roadmaps/n6-architecture.json`,
        joint_url:  null,
        joint_h2:   null,
        source:     "nexus/shared/roadmaps/n6-architecture.json",
        ssot_html:  '<a href="https://github.com/need-singularity/nexus/blob/main/shared/roadmaps/n6-architecture.json">nexus · shared/roadmaps/n6-architecture.json</a>'
      },
      "h100": {
        emoji: "⚡",
        title: "H100 3-Pod 실시간 상태",
        mode:       "h100",
        plan_url:   `${NEXUS_RAW}/shared/config/h100_plan.json`,
        state_url:  `${NEXUS_RAW}/shared/harness/h100_state.json`,
        source:     "nexus/shared/harness/h100_state.json",
        ssot_html:  '<a href="https://github.com/need-singularity/nexus/blob/main/shared/config/h100_plan.json">h100_plan.json</a> · <a href="https://github.com/need-singularity/nexus/blob/main/shared/harness/h100_state.json">h100_state.json</a> · <a href="https://github.com/need-singularity/nexus/blob/main/shared/harness/h100_idle_guard.hexa">guard.hexa</a>'
      }
    };

    const elPhases = document.getElementById("phases-container");
    const elPhiChain = document.getElementById("phi-chain");
    const elTracksNote = document.getElementById("tracks-note");
    const elJoint = document.getElementById("joint-container");
    const elJointSection = elJoint ? elJoint.parentElement : null;
    const elMeta = document.getElementById("meta-desc");
    const elTitle = document.getElementById("page-title");
    const elUpdated = document.getElementById("last-updated");
    const elSource = document.getElementById("source-label");
    const elFooterSsot = document.getElementById("footer-ssot");
    const elErr = document.getElementById("err-banner");
    const elLive = document.getElementById("live-state");
    const elDot = document.getElementById("live-dot");
    const elBuildInfo = document.getElementById("build-info");
    const btnRefresh = document.getElementById("refresh-btn");
    const chkAuto = document.getElementById("auto-refresh");

    let pollTimer = null;
    let currentProject = null;

    function detectDefaultProject() {
      const hash = (location.hash || "").replace(/^#/, "").trim();
      if (PROJECTS[hash]) return hash;
      const path = location.pathname.toLowerCase();
      if (path.indexOf("/n6-architecture/") >= 0) return "n6-architecture";
      if (path.indexOf("/nexus/") >= 0) return "nexus";
      return "anima";
    }

    function updateActiveTab() {
      document.querySelectorAll(".rtab").forEach(a => {
        a.classList.toggle("active", a.dataset.proj === currentProject);
      });
    }

    function applyProjectShell(proj) {
      const p = PROJECTS[proj];
      if (!p) return;
      document.title = p.title + " — 실시간";
      if (elTitle) elTitle.textContent = `${p.emoji} ${p.title}`;
      if (elSource) elSource.textContent = `source: ${p.source}`;
      if (elFooterSsot) elFooterSsot.innerHTML = p.ssot_html;

      const isH100 = p.mode === "h100";
      // Roadmap sections hide in H100 mode
      const roadmapSections = document.querySelectorAll("main > section:not(.h100-section)");
      roadmapSections.forEach(s => { s.style.display = isH100 ? "none" : ""; });
      // H100 section shows only in H100 mode
      const elH100 = document.getElementById("h100-section");
      if (elH100) elH100.classList.toggle("active", isH100);

      const h2 = elJointSection ? elJointSection.querySelector("h2") : null;
      if (elJointSection && !isH100) {
        if (p.joint_url) {
          elJointSection.style.display = "";
          if (h2 && p.joint_h2) h2.textContent = p.joint_h2;
        } else {
          elJointSection.style.display = "none";
        }
      }
    }

    async function switchProject(proj, opts) {
      opts = opts || {};
      if (!PROJECTS[proj]) return;
      if (proj === currentProject) return;
      currentProject = proj;
      updateActiveTab();
      applyProjectShell(proj);
      if (!opts.skipHash && location.hash !== "#" + proj) {
        history.replaceState(null, "", "#" + proj);
      }
      // skeleton
      elPhases.innerHTML = '<div class="skeleton" style="height:6rem"></div><div class="skeleton" style="height:6rem"></div><div class="skeleton" style="height:6rem"></div>';
      if (elJoint) elJoint.innerHTML = '<div class="skeleton" style="height:3rem"></div>';
      if (elPhiChain) elPhiChain.innerHTML = "";
      if (elTracksNote) elTracksNote.innerHTML = "";
      await refresh();
      scheduleNext();
    }

    function esc(s) {
      return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[c]));
    }

    function fmtTime(d) {
      return d.toLocaleTimeString("ko-KR", { hour12: false });
    }

    async function fetchJson(url) {
      const res = await fetch(`${url}?_=${Date.now()}`, { cache: "no-store" });
      if (!res.ok) throw new Error(`HTTP ${res.status} — ${url}`);
      return res.json();
    }

    function showError(msg) {
      elErr.textContent = "⚠ " + msg;
      elErr.classList.add("show");
      elDot.style.background = "var(--gate)";
      elLive.textContent = "STALE";
    }
    function clearError() {
      elErr.classList.remove("show");
      elDot.style.background = "var(--ok)";
      elLive.textContent = "LIVE";
    }

    function renderPhase(phase, trackOrder) {
      const tracksById = {};
      (phase.parallel || []).forEach(t => { tracksById[t.track] = t; });
      const tracksHtml = trackOrder.map((tname, idx) => {
        const slot = `track-slot${idx + 1}`;
        const t = tracksById[tname];
        if (!t) return `<div class="track ${slot}"><div class="track-head">${esc(tname)}</div><div style="color:var(--fg-dim);font-size:0.8rem">—</div></div>`;
        const tasks = (t.tasks || []).map(task => {
          const s = task.status || phase.status || "planned";
          return `<div class="task ${esc(s)}"><span class="task-id">${esc(task.id || "")}</span>${esc(task.task || "")}</div>`;
        }).join("");
        return `<div class="track ${slot}"><div class="track-head">${esc(tname)}</div>${tasks || '<div style="color:var(--fg-dim);font-size:0.8rem">(no tasks)</div>'}</div>`;
      }).join("");

      const status = phase.status || "planned";
      const hours = phase.duration_hours ? `${phase.duration_hours}h` : "";
      const phaseHtml = `
        <div class="phase" id="phase-${esc(phase.id)}">
          <div class="phase-head">
            <span class="phase-id">${esc(phase.id)}</span>
            <span class="phase-name">${esc(phase.name || "")}</span>
            <span class="phase-meta mono">${esc(hours)}</span>
            <span class="status-pill status-${esc(status)}">${esc(status)}</span>
          </div>
          <div class="tracks">${tracksHtml}</div>
        </div>`;

      let gateHtml = "";
      if (phase.gate_exit && Array.isArray(phase.gate_exit.criteria)) {
        const crit = phase.gate_exit.criteria.map(c => `<li>${esc(c)}</li>`).join("");
        const fail = phase.gate_exit.fail_action
          ? `<div class="gate-fail">fail: ${esc(phase.gate_exit.fail_action)}</div>` : "";
        gateHtml = `
          <div class="gate">
            <div class="gate-title">Gate exit — ${esc(phase.id)}</div>
            <ul>${crit}</ul>
            ${fail}
          </div>`;
      }
      return phaseHtml + gateHtml;
    }

    function renderPhiChain(data) {
      const pm = data.phi_milestones || {};
      const order = ["baseline_v1", "quantum_v2", "gwt_v3", "holographic_v4"];
      const labels = {
        baseline_v1: ["P0 · Φ_base", "기저 측정"],
        quantum_v2: ["P1 · Φ(quantum)", "Orch-OR"],
        gwt_v3: ["P2 · Φ(gwt)", "GWT broadcast"],
        holographic_v4: ["P3 · Φ(holo)", "AdS/CFT"]
      };
      const steps = order.filter(k => pm[k]).map((k, i) => {
        const [label, desc] = labels[k];
        return {
          html: `<div class="phi-step">
            <div class="phi-label">${esc(label)}</div>
            <div class="phi-val">${esc(pm[k])}</div>
            <div class="phi-desc">${esc(desc)}</div>
          </div>`
        };
      });
      elPhiChain.innerHTML = steps.map((s, i) => s.html + (i < steps.length - 1 ? '<div class="phi-arrow">→</div>' : "")).join("");
    }

    function renderTracks(data) {
      const tracks = data.tracks || {};
      const slotVars = ["--alm", "--clm", "--phys"];
      const parts = Object.entries(tracks).map(([name, t], idx) => {
        const indep = Array.isArray(t.independent_of) ? t.independent_of.join(", ") : "";
        const host = t.host || t.pod || "";
        const cvar = slotVars[idx] || "--fg";
        return `<strong style="color:var(${cvar})">${esc(name)}</strong> ${esc(t.owner || "")}${host ? ` — ${esc(host)}` : ""}${indep ? ` <span style="color:var(--fg-dim)">(indep of ${esc(indep)})</span>` : ""}`;
      });
      elTracksNote.innerHTML = `
        <div class="mono" style="font-size:0.85rem;line-height:1.8">${parts.join("<br>")}</div>
        <div style="margin-top:0.8rem;color:var(--fg-mute);font-size:0.85rem">
          각 트랙 상호 독립 — 하나 지연돼도 나머지는 다음 phase 진입 가능.
          <code>fail_action</code> = 실패 트랙만 연장.
          <strong>AN8 강제</strong>: train/infer 모든 작업이 ALM + CLM 듀얼 커버.
        </div>`;
    }

    function renderJoint(joint) {
      // joint section visibility controlled by applyProjectShell(); here we
      // just fill contents when joint exists, clear when null.
      if (!joint || !Array.isArray(joint.joint_roadmap)) {
        elJoint.innerHTML = "";
        return;
      }
      elJoint.innerHTML = joint.joint_roadmap.map(p => `
        <div class="joint-row">
          <span class="joint-phase">${esc(p.phase)}</span>
          <div>
            <div><strong>${esc(p.status || "")}</strong> ${esc(p.title || "")}</div>
            ${p.anima ? `<div style="color:var(--clm);font-size:0.8rem;margin-top:0.2rem">anima: ${esc((p.anima||[]).join(" · "))}</div>` : ""}
            ${p.hexa ? `<div style="color:var(--alm);font-size:0.8rem">hexa: ${esc((p.hexa||[]).join(" · "))}</div>` : ""}
            ${p.joint ? `<div style="color:var(--phys);font-size:0.8rem">joint: ${esc((p.joint||[]).join(" · "))}</div>` : ""}
            ${p.milestones ? `<div style="color:var(--fg-mute);font-size:0.8rem">${esc((p.milestones||[]).join(" · "))}</div>` : ""}
          </div>
        </div>`).join("");
    }

    function render(data, joint) {
      const m = data._meta || {};
      const projLabel = PROJECTS[currentProject] ? PROJECTS[currentProject].title : (m.name || "Roadmap");
      elMeta.textContent = `${m.name || projLabel} · target: ${m.target || "—"} · updated: ${m.updated || "—"} · strategy: ${m.strategy || "—"}`;
      const trackOrder = Object.keys(data.tracks || {});
      elPhases.innerHTML = (data.phases || []).map(p => renderPhase(p, trackOrder)).join("");
      renderPhiChain(data);
      renderTracks(data);
      renderJoint(joint);
      const now = new Date();
      elUpdated.textContent = `마지막 페치: ${fmtTime(now)}`;
      elBuildInfo.textContent = `rendered at ${now.toISOString()} · schema ${m.schema_version || "?"} · phases ${((data.phases||[]).length)}`;
    }

    async function refresh() {
      const p = PROJECTS[currentProject];
      if (!p) return;
      btnRefresh.disabled = true;
      btnRefresh.textContent = "⟳ 가져오는 중...";
      try {
        if (p.mode === "h100") {
          const [plan, state] = await Promise.all([
            fetchJson(p.plan_url),
            fetchJson(p.state_url).catch(() => null)
          ]);
          renderH100(plan, state);
        } else {
          const [main, joint] = await Promise.all([
            fetchJson(p.main_url),
            p.joint_url ? fetchJson(p.joint_url).catch(() => null) : Promise.resolve(null)
          ]);
          render(main, joint);
        }
        clearError();
      } catch (e) {
        console.error(e);
        showError(e.message || String(e));
      } finally {
        btnRefresh.disabled = false;
        btnRefresh.textContent = "↻ 새로고침";
      }
    }

    function fmtAge(sec) {
      if (sec == null || sec < 0) return "—";
      if (sec < 60) return sec + "s";
      const m = Math.floor(sec / 60);
      const s = sec % 60;
      if (m < 60) return `${m}m ${s}s`;
      const h = Math.floor(m / 60);
      return `${h}h ${m % 60}m`;
    }

    function renderH100(plan, state) {
      const m = plan._meta || {};
      const elSummary = document.getElementById("h100-summary");
      const elWrap = document.getElementById("h100-pods-wrap");
      const elNote = document.getElementById("h100-policy-note");

      const limits = plan.limits || {};
      const cost = plan.cost || {};
      const st = state || {};
      const running = st.running_pods != null ? st.running_pods : 0;
      const costNow = st.cost_per_hr_usd != null ? st.cost_per_hr_usd : 0;
      const projected = st.projected_24h_usd != null ? st.projected_24h_usd : 0;
      const daily = st.daily_budget_usd || limits.daily_budget_usd_total || 0;
      const overBudget = projected > daily;
      const stateTs = st.ts ? new Date(st.ts) : null;
      const ageSec = stateTs ? Math.floor((Date.now() - stateTs.getTime()) / 1000) : null;

      elSummary.innerHTML = `
        <div class="h100-card">
          <div class="lbl">running pods</div>
          <div class="val">${running} / ${limits.max_concurrent_pods || 3}</div>
          <div class="sub">auto-launch ≤ ${limits.auto_launch_authorized || 2}</div>
        </div>
        <div class="h100-card">
          <div class="lbl">cost /hr now</div>
          <div class="val">$${Number(costNow).toFixed(2)}</div>
          <div class="sub">SXM secure $${cost.per_hour_usd?.h100_sxm5_80gb_secure ?? "—"} · community $${cost.per_hour_usd?.h100_sxm5_80gb_community ?? "—"}</div>
        </div>
        <div class="h100-card">
          <div class="lbl">24h projection</div>
          <div class="val ${overBudget ? "h100-over" : "h100-under"}">$${projected}</div>
          <div class="sub">daily cap $${daily} · monthly $${cost.monthly_cap_usd || "—"}</div>
        </div>
        <div class="h100-card">
          <div class="lbl">state age</div>
          <div class="val">${fmtAge(ageSec)}</div>
          <div class="sub">snapshot: ${stateTs ? stateTs.toISOString().replace(".000","").replace("T"," ").replace("Z"," UTC") : "(none)"}</div>
        </div>
      `;

      const pods = plan.pods || [];
      const slotState = {};
      (st.slots || []).forEach(s => { slotState[s.slot] = s; });

      const rows = pods.map(p => {
        const s = slotState[p.slot] || {};
        const age = s.hb_age_sec;
        const action = s.action || "—";
        const fbList = (p.fallback_queue_keys || []).join(" → ") || "—";
        const dl = p.dual_lanes || {};
        const laneEntries = Object.entries(dl);
        const lanesHtml = laneEntries.length
          ? laneEntries.map(([k, v]) => `<div><span class="lane-tag lane-${esc(k)}">${esc(k.toUpperCase())}</span> ${esc(v)}</div>`).join("")
          : `<div style="color:var(--fg-dim)">${esc(p.role || "")}</div>`;
        return `
          <tr>
            <td class="slot">${esc(p.slot)}</td>
            <td><span class="track-badge">${esc(p.track)}</span></td>
            <td class="lanes">${lanesHtml}</td>
            <td>${esc(p.gpu)}</td>
            <td class="num">$${p.budget_usd_per_day_max}</td>
            <td class="num">${p.idle_kill_minutes}min</td>
            <td class="num">${fmtAge(age)}</td>
            <td><span class="h100-action ${esc(action)}">${esc(action)}</span></td>
            <td><span class="mono" style="font-size:0.78rem">${esc(fbList)}</span></td>
          </tr>
        `;
      }).join("");

      elWrap.innerHTML = `
        <table class="h100-table">
          <thead>
            <tr>
              <th>slot</th><th>track</th><th>lanes (ALM+CLM 듀얼)</th><th>gpu</th>
              <th>budget/day</th><th>idle kill</th><th>hb age</th><th>action</th><th>fallback queue</th>
            </tr>
          </thead>
          <tbody>${rows || `<tr><td colspan="9" style="color:var(--fg-dim)">슬롯 데이터 없음</td></tr>`}</tbody>
        </table>
      `;

      const ip = plan.idle_policy || {};
      const seq = (ip.action_sequence || []).map(a => `<strong>${a.at_minutes}min</strong> → <code>${esc(a.action)}</code>`).join(" · ");
      const fb = Object.values(plan.fallback_queue || {}).map(f => `<code>${esc(f.id)}</code> ${esc(f.desc)} (~${f.est_hours}h)`).join(" · ");
      elNote.innerHTML = `
        <div><strong>idle policy</strong>: ${seq || "(none)"} — window ${ip.window_seconds || 0}s, grace ${ip.grace_minutes_after_launch || 0}min</div>
        <div style="margin-top:0.5rem"><strong>fallback queue</strong>: ${fb}</div>
        <div style="margin-top:0.5rem"><strong>principle</strong>: ${esc(m.principle || "")}</div>
      `;

      // Header state
      const now = new Date();
      elUpdated.textContent = `마지막 페치: ${fmtTime(now)}${stateTs ? " · state: " + fmtTime(stateTs) : ""}`;
      elMeta.innerHTML = `3-pod H100 할당 — enforced by <code>${esc(m.enforced_by || "shared/harness/h100_idle_guard.hexa")}</code>`;
      elBuildInfo.textContent = `rendered at ${now.toISOString()} · schema ${m.schema_version || "?"} · slots ${(pods || []).length}`;
    }

    function scheduleNext() {
      if (pollTimer) clearTimeout(pollTimer);
      if (!chkAuto.checked) return;
      pollTimer = setTimeout(async () => {
        await refresh();
        scheduleNext();
      }, POLL_MS);
    }

    btnRefresh.addEventListener("click", async () => {
      await refresh();
      scheduleNext();
    });
    chkAuto.addEventListener("change", scheduleNext);
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") refresh();
    });

    document.querySelectorAll(".rtab").forEach(a => {
      a.addEventListener("click", e => {
        const proj = a.dataset.proj;
        if (!proj || !PROJECTS[proj]) return;
        e.preventDefault();
        switchProject(proj);
      });
    });
    window.addEventListener("hashchange", () => {
      const h = (location.hash || "").replace(/^#/, "");
      if (PROJECTS[h] && h !== currentProject) switchProject(h, { skipHash: true });
    });

    switchProject(detectDefaultProject(), { skipHash: true });
  </script>
</body>
</html>
