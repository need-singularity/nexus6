<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.175.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.175.0/examples/jsm/"}}

<script type="module">
import * as THREE from 'three';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';

const LAYER_COLORS = [0xff6b8a, 0xffb347, 0x4ade80, 0x6ee7ff, 0xc084fc];
const LAYER_Y      = [  0,  55, 110, 170, 240];
const LAYER_R      = [ 75,  95, 115, 140, 85];
const ATLAS_URL    = 'atlas.n6';                  // direct source — zero-conversion
const MANIFEST_URL = 'atlas3d/manifest.json';     // optional sidecar (layer hints)

// ── atlas.n6 client-side parser (mirrors bin/atlas3d parse_atlas) ──
const TYPE_CHARS = 'PCLFRSX?';
const NODE_RE = new RegExp(
  '^@(?<t>[' + TYPE_CHARS + '])\\s+(?<id>\\S+)' +
  '(?:\\s*=\\s*(?<expr>.*?))?' +
  '\\s*::\\s*(?<dom>\\S+)' +
  '\\s*\\[(?<grade>[^\\]]+)\\]\\s*$'
);
const ARROW_RE = /^\s+(?<arrow><-|->|=>|==|~>)\s+(?<rhs>.+)$/;
const DOMAIN_LAYER_DEFAULT = {
  absolute:0, algebra:0, axiom_combo:0, foundation:0, geometry:0, mathematics:0,
  meta:0, nuclear:0, number_theory:0, particle:0, quark:0, sub_quark:0, topology:0,
  anatomy:1, architecture:1, atmospheric_physics:1, atom:1, bond:1, chemistry:1,
  cryptography:1, physics:1,
  bio:2, bio_hiv:2, biology:2, consciousness:2, genetic:2, genetics_applied:2,
  material:2, molecule:2,
  celestial:4, convergence:4, cosmological:4, cosmology:4, galactic:4, multiversal:4,
};
let DOMAIN_LAYER = DOMAIN_LAYER_DEFAULT;
const LAYER_DEFAULT = 3;

function parseAtlas(text) {
  const nodes = [];
  const seen = new Map();
  const pending = [];
  let cur = null;
  const lines = text.split('\n');
  for (let li = 0; li < lines.length; li++) {
    const raw = lines[li];
    let m = NODE_RE.exec(raw);
    if (m) {
      const id = m.groups.id;
      if (seen.has(id)) { cur = id; continue; }
      let expr = (m.groups.expr || '').trim();
      if (expr.length >= 2 && (expr[0] === '"' || expr[0] === "'") && expr[expr.length-1] === expr[0]) {
        expr = expr.slice(1, -1);
      }
      const dom = m.groups.dom;
      const node = {
        i: nodes.length, id, t: m.groups.t.toLowerCase(),
        dom, g: m.groups.grade,
        l: (DOMAIN_LAYER[dom] !== undefined) ? DOMAIN_LAYER[dom] : LAYER_DEFAULT,
        e: expr, d: 0,
      };
      seen.set(id, node.i);
      nodes.push(node);
      cur = id;
      continue;
    }
    m = ARROW_RE.exec(raw);
    if (m && cur != null) {
      const arrow = m.groups.arrow;
      const rhs = m.groups.rhs.trim();
      if (rhs.startsWith('"') || rhs.startsWith("'") || rhs.startsWith('#')) continue;
      const parts = rhs.split(',');
      for (let pi = 0; pi < parts.length; pi++) {
        const t = parts[pi].trim().split(/[\s(=]/, 1)[0].trim();
        if (!t || t === '.' || t === '...' || t === '—') continue;
        if (arrow === '<-') pending.push([t, cur]);
        else pending.push([cur, t]);
      }
    }
  }
  const edgeSet = new Set();
  const edges = [];
  for (let pi = 0; pi < pending.length; pi++) {
    const s = pending[pi][0], d = pending[pi][1];
    const si = seen.get(s), di = seen.get(d);
    if (si === undefined || di === undefined || si === di) continue;
    const k = si + ',' + di;
    if (edgeSet.has(k)) continue;
    edgeSet.add(k);
    edges.push([si, di]);
  }
  for (let ei = 0; ei < edges.length; ei++) {
    nodes[edges[ei][0]].d++;
    nodes[edges[ei][1]].d++;
  }
  return { nodes, edges };
}

const elLoad = document.getElementById('loading');
const elLbar = document.getElementById('lbar');
const elLtxt = document.getElementById('ltxt');
const elInfo = document.getElementById('info');
const elITitle = document.getElementById('iTitle');
const elIBody  = document.getElementById('iBody');
const elStats  = document.getElementById('stats');
const elSearch = document.getElementById('search');
const elTip    = document.getElementById('tip');

let nodes = [];       // {i,id,l,t,d,dom,g,e, pos:Vector3}
let edges = [];       // [a,b]
let layerOn = [true,true,true,true,true];
let edgesOn = true;
let searchTerm = '';
let nodeMesh = null;
let edgeLines = null;
let hovered = -1;
let selected = -1;

// ── scene ──
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x05060e, 0.0022);

const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.5, 2000);
camera.position.set(0, 120, 360);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0x05060e);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 120, 0);
controls.maxDistance = 900;
controls.minDistance = 20;

scene.add(new THREE.AmbientLight(0xffffff, 0.65));
const dir = new THREE.DirectionalLight(0xffffff, 0.55);
dir.position.set(50, 180, 80);
scene.add(dir);

// layer discs (subtle visual anchors)
for (let k = 0; k < 5; k++) {
  const g = new THREE.RingGeometry(LAYER_R[k]*0.82, LAYER_R[k]*1.02, 72);
  const m = new THREE.MeshBasicMaterial({color: LAYER_COLORS[k], transparent:true, opacity:0.035, side:THREE.DoubleSide});
  const ring = new THREE.Mesh(g, m);
  ring.rotation.x = -Math.PI/2;
  ring.position.y = LAYER_Y[k];
  scene.add(ring);
}

// ── load data ──
async function load() {
  const t0 = performance.now();

  // optional sidecar manifest (domain→layer hints, version, mtime)
  try {
    const mr = await fetch(MANIFEST_URL, {cache:'no-store'});
    if (mr.ok) {
      const mf = await mr.json();
      if (mf.domain_layer) DOMAIN_LAYER = mf.domain_layer;
    }
  } catch(e) {}

  elLtxt.textContent = 'fetch atlas.n6…';
  const res = await fetch(ATLAS_URL, {cache:'no-store'});
  if (!res.ok) throw new Error('atlas.n6 fetch failed: ' + res.status);
  const len = +(res.headers.get('content-length') || 0);
  const reader = res.body.getReader();
  const chunks = []; let got = 0;
  while (true) {
    const {done, value} = await reader.read();
    if (done) break;
    chunks.push(value); got += value.length;
    if (len) {
      const pct = Math.round(got/len*70);  // 70% for fetch, 30% for parse
      elLbar.style.width = pct + '%';
      elLtxt.textContent = `${(got/1e6).toFixed(2)}MB / ${(len/1e6).toFixed(2)}MB`;
    } else {
      elLtxt.textContent = `${(got/1e6).toFixed(2)}MB`;
    }
  }
  const text = await new Blob(chunks).text();
  elLtxt.textContent = 'parse atlas.n6…';
  elLbar.style.width = '75%';
  // yield to paint, then parse synchronously
  await new Promise(r => setTimeout(r, 0));
  const parsed = parseAtlas(text);
  elLbar.style.width = '95%';

  nodes = parsed.nodes;
  edges = parsed.edges;

  // positions — try pre-baked coords.json sidecar first; fallback to inline spiral
  let baked = null;
  try {
    const cr = await fetch('atlas3d/coords.json', {cache:'no-store'});
    if (cr.ok) baked = await cr.json();
  } catch(e) {}
  if (baked && baked.ids && baked.xyz) {
    const idx = new Map();
    for (let i = 0; i < baked.ids.length; i++) idx.set(baked.ids[i], i);
    let hit = 0;
    for (const n of nodes) {
      const j = idx.get(n.id);
      if (j !== undefined && baked.xyz[j]) {
        const p = baked.xyz[j];
        n.pos = new THREE.Vector3(p[0], p[1], p[2]);
        hit++;
      }
    }
    if (hit < nodes.length) placeMissing(nodes);
  } else {
    placeMissing(nodes);
  }

  buildMeshes();
  elLoad.style.display = 'none';
  elStats.textContent = `${nodes.length.toLocaleString()} nodes · ${edges.length.toLocaleString()} edges · ${((performance.now()-t0)/1000).toFixed(1)}s`;
  // overlays load lazily — not on critical path
  loadOverlays().catch(()=>{});
}

function placeMissing(nodes) {
  const byLayer = [[],[],[],[],[]];
  for (const n of nodes) if (!n.pos && byLayer[n.l]) byLayer[n.l].push(n);
  for (let k = 0; k < 5; k++) {
    const arr = byLayer[k];
    arr.sort((a,b) => b.d - a.d);
    const N = arr.length;
    const R = LAYER_R[k];
    for (let i = 0; i < N; i++) {
      const n = arr[i];
      const frac = N > 1 ? i/(N-1) : 0;
      const r = R * Math.sqrt(0.04 + 0.96 * frac);
      const theta = i * 2.399963;
      const jitter = 0.6;
      n.pos = new THREE.Vector3(
        Math.cos(theta) * r + (Math.random()-0.5) * jitter,
        LAYER_Y[k] + (Math.random()-0.5) * 4.5,
        Math.sin(theta) * r + (Math.random()-0.5) * jitter
      );
    }
  }
}

function buildMeshes() {
  // ── node instanced mesh ──
  const geo = new THREE.SphereGeometry(1, 10, 8);
  const N = nodes.length;
  const mesh = new THREE.InstancedMesh(geo, new THREE.MeshBasicMaterial(), N);
  mesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);

  const colorArr = new Float32Array(N*3);
  const dummy = new THREE.Object3D();
  const col = new THREE.Color();

  for (let i = 0; i < N; i++) {
    const n = nodes[i];
    const size = 0.8 + Math.log2(n.d + 1) * 0.5;
    dummy.position.copy(n.pos);
    dummy.scale.setScalar(size);
    dummy.updateMatrix();
    mesh.setMatrixAt(i, dummy.matrix);
    col.setHex(LAYER_COLORS[n.l]);
    colorArr[i*3  ] = col.r;
    colorArr[i*3+1] = col.g;
    colorArr[i*3+2] = col.b;
  }
  geo.setAttribute('instanceColor', new THREE.InstancedBufferAttribute(colorArr, 3));

  // shader injection — read instanceColor
  mesh.material = new THREE.ShaderMaterial({
    uniforms: {
      fogColor: {value: new THREE.Color(0x05060e)},
      fogDensity: {value: 0.0022},
      dim: {value: 1.0},
    },
    vertexShader: `
      attribute vec3 instanceColor;
      varying vec3 vColor;
      varying float vFogDepth;
      void main(){
        vColor = instanceColor;
        vec4 mv = modelViewMatrix * instanceMatrix * vec4(position,1.0);
        vFogDepth = -mv.z;
        gl_Position = projectionMatrix * mv;
      }`,
    fragmentShader: `
      varying vec3 vColor;
      varying float vFogDepth;
      uniform vec3 fogColor;
      uniform float fogDensity;
      uniform float dim;
      void main(){
        float fogFactor = 1.0 - exp(-fogDensity * fogDensity * vFogDepth * vFogDepth);
        vec3 c = mix(vColor * dim, fogColor, fogFactor);
        gl_FragColor = vec4(c, 1.0);
      }`
  });

  nodeMesh = mesh;
  scene.add(mesh);

  // ── edge line segments ──
  const E = edges.length;
  const positions = new Float32Array(E * 6);
  const eColors   = new Float32Array(E * 6);
  for (let i = 0; i < E; i++) {
    const [a,b] = edges[i];
    const na = nodes[a], nb = nodes[b];
    positions[i*6  ] = na.pos.x; positions[i*6+1] = na.pos.y; positions[i*6+2] = na.pos.z;
    positions[i*6+3] = nb.pos.x; positions[i*6+4] = nb.pos.y; positions[i*6+5] = nb.pos.z;
    col.setHex(LAYER_COLORS[na.l]);
    eColors[i*6  ]=col.r*0.45; eColors[i*6+1]=col.g*0.45; eColors[i*6+2]=col.b*0.45;
    col.setHex(LAYER_COLORS[nb.l]);
    eColors[i*6+3]=col.r*0.45; eColors[i*6+4]=col.g*0.45; eColors[i*6+5]=col.b*0.45;
  }
  const eg = new THREE.BufferGeometry();
  eg.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  eg.setAttribute('color', new THREE.BufferAttribute(eColors, 3));
  edgeLines = new THREE.LineSegments(eg, new THREE.LineBasicMaterial({vertexColors:true, transparent:true, opacity:0.32}));
  scene.add(edgeLines);
}

// ── overlays (hub-100 / phase47 / theorem) ──
let hubMesh = null, phase47Lines = null, theoremGroup = null;
let theoremsData = null;
let hoveredTheorem = null;  // current theorem mesh under cursor (null if none)
const idToIdx = new Map();

async function loadOverlays() {
  for (let i = 0; i < nodes.length; i++) idToIdx.set(nodes[i].id, i);

  // hub-100 markers
  try {
    const r = await fetch('atlas3d/overlays/hub_centrality.json', {cache:'no-store'});
    if (r.ok) {
      const j = await r.json();
      const hits = (j.rows || []).map(row => idToIdx.get(row.id)).filter(x => x !== undefined);
      if (hits.length) {
        const geo = new THREE.SphereGeometry(1.5, 12, 10);
        hubMesh = new THREE.InstancedMesh(geo,
          new THREE.MeshBasicMaterial({color: 0xfbbf24, transparent: true, opacity: 0.9}),
          hits.length);
        const dummy = new THREE.Object3D();
        for (let i = 0; i < hits.length; i++) {
          const n = nodes[hits[i]];
          dummy.position.copy(n.pos);
          const score = (j.rows[i] && j.rows[i].integrated_score) || 0.5;
          dummy.scale.setScalar(2.5 + score * 4);
          dummy.updateMatrix();
          hubMesh.setMatrixAt(i, dummy.matrix);
        }
        hubMesh.visible = true;
        scene.add(hubMesh);
      }
    }
  } catch(e) {}

  // phase47 bridges — atlas → external canonical refs (R1-2, bt-NNN, etc.)
  // External targets are NOT in atlas.n6; phantom-place them on an outer ring
  // at deterministic angle (hash of id) so cross-domain bridges still render.
  try {
    const r = await fetch('atlas3d/overlays/phase47_bridges.json', {cache:'no-store'});
    if (r.ok) {
      const arr = await r.json();
      const PHANTOM_R = 240, PHANTOM_Y = 250;
      const phantomPos = new Map();  // external id → THREE.Vector3
      function hashAngle(s) {
        let h = 0;
        for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
        return ((h % 360) + 360) % 360 * (Math.PI / 180);
      }
      function getPhantom(id) {
        let v = phantomPos.get(id);
        if (!v) {
          const a = hashAngle(id);
          v = new THREE.Vector3(Math.cos(a) * PHANTOM_R, PHANTOM_Y, Math.sin(a) * PHANTOM_R);
          phantomPos.set(id, v);
        }
        return v;
      }
      const segs = [];
      let rendered = 0, dropped = 0;
      for (const e of arr) {
        const a = idToIdx.get(e.from);
        if (a === undefined) { dropped++; continue; }
        const b = idToIdx.get(e.to);
        const pa = nodes[a].pos;
        const pb = (b !== undefined) ? nodes[b].pos : getPhantom(e.to);
        segs.push(pa.x, pa.y, pa.z, pb.x, pb.y, pb.z);
        rendered++;
      }
      if (segs.length) {
        const g = new THREE.BufferGeometry();
        g.setAttribute('position', new THREE.BufferAttribute(new Float32Array(segs), 3));
        phase47Lines = new THREE.Group();
        phase47Lines.add(new THREE.LineSegments(g,
          new THREE.LineBasicMaterial({color: 0xf472b6, transparent: true, opacity: 0.55})));
        // phantom node markers (small pink spheres at each external endpoint)
        if (phantomPos.size) {
          const geo = new THREE.SphereGeometry(1.5, 10, 8);
          const mat = new THREE.MeshBasicMaterial({color: 0xf472b6, transparent: true, opacity: 0.8});
          const dummy = new THREE.Object3D();
          const im = new THREE.InstancedMesh(geo, mat, phantomPos.size);
          let i = 0;
          const phantomIds = [];
          for (const [id, p] of phantomPos) {
            dummy.position.copy(p);
            dummy.scale.setScalar(2.2);
            dummy.updateMatrix();
            im.setMatrixAt(i++, dummy.matrix);
            phantomIds.push(id);
          }
          im.userData = { kind: 'phase47-phantom', ids: phantomIds };
          phase47Lines.add(im);
        }
        phase47Lines.visible = false;
        phase47Lines.userData = { rendered, phantoms: phantomPos.size, dropped };
        scene.add(phase47Lines);
      }
    }
  } catch(e) {}

  // timeline sparkline (events.jsonl → daily bars)
  try {
    const r = await fetch('atlas3d/timeline.json', {cache:'no-store'});
    if (r.ok) {
      const j = await r.json();
      const buckets = j.buckets_by_day || {};
      const days = Object.keys(buckets).sort();
      if (days.length) {
        const max = Math.max(1, ...days.map(d => buckets[d]));
        const bars = days.map(d => {
          const h = Math.max(1, Math.round(buckets[d] / max * 18));
          return `<span title="${d}: ${buckets[d]}" style="display:inline-block;width:3px;height:${h}px;background:#6ee7ff;margin-right:1px;vertical-align:bottom"></span>`;
        }).join('');
        const el = document.getElementById('timeline');
        el.innerHTML = `events: ${j.events_total} / ${days.length}d ${bars}`;
        el.style.display = 'block';
      }
    }
  } catch(e) {}

  // diff overlay (atlas3d/diff.json — added/removed since ref)
  try {
    const r = await fetch('atlas3d/diff.json', {cache:'no-store'});
    if (r.ok) {
      const j = await r.json();
      if (j.added && j.added.length) {
        const addedSet = new Set(j.added);
        const hits = [];
        for (const n of nodes) if (addedSet.has(n.id)) hits.push(n);
        if (hits.length) {
          const geo = new THREE.SphereGeometry(1, 10, 8);
          const mesh = new THREE.InstancedMesh(geo,
            new THREE.MeshBasicMaterial({color: 0x22d3ee, transparent: true, opacity: 0.8}),
            hits.length);
          const dummy = new THREE.Object3D();
          for (let i = 0; i < hits.length; i++) {
            dummy.position.copy(hits[i].pos);
            dummy.scale.setScalar(3.2);
            dummy.updateMatrix();
            mesh.setMatrixAt(i, dummy.matrix);
          }
          mesh.visible = true;
          scene.add(mesh);
        }
        const el = document.getElementById('diffStat');
        el.textContent = `diff ${j.a}→${j.b}: +${j.added_count} -${j.removed_count}`;
        el.style.display = 'block';
      }
    }
  } catch(e) {}

  // theorem mode (R29 Foundation Isomorphism + R31 Three-Level Projection)
  try {
    const r = await fetch('atlas3d/theorems.json', {cache:'no-store'});
    if (r.ok) {
      const j = await r.json();
      theoremsData = j;
      theoremGroup = new THREE.Group();
      const fi = (j.theorems || []).find(t => t.id === 'foundation-isomorphism');
      if (fi) {
        // 7 atlas primitives → halo around existing nodes
        const geo = new THREE.SphereGeometry(2, 16, 12);
        const mat = new THREE.MeshBasicMaterial({color: 0xa3e635, transparent: true, opacity: 0.5});
        for (const id of fi.atlas_primitives) {
          const idx = idToIdx.get(id);
          if (idx === undefined) continue;
          const m = new THREE.Mesh(geo, mat);
          m.position.copy(nodes[idx].pos);
          m.scale.setScalar(8);
          m.userData = { kind: 'theorem-atlas', id, nodeIdx: idx, theorem: fi };
          theoremGroup.add(m);
        }
        // 7 meta reflections at outer ring (peer-cousin level)
        const ringR = 280;
        const metaPos = [];
        for (let i = 0; i < fi.meta_reflections.length; i++) {
          const a = (i / fi.meta_reflections.length) * Math.PI * 2;
          const v = new THREE.Vector3(Math.cos(a) * ringR, 280, Math.sin(a) * ringR);
          metaPos.push(v);
          const m = new THREE.Mesh(geo,
            new THREE.MeshBasicMaterial({color: 0xa3e635, transparent: true, opacity: 0.85}));
          m.position.copy(v);
          m.scale.setScalar(6);
          m.userData = {
            kind: 'theorem-meta',
            name: fi.meta_reflections[i],
            atlasPair: fi.atlas_primitives[i],
            theorem: fi,
          };
          theoremGroup.add(m);
        }
        // 7 isomorphism rays
        const rayMat = new THREE.LineBasicMaterial({color: 0xa3e635, transparent: true, opacity: 0.3});
        const rayPts = [];
        for (let i = 0; i < fi.atlas_primitives.length && i < metaPos.length; i++) {
          const idx = idToIdx.get(fi.atlas_primitives[i]);
          if (idx === undefined) continue;
          rayPts.push(
            nodes[idx].pos.x, nodes[idx].pos.y, nodes[idx].pos.z,
            metaPos[i].x, metaPos[i].y, metaPos[i].z
          );
        }
        if (rayPts.length) {
          const rg = new THREE.BufferGeometry();
          rg.setAttribute('position', new THREE.BufferAttribute(new Float32Array(rayPts), 3));
          theoremGroup.add(new THREE.LineSegments(rg, rayMat));
        }
      }
      theoremGroup.visible = true;
      scene.add(theoremGroup);
    }
  } catch(e) {}
}

// ── picking ──
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let lastMove = 0;

function onMove(e) {
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
  elTip.style.left = (e.clientX + 12) + 'px';
  elTip.style.top  = (e.clientY + 12) + 'px';
  const now = performance.now();
  if (now - lastMove < 40) return;
  lastMove = now;
  pick();
}
function pick() {
  if (!nodeMesh) return;
  raycaster.setFromCamera(mouse, camera);

  // theorem markers take priority — they're overlay markers, easier targets
  hoveredTheorem = null;
  if (theoremGroup && theoremGroup.visible) {
    const meshes = theoremGroup.children.filter(c => c.userData && c.userData.kind);
    const tHits = raycaster.intersectObjects(meshes, false);
    if (tHits.length) {
      hoveredTheorem = tHits[0].object;
      hovered = -1;
      const ud = hoveredTheorem.userData;
      const label = ud.kind === 'theorem-atlas'
        ? `atlas: ${ud.id}  ·  R29 isomorphism`
        : `meta: ${ud.name}  ↔  atlas: ${ud.atlasPair}`;
      elTip.textContent = label;
      elTip.style.display = 'block';
      document.body.style.cursor = 'pointer';
      return;
    }
  }

  const hits = raycaster.intersectObject(nodeMesh);
  const idx = (hits.length > 0 && hits[0].instanceId != null) ? hits[0].instanceId : -1;
  if (idx !== hovered) {
    hovered = idx;
    if (idx >= 0) {
      const n = nodes[idx];
      if (layerOn[n.l] && matchesSearch(n)) {
        elTip.textContent = n.id + '  ·  deg ' + n.d;
        elTip.style.display = 'block';
        document.body.style.cursor = 'pointer';
        return;
      }
    }
    elTip.style.display = 'none';
    document.body.style.cursor = '';
  }
}
function onClick() {
  if (hoveredTheorem) {
    const ud = hoveredTheorem.userData;
    if (ud.kind === 'theorem-atlas') {
      // jump to the corresponding atlas node info panel
      selectNode(ud.nodeIdx);
    } else if (ud.kind === 'theorem-meta') {
      selectTheoremMeta(ud);
    }
    return;
  }
  if (hovered < 0) return;
  selectNode(hovered);
}

function selectTheoremMeta(ud) {
  selected = -1;
  const t = ud.theorem;
  const second = (theoremsData && theoremsData.theorems || []).find(x => x.id === 'three-level-projection');
  elITitle.textContent = `${ud.name}`;
  let html = '';
  html += `<div>`;
  html += `<span class="tag" style="color:#a3e635">theorem</span>`;
  html += `<span class="tag">${esc(t.round)}</span>`;
  html += `<span class="tag">${esc(t.id)}</span>`;
  html += `</div>`;
  html += `<table>`;
  html += `<tr><td>name</td><td>${esc(t.name)}</td></tr>`;
  html += `<tr><td>kind</td><td>meta reflection</td></tr>`;
  html += `<tr><td>label</td><td>${esc(ud.name)}</td></tr>`;
  html += `<tr><td>↔ atlas</td><td><a href="#" data-ni-id="${esc(ud.atlasPair)}">${esc(ud.atlasPair)}</a></td></tr>`;
  html += `<tr><td>rays</td><td>${t.rays}</td></tr>`;
  html += `<tr><td>root</td><td>${esc(t.irreducible_root)}</td></tr>`;
  html += `</table>`;
  html += `<div class="expr">Meta-Atlas Foundation Isomorphism (R29): atlas 7 primitives ↔ meta 7 structural counts. irreducible root = ${esc(t.irreducible_root)}.</div>`;
  if (second) {
    const psi = (second.targets || []).find(x => x.role === 'consciousness');
    const meta = (second.targets || []).find(x => x.role === 'observability');
    html += `<div class="expr">${esc(second.round)} Three-Level Projection: atlas → {Ψ ${psi ? psi.count : '?'} consciousness, meta ${meta ? meta.count : '?'} observability} (peer-cousins).</div>`;
  }
  elIBody.innerHTML = html;
  elInfo.style.display = 'block';
}
function selectNode(i) {
  selected = i;
  const n = nodes[i];
  elITitle.textContent = n.id;
  let html = '';
  html += `<div>`;
  html += `<span class="tag" style="color:${'#'+LAYER_COLORS[n.l].toString(16).padStart(6,'0')}">L${n.l}</span>`;
  if (n.dom) html += `<span class="tag">${esc(n.dom)}</span>`;
  if (n.t)   html += `<span class="tag">type: ${esc(n.t)}</span>`;
  if (n.g)   html += `<span class="tag">${esc(n.g)}</span>`;
  html += `</div>`;
  html += `<table>`;
  html += `<tr><td>id</td><td>${esc(n.id)}</td></tr>`;
  html += `<tr><td>layer</td><td>L${n.l}</td></tr>`;
  html += `<tr><td>domain</td><td>${esc(n.dom || '—')}</td></tr>`;
  html += `<tr><td>degree</td><td>${n.d}</td></tr>`;
  html += `</table>`;
  if (n.e) html += `<div class="expr">${esc(n.e)}</div>`;

  // neighbors
  const nbrs = [];
  for (let k = 0; k < edges.length; k++) {
    if (edges[k][0] === i) nbrs.push(edges[k][1]);
    else if (edges[k][1] === i) nbrs.push(edges[k][0]);
    if (nbrs.length > 24) break;
  }
  if (nbrs.length) {
    html += `<div style="margin-top:10px;font-size:11px;color:#5a617a">neighbors</div>`;
    html += `<div style="margin-top:4px">`;
    for (const ni of nbrs) {
      const nn = nodes[ni];
      html += `<a href="#" data-ni="${ni}" style="display:inline-block;margin:2px 4px 2px 0;padding:2px 7px;border:1px solid #2a2f54;border-radius:10px;color:${'#'+LAYER_COLORS[nn.l].toString(16).padStart(6,'0')};font-size:10.5px;text-decoration:none;font-family:'SF Mono',Menlo,monospace">${esc(nn.id)}</a>`;
    }
    html += `</div>`;
  }
  elIBody.innerHTML = html;
  elInfo.style.display = 'block';

  // focus camera
  controls.target.lerp(n.pos, 0.4);
}

function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// DSL: dom:foundation L:0 t:p hub>5 g:11* id:phi  (else substring across id/dom/e)
let searchPreds = null;
function compileSearch(expr) {
  searchPreds = null;
  if (!expr) return;
  const tokens = expr.split(/\s+/).filter(Boolean);
  const preds = [];
  for (const tok of tokens) {
    let m = tok.match(/^(L|dom|t|g|id|hub|d):(.+)$/i);
    let m2 = tok.match(/^(hub|d)([<>]=?)(\d+)$/i);
    if (m) {
      const k = m[1].toLowerCase(), v = m[2];
      if (k === 'l') preds.push(n => n.l === +v);
      else if (k === 'dom') preds.push(n => n.dom === v);
      else if (k === 't') preds.push(n => n.t === v.toLowerCase());
      else if (k === 'g') preds.push(n => n.g === v);
      else if (k === 'id') preds.push(n => (n.id||'').toLowerCase().includes(v.toLowerCase()));
      else if (k === 'hub' || k === 'd') preds.push(n => (n.d||0) >= +v);
    } else if (m2) {
      const op = m2[2], v = +m2[3];
      const cmp = {'<':(a,b)=>a<b,'<=':(a,b)=>a<=b,'>':(a,b)=>a>b,'>=':(a,b)=>a>=b}[op];
      preds.push(n => cmp(n.d||0, v));
    } else {
      const s = tok.toLowerCase();
      preds.push(n =>
        (n.id||'').toLowerCase().includes(s) ||
        (n.dom||'').toLowerCase().includes(s) ||
        (n.e||'').toLowerCase().includes(s)
      );
    }
  }
  searchPreds = preds.length ? preds : null;
}
function matchesSearch(n) {
  if (!searchPreds) return true;
  for (let i = 0; i < searchPreds.length; i++) if (!searchPreds[i](n)) return false;
  return true;
}

// ── filters apply to instance scale (hide = scale 0) ──
function applyFilters() {
  if (!nodeMesh) return;
  const dummy = new THREE.Object3D();
  let shown = 0;
  for (let i = 0; i < nodes.length; i++) {
    const n = nodes[i];
    const visible = layerOn[n.l] && matchesSearch(n);
    if (visible) shown++;
    dummy.position.copy(n.pos);
    const size = visible ? (0.8 + Math.log2(n.d + 1) * 0.5) : 0;
    dummy.scale.setScalar(size);
    dummy.updateMatrix();
    nodeMesh.setMatrixAt(i, dummy.matrix);
  }
  nodeMesh.instanceMatrix.needsUpdate = true;

  // edges: hide if either end hidden
  if (edgeLines) {
    edgeLines.visible = edgesOn;
    if (edgesOn) {
      const pos = edgeLines.geometry.attributes.position.array;
      for (let i = 0; i < edges.length; i++) {
        const [a,b] = edges[i];
        const na = nodes[a], nb = nodes[b];
        const vis = layerOn[na.l] && layerOn[nb.l] && matchesSearch(na) && matchesSearch(nb);
        if (vis) {
          pos[i*6  ] = na.pos.x; pos[i*6+1] = na.pos.y; pos[i*6+2] = na.pos.z;
          pos[i*6+3] = nb.pos.x; pos[i*6+4] = nb.pos.y; pos[i*6+5] = nb.pos.z;
        } else {
          pos[i*6  ] = 0; pos[i*6+1] = 0; pos[i*6+2] = 0;
          pos[i*6+3] = 0; pos[i*6+4] = 0; pos[i*6+5] = 0;
        }
      }
      edgeLines.geometry.attributes.position.needsUpdate = true;
    }
  }

  elStats.textContent = `${shown.toLocaleString()} / ${nodes.length.toLocaleString()} nodes · ${edges.length.toLocaleString()} edges`;
}

// ── UI ──
document.querySelectorAll('.lbtn[data-l]').forEach(btn => {
  btn.addEventListener('click', () => {
    const k = +btn.dataset.l;
    layerOn[k] = !layerOn[k];
    btn.classList.toggle('on', layerOn[k]);
    applyFilters();
  });
});
document.getElementById('edgeBtn').addEventListener('click', (e) => {
  edgesOn = !edgesOn;
  e.currentTarget.classList.toggle('on', edgesOn);
  if (edgeLines) edgeLines.visible = edgesOn;
});
function bindOverlayToggle(id, getObj) {
  const btn = document.getElementById(id);
  if (!btn) return;
  const baseLabel = btn.textContent;
  btn.addEventListener('click', () => {
    const obj = getObj();
    if (!obj) {
      btn.disabled = true;
      btn.classList.remove('on');
      btn.textContent = baseLabel + ' (no data)';
      btn.style.opacity = 0.45;
      btn.style.cursor = 'not-allowed';
      return;
    }
    obj.visible = !obj.visible;
    btn.classList.toggle('on', obj.visible);
  });
}
bindOverlayToggle('hubBtn', () => hubMesh);
bindOverlayToggle('phase47Btn', () => phase47Lines);
bindOverlayToggle('theoremBtn', () => theoremGroup);
elSearch.addEventListener('input', () => {
  compileSearch(elSearch.value.trim());
  applyFilters();
});
document.querySelector('#info .close').addEventListener('click', () => {
  elInfo.style.display = 'none';
  selected = -1;
});
elIBody.addEventListener('click', (e) => {
  const a = e.target.closest('[data-ni]');
  if (a) { e.preventDefault(); selectNode(+a.dataset.ni); return; }
  const aId = e.target.closest('[data-ni-id]');
  if (aId) {
    e.preventDefault();
    const idx = idToIdx.get(aId.dataset.niId);
    if (idx !== undefined) selectNode(idx);
  }
});
renderer.domElement.addEventListener('mousemove', onMove);
renderer.domElement.addEventListener('click', onClick);
addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ── animate ──
function tick() {
  controls.update();
  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}

load().then(() => {
  tick();
}).catch(err => {
  elLoad.innerHTML = '<div style="color:#f87171">load error: ' + esc(err.message) + '</div>';
  console.error(err);
});

// ═══════════════════════════════════════════════════════════
// ATLAS-P3-1 — WebSocket live bridge (ws://127.0.0.1:8765)
// Additive only: does NOT modify existing 3D scene construction.
// Displays live node/edge arrival count inside #stats; falls back
// to _mirror_atlas.live.json polling if WS unreachable within 2s.
// ═══════════════════════════════════════════════════════════
(function wsLiveBridge(){
  const WS_URL = 'ws://127.0.0.1:8765';
  const FALLBACK_URL = '_mirror_atlas.live.json';
  const live = {nodes:0, edges:0, lastId:'', lastTs:0, mode:'init'};

  function render(){
    const el = document.getElementById('stats'); if (!el) return;
    const tag = el.querySelector('.ws-live') || (function(){
      const s = document.createElement('span');
      s.className = 'ws-live';
      s.style.cssText = 'margin-left:10px;color:#9ad4ff;font-family:SF Mono,Menlo,monospace';
      el.appendChild(s); return s;
    })();
    tag.textContent = ' · '+live.mode+': +'+live.nodes+'n/+'+live.edges+'e'+(live.lastId?(' ['+live.lastId+']'):'');
  }

  function onEvent(m){
    if (!m || !m.type) return;
    if (m.type === 'node') live.nodes++;
    else if (m.type === 'edge') live.edges++;
    else return;
    live.lastId = m.id || '?';
    live.lastTs = m.ts || (Date.now()/1000);
    render();
  }

  async function pollFallback(){
    live.mode = 'fallback'; render();
    try {
      const r = await fetch(FALLBACK_URL, {cache:'no-store'});
      if (r.ok) {
        const j = await r.json();
        const dn = (j && (j.delta_nodes|0)) || 0;
        const de = (j && j.delta_edges && (j.delta_edges.total|0)) || (j && (j.delta_json_edges|0)) || 0;
        if (dn > live.nodes) live.nodes = dn;
        if (de > live.edges) live.edges = de;
        live.lastTs = Date.now()/1000; render();
      }
    } catch(e) {}
    setTimeout(pollFallback, 5000);
  }

  try {
    const ws = new WebSocket(WS_URL);
    const to = setTimeout(()=>{ try{ws.close();}catch(e){} pollFallback(); }, 2000);
    ws.onopen = ()=>{ clearTimeout(to); live.mode = 'ws'; render(); };
    ws.onmessage = (ev)=>{ try { onEvent(JSON.parse(ev.data)); } catch(e){} };
    ws.onerror = ()=>{ try{clearTimeout(to);}catch(e){} };
    ws.onclose = ()=>{ if (live.mode !== 'fallback') pollFallback(); };
  } catch(e) { pollFallback(); }

  try {
    if ('BroadcastChannel' in window) {
      const ch = new BroadcastChannel('atlas-ws');
      ch.onmessage = (e)=> onEvent(e.data);
    }
  } catch(e) {}
})();
</script>
