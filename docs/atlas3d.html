<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>atlas.n6 — 3D Reality Map</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#05060e;color:#d8dce8;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;font-size:13px}
canvas{display:block}

#hud{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;gap:10px;padding:8px 14px;background:linear-gradient(180deg,rgba(10,12,26,.96),rgba(10,12,26,.72));border-bottom:1px solid #1d2240;z-index:10;backdrop-filter:blur(6px)}
#hud h1{font-size:14px;font-weight:600;color:#8bc2ff;letter-spacing:-.01em;white-space:nowrap}
#hud h1 .sub{color:#5a617a;font-weight:400;margin-left:6px}
#search{flex:1;max-width:320px;padding:5px 10px;background:#0e1126;border:1px solid #24294a;border-radius:5px;color:#e6e8ef;outline:none}
#search:focus{border-color:#6ee7ff}
.lbtn{padding:4px 10px;border:1px solid #24294a;border-radius:12px;background:transparent;color:#8890a5;cursor:pointer;font-size:12px;transition:.15s}
.lbtn.on{border-color:var(--lc);color:var(--lc);background:rgba(255,255,255,.05)}
.lbtn:hover{background:rgba(255,255,255,.08)}
#stats{margin-left:auto;color:#5a617a;font-size:11px;white-space:nowrap;font-family:"SF Mono",Menlo,monospace}

#info{position:fixed;right:14px;top:54px;width:320px;max-height:calc(100vh - 74px);overflow-y:auto;background:rgba(10,12,26,.95);border:1px solid #2a2f54;border-radius:8px;padding:14px 16px;display:none;z-index:9;line-height:1.55}
#info h2{font-size:14px;margin-bottom:6px;color:#adf;word-break:break-all;font-family:"SF Mono",Menlo,monospace}
#info .tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;margin:2px 3px 2px 0;background:rgba(255,255,255,.06)}
#info .close{position:absolute;top:6px;right:10px;cursor:pointer;color:#666;font-size:18px;line-height:1;padding:2px 6px}
#info .close:hover{color:#fff}
#info table{width:100%;border-collapse:collapse;margin-top:8px;font-size:12px}
#info td{padding:3px 0;border-bottom:1px solid #1d2240;vertical-align:top}
#info td:first-child{color:#5a617a;width:62px;padding-right:8px}
#info .expr{margin-top:8px;padding:8px 10px;background:#0b0e1e;border-left:2px solid #6ee7ff;border-radius:3px;font-family:"SF Mono",Menlo,monospace;font-size:11px;color:#c5cbdc;word-break:break-all;white-space:pre-wrap}

#legend{position:fixed;left:14px;bottom:14px;background:rgba(10,12,26,.92);border:1px solid #24294a;border-radius:8px;padding:10px 14px;z-index:9;font-size:11.5px;line-height:1.7}
#legend .row{display:flex;align-items:center;gap:8px}
#legend .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
#legend .hint{color:#5a617a;font-size:10.5px;margin-top:6px;padding-top:6px;border-top:1px solid #1d2240}

#loading{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#05060e;z-index:100;font-size:15px;color:#5a617a;gap:12px}
#loading .bar{width:240px;height:2px;background:#1d2240;border-radius:2px;overflow:hidden}
#loading .bar > div{height:100%;background:linear-gradient(90deg,#6ee7ff,#8bc2ff);width:0;transition:width .25s}

.tooltip{position:fixed;padding:3px 8px;background:rgba(10,12,26,.95);border:1px solid #2a2f54;border-radius:4px;font-size:11px;font-family:"SF Mono",Menlo,monospace;pointer-events:none;z-index:11;white-space:nowrap;display:none}
</style>
</head>
<body>

<div id="loading">
  <div>atlas.n6 loading…</div>
  <div class="bar"><div id="lbar"></div></div>
  <div id="ltxt" style="font-size:11px;font-family:'SF Mono',Menlo,monospace"></div>
</div>

<div id="hud">
  <h1>atlas.n6 <span class="sub">3D reality map</span></h1>
  <input id="search" type="text" placeholder="노드 검색…" autocomplete="off">
  <button class="lbtn on" data-l="0" style="--lc:#ff6b8a">L0 particles</button>
  <button class="lbtn on" data-l="1" style="--lc:#ffb347">L1 atoms/laws</button>
  <button class="lbtn on" data-l="2" style="--lc:#4ade80">L2 molecules/bio</button>
  <button class="lbtn on" data-l="3" style="--lc:#6ee7ff">L3 domains</button>
  <button class="lbtn on" data-l="4" style="--lc:#c084fc">L4 cosmic</button>
  <button class="lbtn on" id="edgeBtn" style="--lc:#8890a5">edges</button>
  <span id="stats"></span>
</div>

<div id="info">
  <span class="close">×</span>
  <h2 id="iTitle"></h2>
  <div id="iBody"></div>
</div>

<div id="legend">
  <div class="row"><span class="dot" style="background:#ff6b8a"></span>L0 foundations · particles · math</div>
  <div class="row"><span class="dot" style="background:#ffb347"></span>L1 atoms · laws · physics</div>
  <div class="row"><span class="dot" style="background:#4ade80"></span>L2 molecules · bio · consciousness</div>
  <div class="row"><span class="dot" style="background:#6ee7ff"></span>L3 domain applications</div>
  <div class="row"><span class="dot" style="background:#c084fc"></span>L4 cosmic · convergence</div>
  <div class="hint">drag: rotate · scroll: zoom · click: select</div>
</div>

<div class="tooltip" id="tip"></div>

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.175.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.175.0/examples/jsm/"}}
</script>

<script type="module">
import * as THREE from 'three';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';

const LAYER_COLORS = [0xff6b8a, 0xffb347, 0x4ade80, 0x6ee7ff, 0xc084fc];
const LAYER_Y      = [  0,  55, 110, 170, 240];
const LAYER_R      = [ 75,  95, 115, 140, 85];
const DATA_URL     = 'atlas_map_data.json';

const elLoad = document.getElementById('loading');
const elLbar = document.getElementById('lbar');
const elLtxt = document.getElementById('ltxt');
const elInfo = document.getElementById('info');
const elITitle = document.getElementById('iTitle');
const elIBody  = document.getElementById('iBody');
const elStats  = document.getElementById('stats');
const elSearch = document.getElementById('search');
const elTip    = document.getElementById('tip');

let nodes = [];       // {i,id,l,t,d,dom,g,e, pos:Vector3}
let edges = [];       // [a,b]
let layerOn = [true,true,true,true,true];
let edgesOn = true;
let searchTerm = '';
let nodeMesh = null;
let edgeLines = null;
let hovered = -1;
let selected = -1;

// ── scene ──
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x05060e, 0.0022);

const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.5, 2000);
camera.position.set(0, 120, 360);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0x05060e);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 120, 0);
controls.maxDistance = 900;
controls.minDistance = 20;

scene.add(new THREE.AmbientLight(0xffffff, 0.65));
const dir = new THREE.DirectionalLight(0xffffff, 0.55);
dir.position.set(50, 180, 80);
scene.add(dir);

// layer discs (subtle visual anchors)
for (let k = 0; k < 5; k++) {
  const g = new THREE.RingGeometry(LAYER_R[k]*0.82, LAYER_R[k]*1.02, 72);
  const m = new THREE.MeshBasicMaterial({color: LAYER_COLORS[k], transparent:true, opacity:0.035, side:THREE.DoubleSide});
  const ring = new THREE.Mesh(g, m);
  ring.rotation.x = -Math.PI/2;
  ring.position.y = LAYER_Y[k];
  scene.add(ring);
}

// ── load data ──
async function load() {
  const t0 = performance.now();
  elLtxt.textContent = 'fetch…';
  const res = await fetch(DATA_URL, {cache:'no-store'});
  const len = +(res.headers.get('content-length') || 0);
  const reader = res.body.getReader();
  const chunks = []; let got = 0;
  while (true) {
    const {done, value} = await reader.read();
    if (done) break;
    chunks.push(value); got += value.length;
    if (len) {
      const pct = Math.round(got/len*100);
      elLbar.style.width = pct + '%';
      elLtxt.textContent = `${(got/1e6).toFixed(1)}MB / ${(len/1e6).toFixed(1)}MB`;
    }
  }
  const blob = new Blob(chunks);
  const text = await blob.text();
  elLtxt.textContent = 'parse…';
  const data = JSON.parse(text);

  nodes = data.nodes;
  edges = data.edges;

  // positions — spiral within each layer, sorted by degree desc (hubs inside)
  const byLayer = [[],[],[],[],[]];
  for (const n of nodes) byLayer[n.l].push(n);
  for (let k = 0; k < 5; k++) {
    const arr = byLayer[k];
    arr.sort((a,b) => b.d - a.d);
    const N = arr.length;
    const R = LAYER_R[k];
    for (let i = 0; i < N; i++) {
      const n = arr[i];
      const frac = N > 1 ? i/(N-1) : 0;
      const r = R * Math.sqrt(0.04 + 0.96 * frac);
      const theta = i * 2.399963; // golden angle for even spread
      const jitter = 0.6;
      n.pos = new THREE.Vector3(
        Math.cos(theta) * r + (Math.random()-0.5) * jitter,
        LAYER_Y[k] + (Math.random()-0.5) * 4.5,
        Math.sin(theta) * r + (Math.random()-0.5) * jitter
      );
    }
  }

  buildMeshes();
  elLoad.style.display = 'none';
  elStats.textContent = `${nodes.length.toLocaleString()} nodes · ${edges.length.toLocaleString()} edges · ${((performance.now()-t0)/1000).toFixed(1)}s`;
}

function buildMeshes() {
  // ── node instanced mesh ──
  const geo = new THREE.SphereGeometry(1, 10, 8);
  const N = nodes.length;
  const mesh = new THREE.InstancedMesh(geo, new THREE.MeshBasicMaterial(), N);
  mesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);

  const colorArr = new Float32Array(N*3);
  const dummy = new THREE.Object3D();
  const col = new THREE.Color();

  for (let i = 0; i < N; i++) {
    const n = nodes[i];
    const size = 0.8 + Math.log2(n.d + 1) * 0.5;
    dummy.position.copy(n.pos);
    dummy.scale.setScalar(size);
    dummy.updateMatrix();
    mesh.setMatrixAt(i, dummy.matrix);
    col.setHex(LAYER_COLORS[n.l]);
    colorArr[i*3  ] = col.r;
    colorArr[i*3+1] = col.g;
    colorArr[i*3+2] = col.b;
  }
  geo.setAttribute('instanceColor', new THREE.InstancedBufferAttribute(colorArr, 3));

  // shader injection — read instanceColor
  mesh.material = new THREE.ShaderMaterial({
    uniforms: {
      fogColor: {value: new THREE.Color(0x05060e)},
      fogDensity: {value: 0.0022},
      dim: {value: 1.0},
    },
    vertexShader: `
      attribute vec3 instanceColor;
      varying vec3 vColor;
      varying float vFogDepth;
      void main(){
        vColor = instanceColor;
        vec4 mv = modelViewMatrix * instanceMatrix * vec4(position,1.0);
        vFogDepth = -mv.z;
        gl_Position = projectionMatrix * mv;
      }`,
    fragmentShader: `
      varying vec3 vColor;
      varying float vFogDepth;
      uniform vec3 fogColor;
      uniform float fogDensity;
      uniform float dim;
      void main(){
        float fogFactor = 1.0 - exp(-fogDensity * fogDensity * vFogDepth * vFogDepth);
        vec3 c = mix(vColor * dim, fogColor, fogFactor);
        gl_FragColor = vec4(c, 1.0);
      }`
  });

  nodeMesh = mesh;
  scene.add(mesh);

  // ── edge line segments ──
  const E = edges.length;
  const positions = new Float32Array(E * 6);
  const eColors   = new Float32Array(E * 6);
  for (let i = 0; i < E; i++) {
    const [a,b] = edges[i];
    const na = nodes[a], nb = nodes[b];
    positions[i*6  ] = na.pos.x; positions[i*6+1] = na.pos.y; positions[i*6+2] = na.pos.z;
    positions[i*6+3] = nb.pos.x; positions[i*6+4] = nb.pos.y; positions[i*6+5] = nb.pos.z;
    col.setHex(LAYER_COLORS[na.l]);
    eColors[i*6  ]=col.r*0.45; eColors[i*6+1]=col.g*0.45; eColors[i*6+2]=col.b*0.45;
    col.setHex(LAYER_COLORS[nb.l]);
    eColors[i*6+3]=col.r*0.45; eColors[i*6+4]=col.g*0.45; eColors[i*6+5]=col.b*0.45;
  }
  const eg = new THREE.BufferGeometry();
  eg.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  eg.setAttribute('color', new THREE.BufferAttribute(eColors, 3));
  edgeLines = new THREE.LineSegments(eg, new THREE.LineBasicMaterial({vertexColors:true, transparent:true, opacity:0.32}));
  scene.add(edgeLines);
}

// ── picking ──
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let lastMove = 0;

function onMove(e) {
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
  elTip.style.left = (e.clientX + 12) + 'px';
  elTip.style.top  = (e.clientY + 12) + 'px';
  const now = performance.now();
  if (now - lastMove < 40) return;
  lastMove = now;
  pick();
}
function pick() {
  if (!nodeMesh) return;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObject(nodeMesh);
  const idx = (hits.length > 0 && hits[0].instanceId != null) ? hits[0].instanceId : -1;
  if (idx !== hovered) {
    hovered = idx;
    if (idx >= 0) {
      const n = nodes[idx];
      if (layerOn[n.l] && matchesSearch(n)) {
        elTip.textContent = n.id + '  ·  deg ' + n.d;
        elTip.style.display = 'block';
        document.body.style.cursor = 'pointer';
        return;
      }
    }
    elTip.style.display = 'none';
    document.body.style.cursor = '';
  }
}
function onClick() {
  if (hovered < 0) return;
  selectNode(hovered);
}
function selectNode(i) {
  selected = i;
  const n = nodes[i];
  elITitle.textContent = n.id;
  let html = '';
  html += `<div>`;
  html += `<span class="tag" style="color:${'#'+LAYER_COLORS[n.l].toString(16).padStart(6,'0')}">L${n.l}</span>`;
  if (n.dom) html += `<span class="tag">${esc(n.dom)}</span>`;
  if (n.t)   html += `<span class="tag">type: ${esc(n.t)}</span>`;
  if (n.g)   html += `<span class="tag">${esc(n.g)}</span>`;
  html += `</div>`;
  html += `<table>`;
  html += `<tr><td>id</td><td>${esc(n.id)}</td></tr>`;
  html += `<tr><td>layer</td><td>L${n.l}</td></tr>`;
  html += `<tr><td>domain</td><td>${esc(n.dom || '—')}</td></tr>`;
  html += `<tr><td>degree</td><td>${n.d}</td></tr>`;
  html += `</table>`;
  if (n.e) html += `<div class="expr">${esc(n.e)}</div>`;

  // neighbors
  const nbrs = [];
  for (let k = 0; k < edges.length; k++) {
    if (edges[k][0] === i) nbrs.push(edges[k][1]);
    else if (edges[k][1] === i) nbrs.push(edges[k][0]);
    if (nbrs.length > 24) break;
  }
  if (nbrs.length) {
    html += `<div style="margin-top:10px;font-size:11px;color:#5a617a">neighbors</div>`;
    html += `<div style="margin-top:4px">`;
    for (const ni of nbrs) {
      const nn = nodes[ni];
      html += `<a href="#" data-ni="${ni}" style="display:inline-block;margin:2px 4px 2px 0;padding:2px 7px;border:1px solid #2a2f54;border-radius:10px;color:${'#'+LAYER_COLORS[nn.l].toString(16).padStart(6,'0')};font-size:10.5px;text-decoration:none;font-family:'SF Mono',Menlo,monospace">${esc(nn.id)}</a>`;
    }
    html += `</div>`;
  }
  elIBody.innerHTML = html;
  elInfo.style.display = 'block';

  // focus camera
  controls.target.lerp(n.pos, 0.4);
}

function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function matchesSearch(n) {
  if (!searchTerm) return true;
  return n.id.toLowerCase().includes(searchTerm) ||
         (n.dom && n.dom.toLowerCase().includes(searchTerm)) ||
         (n.e && n.e.toLowerCase().includes(searchTerm));
}

// ── filters apply to instance scale (hide = scale 0) ──
function applyFilters() {
  if (!nodeMesh) return;
  const dummy = new THREE.Object3D();
  let shown = 0;
  for (let i = 0; i < nodes.length; i++) {
    const n = nodes[i];
    const visible = layerOn[n.l] && matchesSearch(n);
    if (visible) shown++;
    dummy.position.copy(n.pos);
    const size = visible ? (0.8 + Math.log2(n.d + 1) * 0.5) : 0;
    dummy.scale.setScalar(size);
    dummy.updateMatrix();
    nodeMesh.setMatrixAt(i, dummy.matrix);
  }
  nodeMesh.instanceMatrix.needsUpdate = true;

  // edges: hide if either end hidden
  if (edgeLines) {
    edgeLines.visible = edgesOn;
    if (edgesOn) {
      const pos = edgeLines.geometry.attributes.position.array;
      for (let i = 0; i < edges.length; i++) {
        const [a,b] = edges[i];
        const na = nodes[a], nb = nodes[b];
        const vis = layerOn[na.l] && layerOn[nb.l] && matchesSearch(na) && matchesSearch(nb);
        if (vis) {
          pos[i*6  ] = na.pos.x; pos[i*6+1] = na.pos.y; pos[i*6+2] = na.pos.z;
          pos[i*6+3] = nb.pos.x; pos[i*6+4] = nb.pos.y; pos[i*6+5] = nb.pos.z;
        } else {
          pos[i*6  ] = 0; pos[i*6+1] = 0; pos[i*6+2] = 0;
          pos[i*6+3] = 0; pos[i*6+4] = 0; pos[i*6+5] = 0;
        }
      }
      edgeLines.geometry.attributes.position.needsUpdate = true;
    }
  }

  elStats.textContent = `${shown.toLocaleString()} / ${nodes.length.toLocaleString()} nodes · ${edges.length.toLocaleString()} edges`;
}

// ── UI ──
document.querySelectorAll('.lbtn[data-l]').forEach(btn => {
  btn.addEventListener('click', () => {
    const k = +btn.dataset.l;
    layerOn[k] = !layerOn[k];
    btn.classList.toggle('on', layerOn[k]);
    applyFilters();
  });
});
document.getElementById('edgeBtn').addEventListener('click', (e) => {
  edgesOn = !edgesOn;
  e.currentTarget.classList.toggle('on', edgesOn);
  if (edgeLines) edgeLines.visible = edgesOn;
});
elSearch.addEventListener('input', () => {
  searchTerm = elSearch.value.trim().toLowerCase();
  applyFilters();
});
document.querySelector('#info .close').addEventListener('click', () => {
  elInfo.style.display = 'none';
  selected = -1;
});
elIBody.addEventListener('click', (e) => {
  const a = e.target.closest('[data-ni]');
  if (a) { e.preventDefault(); selectNode(+a.dataset.ni); }
});
renderer.domElement.addEventListener('mousemove', onMove);
renderer.domElement.addEventListener('click', onClick);
addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ── animate ──
function tick() {
  controls.update();
  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}

load().then(() => {
  tick();
}).catch(err => {
  elLoad.innerHTML = '<div style="color:#f87171">load error: ' + esc(err.message) + '</div>';
  console.error(err);
});
</script>
</body>
</html>
