<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>NEXUS-6 Atlas Health</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e0e0e0;font-family:'Courier New',monospace;padding:20px}
h1{color:#00ffaa;font-size:1.4em;margin-bottom:16px}
.nav{margin-bottom:20px}
.nav a{color:#00aaff;text-decoration:none;margin-right:16px;font-size:0.9em}
.nav a:hover{text-decoration:underline}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px}
.kpi{background:#151520;border:1px solid #333;border-radius:8px;padding:14px;text-align:center}
.kpi .val{font-size:1.8em;color:#00ffaa;font-weight:bold}
.kpi .label{font-size:0.75em;color:#888;margin-top:4px}
.section{background:#151520;border:1px solid #333;border-radius:8px;padding:16px;margin-bottom:16px}
.section h2{color:#00aaff;font-size:1em;margin-bottom:12px}
.bar-row{display:flex;align-items:center;margin-bottom:6px}
.bar-row .name{width:140px;font-size:0.8em;color:#aaa;text-align:right;padding-right:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-row .bar{height:18px;background:#00ffaa;border-radius:3px;min-width:2px;transition:width 0.3s}
.bar-row .count{font-size:0.75em;color:#888;padding-left:6px}
.grade-bar{display:flex;height:24px;border-radius:4px;overflow:hidden;margin-bottom:8px}
.grade-bar div{display:flex;align-items:center;justify-content:center;font-size:0.7em;color:#000;font-weight:bold}
.type-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.type-cell{background:#1a1a2a;border-radius:6px;padding:10px;text-align:center}
.type-cell .sym{font-size:1.2em;color:#ffaa00}
.type-cell .cnt{font-size:1.4em;color:#00ffaa;font-weight:bold}
.type-cell .lbl{font-size:0.65em;color:#666}
#status{color:#888;font-size:0.8em;margin-top:8px}
</style>
</head>
<body>
<div class="nav">
  <a href="index.html">3D Reality Map</a>
  <a href="health.html" style="color:#00ffaa">Health Dashboard</a>
</div>
<h1>NEXUS-6 Atlas Health Dashboard</h1>
<div id="status">Loading...</div>

<div class="kpi-grid" id="kpis"></div>

<div class="section">
  <h2>Grade Distribution</h2>
  <div class="grade-bar" id="gradeBar"></div>
  <div id="gradeLegend" style="font-size:0.75em;color:#888"></div>
</div>

<div class="section">
  <h2>Node Types</h2>
  <div class="type-grid" id="typeGrid"></div>
</div>

<div class="section">
  <h2>Top Domains</h2>
  <div id="domainBars"></div>
</div>

<script>
const TYPE_NAMES = {
  '@P':'Proven','@C':'Conjecture','@L':'Law','@F':'Formula',
  '@R':'Relation','@S':'Structure','@X':'Experimental','@?':'Unknown'
};

async function load() {
  try {
    const r = await fetch('atlas_health.json');
    const data = await r.json();
    if (!data.length) {
      document.getElementById('status').textContent = 'No data yet — run: hexa shared/n6/atlas_health_export.hexa >> docs/atlas_health.json';
      return;
    }
    const d = data[data.length - 1];
    document.getElementById('status').textContent = 'Last updated: ' + (d.timestamp || 'unknown');
    renderKPIs(d);
    renderGrades(d.grades || {});
    renderTypes(d.types || {});
    renderDomains(d.domains || {});
  } catch(e) {
    document.getElementById('status').textContent = 'Error: ' + e.message;
  }
}

function renderKPIs(d) {
  const items = [
    ['Nodes', d.nodes],['Text', d.text_nodes],['JSON', d.json_nodes],
    ['Edges', d.edges],['Lines', d.lines],['Hubs', d.hubs],['BT', d.breakthroughs]
  ];
  const el = document.getElementById('kpis');
  el.innerHTML = items.map(([l,v]) =>
    `<div class="kpi"><div class="val">${(v||0).toLocaleString()}</div><div class="label">${l}</div></div>`
  ).join('');
}

function renderGrades(g) {
  const total = (g.exact||0) + (g.close||0) + (g.hypothesis||0);
  if (!total) return;
  const bar = document.getElementById('gradeBar');
  const colors = {exact:'#00ff88',close:'#ffaa00',hypothesis:'#ff4466'};
  bar.innerHTML = ['exact','close','hypothesis'].map(k => {
    const pct = ((g[k]||0)/total*100).toFixed(1);
    return `<div style="width:${pct}%;background:${colors[k]}">${k} ${pct}%</div>`;
  }).join('');
  document.getElementById('gradeLegend').textContent =
    `exact=${g.exact||0} close=${g.close||0} hypothesis=${g.hypothesis||0} total=${total}`;
}

function renderTypes(t) {
  const el = document.getElementById('typeGrid');
  el.innerHTML = Object.keys(TYPE_NAMES).map(k =>
    `<div class="type-cell"><div class="sym">${k}</div><div class="cnt">${(t[k]||0).toLocaleString()}</div><div class="lbl">${TYPE_NAMES[k]}</div></div>`
  ).join('');
}

function renderDomains(domains) {
  const sorted = Object.entries(domains).sort((a,b) => b[1]-a[1]).slice(0, 20);
  if (!sorted.length) return;
  const max = sorted[0][1];
  const el = document.getElementById('domainBars');
  el.innerHTML = sorted.map(([name, count]) => {
    const w = Math.max(2, count/max*100);
    return `<div class="bar-row"><span class="name">${name}</span><div class="bar" style="width:${w}%"></div><span class="count">${count}</span></div>`;
  }).join('');
}

load();
</script>
</body>
</html>
