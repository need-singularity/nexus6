<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const LEVEL_ORDER=['L0_particle','L1_atom','L2_bond','L3_molecule','L4_genetic','L5_material','L5_bio','L6_geology','L6_meteorology','L6_economics','L6_linguistics','L6_music','L6_n6atlas','L6_dse','L7_celestial','L8_galactic','L9_cosmological'];
// ═══ UNFOLD LAYOUTS — map_dimension_unfold.md SSOT ═══
const THREAD_ORDER=['n','sigma','tau','phi','sopfr','J2','mu','n_over_phi','pi','e','phi_g','alpha','dse','misc','none'];
const DOMAIN_ORDER=[]; // dynamic
let LAYOUT_MODE=(location.hash.match(/layout=(\w+)/)||[])[1]||'3d_default';
let TWEEN_T0=0, TWEEN_DUR=800;
const TWEEN_FROM=new Map();
const LEVEL_COLOR={L0_particle:0xef5350,L1_atom:0xff9800,L2_bond:0xffee58,L3_molecule:0x66bb6a,L4_genetic:0x42a5f5,L5_material:0xab47bc,L5_bio:0xec407a,L6_geology:0x8d6e63,L6_meteorology:0x29b6f6,L6_economics:0x9ccc65,L6_linguistics:0xba68c8,L6_music:0xffd54f};
const ORIGIN_COLOR={natural:0x66ff99,engineering:0xffaa55,convention:0xaaaaaa};
const GRADE_COLOR={EXACT:0x4fc3f7,CLOSE:0xffd54f,MISS:0xef5350};

const statusEl=document.getElementById('status');
const tooltipEl=document.getElementById('tooltip');

let scene,camera,renderer,controls,raycaster,mouse;
let nodeMeshes=[]; let edgeLines={parent:null,sibling:null,thread:null};
let DATA=null;

// ═══ CAUSAL BFS STATE ═══
let causalMode=false;
let causalSource=null;       // id of BFS source node
let causalPaths=[];          // [{from,to,depth,strength}]  BFS edge list
let causalVisited=new Set();
let causalAnimT0=0;          // animation start time
const CAUSAL_STEP_MS=320;    // ms per BFS depth step
const CAUSAL_EDGE_COLOR=0xff4466;
const CAUSAL_GLOW_COLOR=0xff6688;
let causalEdgeMesh=null;     // LineSegments for causal path
let causalParticles=null;    // Points mesh for flowing particles
let causalParticleData=[];   // [{pos,dir,speed,edgeIdx,t}]

init();
loadData();

function init(){
  scene=new THREE.Scene();
  scene.background=new THREE.Color(0x07071a);
  scene.fog=new THREE.Fog(0x07071a,200,900);
  camera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,0.1,3000);
  camera.position.set(180,140,260);
  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth,innerHeight);
  renderer.setPixelRatio(devicePixelRatio);
  document.body.appendChild(renderer.domElement);
  controls=new OrbitControls(camera,renderer.domElement);
  controls.enableDamping=true;
  scene.add(new THREE.AmbientLight(0xffffff,0.7));
  const dl=new THREE.DirectionalLight(0xffffff,0.6); dl.position.set(1,2,1); scene.add(dl);
  // axes
  scene.add(new THREE.AxesHelper(80));
  raycaster=new THREE.Raycaster(); mouse=new THREE.Vector2();
  addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
  addEventListener('mousemove',onMove);
  // filter listeners
  document.querySelectorAll('#controls input').forEach(el=>el.addEventListener('change',rebuild));
  animate();
}

// LOCKED LIVE ENDPOINT: reality_map_live.json (n6 merge) → fallback reality_map.json
async function loadData(){
  let src='reality_map_live.json';
  try{
    let r=await fetch(src,{cache:'no-store'});
    if(!r.ok){ src='reality_map.json'; r=await fetch(src,{cache:'no-store'}); }
    if(!r.ok) throw new Error('HTTP '+r.status);
    DATA=await r.json();
    // DOMAIN_ORDER 동적 채움
    const domSet=new Set((DATA.nodes||[]).map(n=>n.domain||n.origin||''));
    DOMAIN_ORDER.length=0;
    [...domSet].sort().forEach(d=>DOMAIN_ORDER.push(d));
    statusEl.style.display='none';
    document.getElementById('stats').style.display='flex';
    document.getElementById('layout-badge').textContent='LAYOUT: '+LAYOUT_MODE;
    rebuild();
  }catch(e){
    statusEl.innerHTML='<b style="color:#ef5350">load failed</b>: '+e.message+'<br><span style="color:#888">reality_map_live.json or reality_map.json next to this html</span>';
  }
}
// 30초 주기 자동 폴링 — 라이브 endpoint (n6_map_live.hexa loop)과 쌍
setInterval(loadData, 30000);

function nodePos(n,idx,total){
  const li=Math.max(0,LEVEL_ORDER.indexOf(n.level));
  const ti=Math.max(0,THREAD_ORDER.indexOf(n.thread));
  const di=Math.max(0,DOMAIN_ORDER.indexOf(n.domain||n.origin||''));
  // jitter via id hash to spread
  let h=0; const s=n.id||('n'+idx); for(let i=0;i<s.length;i++){h=(h*31+s.charCodeAt(i))|0;}
  const j0=((h&255)/255-0.5);
  const j1=(((h>>8)&255)/255-0.5);
  const j2=(((h>>16)&255)/255-0.5);
  if(LAYOUT_MODE==='1d_spine'){
    return [j0*20, (li-5.5)*40 + j1*18, j2*20];
  }
  if(LAYOUT_MODE==='2d_grid'){
    return [
      (ti - THREAD_ORDER.length/2)*35 + j0*10,
      (li - 5.5)*35 + j1*10,
      j2*8
    ];
  }
  if(LAYOUT_MODE==='3d_cube'){
    const dn=Math.max(1,DOMAIN_ORDER.length);
    return [
      (li - 5.5)*30 + j0*10,
      (ti - THREAD_ORDER.length/2)*30 + j1*10,
      (di - dn/2)*18 + j2*10
    ];
  }
  if(LAYOUT_MODE==='hyperroll'){
    const ang=(ti/Math.max(1,THREAD_ORDER.length))*Math.PI*2;
    const r=28 + j2*8;
    return [(li-5.5)*30 + j0*8, Math.sin(ang)*r + j1*6, Math.cos(ang)*r];
  }
  // 3d_default (기존)
  const x=(li-5.5)*28;
  const gradeY={EXACT:60,CLOSE:20,MISS:-20,EMPIRICAL:40,CONVENTION:0}[n.grade]||0;
  const originZ={natural:-60,engineering:60,convention:0,derived:30}[n.origin]||0;
  return [x+j0*22, gradeY+j1*22, originZ+j2*22];
}

function colorFor(n,mode){
  if(mode==='origin') return ORIGIN_COLOR[n.origin]||0xffffff;
  if(mode==='level')  return LEVEL_COLOR[n.level]||0xffffff;
  return GRADE_COLOR[n.grade]||0xffffff;
}

function rebuild(){
  if(!DATA) return;
  // clear causal overlays on rebuild
  clearCausalVisuals();
  causalPaths=[]; causalVisited.clear(); causalSource=null;
  // wipe
  nodeMeshes.forEach(m=>{scene.remove(m);m.geometry.dispose();m.material.dispose();});
  nodeMeshes=[];
  for(const k of Object.keys(edgeLines)){ if(edgeLines[k]){scene.remove(edgeLines[k]);edgeLines[k].geometry.dispose();edgeLines[k].material.dispose();edgeLines[k]=null;} }

  const filt={
    natural:document.getElementById('f-natural').checked,
    engineering:document.getElementById('f-engineering').checked,
    convention:document.getElementById('f-convention').checked,
    EXACT:document.getElementById('g-EXACT').checked,
    CLOSE:document.getElementById('g-CLOSE').checked,
    MISS:document.getElementById('g-MISS').checked,
  };
  const cmode=document.querySelector('input[name=cmode]:checked').value;

  const nodes=DATA.nodes||[];
  const posMap={};
  const visible={};
  let cE=0,cC=0,cM=0;
  nodes.forEach((n,i)=>{
    const p=nodePos(n,i,nodes.length);
    posMap[n.id]=p;
    if(!filt[n.origin]) return;
    if(!filt[n.grade]) return;
    visible[n.id]=true;
    if(n.grade==='EXACT')cE++; else if(n.grade==='CLOSE')cC++; else if(n.grade==='MISS')cM++;
    const geom=new THREE.SphereGeometry(1.6,12,10);
    const mat=new THREE.MeshStandardMaterial({color:colorFor(n,cmode),emissive:colorFor(n,cmode),emissiveIntensity:0.35,roughness:0.5});
    const mesh=new THREE.Mesh(geom,mat);
    const tweenFrom=TWEEN_FROM.get(n.id);
    if(tweenFrom){ mesh.position.copy(tweenFrom); }
    else { mesh.position.set(p[0],p[1],p[2]); }
    mesh.userData=n;
    mesh.userData.targetPos=new THREE.Vector3(p[0],p[1],p[2]);
    scene.add(mesh); nodeMeshes.push(mesh);
  });
  // ═══ GAP MARKERS — 2D/3D grid 모드에서 빈 (Level,Thread) 칸 표시 ═══
  if(LAYOUT_MODE==='2d_grid' || LAYOUT_MODE==='3d_cube'){
    const filled=new Set();
    nodes.forEach(n=>{
      const li=LEVEL_ORDER.indexOf(n.level);
      const ti=THREAD_ORDER.indexOf(n.thread);
      if(li>=0 && ti>=0) filled.add(li+'|'+ti);
    });
    for(let li=0; li<LEVEL_ORDER.length; li++){
      for(let ti=0; ti<THREAD_ORDER.length; ti++){
        if(filled.has(li+'|'+ti)) continue;
        const gx=LAYOUT_MODE==='2d_grid'?(ti - THREAD_ORDER.length/2)*35:(li - 5.5)*30;
        const gy=LAYOUT_MODE==='2d_grid'?(li - 5.5)*35:(ti - THREAD_ORDER.length/2)*30;
        const gz=0;
        const gg=new THREE.RingGeometry(1.8,2.4,12);
        const gm=new THREE.MeshBasicMaterial({color:0x443355,transparent:true,opacity:0.35,side:THREE.DoubleSide});
        const gh=new THREE.Mesh(gg,gm);
        gh.position.set(gx,gy,gz);
        gh.rotation.x=Math.PI/2;
        gh.userData={id:'GAP-L'+li+'-T'+ti,claim:'미탐색 영역',level:LEVEL_ORDER[li]||'?',thread:THREAD_ORDER[ti]||'?',grade:'GAP'};
        scene.add(gh); nodeMeshes.push(gh);
      }
    }
  }

  // edges
  function buildEdges(list,color,key,enabled){
    if(!enabled||!list) return;
    const pts=[];
    list.forEach(e=>{
      const a=e.from||e[0]||e.parent||e.src||e.source;
      const b=e.to  ||e[1]||e.child ||e.dst||e.target;
      if(!a||!b) return;
      if(!visible[a]||!visible[b]) return;
      const pa=posMap[a],pb=posMap[b]; if(!pa||!pb) return;
      pts.push(pa[0],pa[1],pa[2],pb[0],pb[1],pb[2]);
    });
    if(!pts.length) return;
    const g=new THREE.BufferGeometry();
    g.setAttribute('position',new THREE.Float32BufferAttribute(pts,3));
    const m=new THREE.LineBasicMaterial({color,transparent:true,opacity:0.45});
    const l=new THREE.LineSegments(g,m);
    scene.add(l); edgeLines[key]=l;
  }
  buildEdges(DATA.parent_edges,0xffffff,'parent',document.getElementById('e-parent').checked);
  buildEdges(DATA.sibling_edges,0x888888,'sibling',document.getElementById('e-sibling').checked);
  buildEdges(DATA.thread_edges,0x4fc3f7,'thread',document.getElementById('e-thread').checked);

  const total=cE+cC+cM;
  document.getElementById('s-total').textContent=total;
  document.getElementById('s-exact').textContent=cE;
  document.getElementById('s-close').textContent=cC;
  document.getElementById('s-miss').textContent=cM;
  document.getElementById('s-pct').textContent=total?((cE/total)*100).toFixed(1):'0';
  document.getElementById('s-ver').textContent=(DATA._meta&&DATA._meta.version)||DATA.version||'?';
}

function onMove(ev){
  mouse.x=(ev.clientX/innerWidth)*2-1;
  mouse.y=-(ev.clientY/innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObjects(nodeMeshes);
  if(hits.length){
    const n=hits[0].object.userData;
    tooltipEl.style.display='block';
    tooltipEl.style.left=(ev.clientX+14)+'px';
    tooltipEl.style.top=(ev.clientY+14)+'px';
    tooltipEl.innerHTML='<b>'+(n.id||'')+'</b><span class="grade-tag grade-'+n.grade+'">'+n.grade+'</span><br>'+
      '<span style="color:#aaa">'+(n.level||'')+' · '+(n.origin||'')+'</span><br>'+
      (n.claim||'')+'<br>'+
      '<span style="color:#888">measured:</span> '+(n.measured!==undefined?n.measured:'?')+' '+(n.unit||'')+'<br>'+
      '<span style="color:#888">n6:</span> '+(n.n6_expr||'?')+' = '+(n.n6_value!==undefined?n.n6_value:'?')+'<br>'+
      (n.cause?('<span style="color:#888">cause:</span> '+n.cause):'');
  } else {
    tooltipEl.style.display='none';
  }
}

function animate(){
  requestAnimationFrame(animate);
  // Unfold tween
  if(TWEEN_FROM.size>0){
    const t=Math.min(1,(performance.now()-TWEEN_T0)/TWEEN_DUR);
    const ease=t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
    nodeMeshes.forEach(m=>{
      const from=TWEEN_FROM.get(m.userData.id);
      const to=m.userData.targetPos;
      if(!from||!to) return;
      m.position.set(
        from.x+(to.x-from.x)*ease,
        from.y+(to.y-from.y)*ease,
        from.z+(to.z-from.z)*ease
      );
    });
    if(t>=1) TWEEN_FROM.clear();
  }
  // Causal BFS animation
  updateCausalAnim();

  controls.update();
  renderer.render(scene,camera);
}

// ═══ CAUSAL BFS ENGINE ═══
function buildAdjacency(){
  // Build adjacency from all edge lists, with causal weight
  const adj={};  // id -> [{to, strength}]
  function addEdge(a,b,strength){
    if(!adj[a]) adj[a]=[];
    if(!adj[b]) adj[b]=[];
    adj[a].push({to:b,strength});
    adj[b].push({to:a,strength});
  }
  const causalFields=['STRUCTURAL','EMPIRICAL','CAUSAL'];
  function edgeStrength(a,b){
    // Higher if both nodes have causal fields
    const na=(DATA.nodes||[]).find(n=>n.id===a);
    const nb=(DATA.nodes||[]).find(n=>n.id===b);
    let s=0.3;
    if(na&&nb){
      if(causalFields.includes(na.causal)) s+=0.25;
      if(causalFields.includes(nb.causal)) s+=0.25;
      if(na.grade==='EXACT'&&nb.grade==='EXACT') s+=0.2;
    }
    return Math.min(s,1.0);
  }
  (DATA.parent_edges||[]).forEach(e=>{
    const a=e.from||e[0]||e.parent||e.src||e.source;
    const b=e.to  ||e[1]||e.child ||e.dst||e.target;
    if(a&&b) addEdge(a,b,edgeStrength(a,b));
  });
  (DATA.sibling_edges||[]).forEach(e=>{
    const a=e.from||e[0]||e.src||e.source;
    const b=e.to  ||e[1]||e.dst||e.target;
    if(a&&b) addEdge(a,b,edgeStrength(a,b)*0.7);
  });
  (DATA.thread_edges||[]).forEach(e=>{
    const a=e.from||e[0]||e.src||e.source;
    const b=e.to  ||e[1]||e.dst||e.target;
    if(a&&b) addEdge(a,b,edgeStrength(a,b)*0.5);
  });
  return adj;
}

// node id -> posMap entry (from rebuild)
function getPosMap(){
  const pm={};
  if(!DATA) return pm;
  (DATA.nodes||[]).forEach((n,i)=>{ pm[n.id]=nodePos(n,i,(DATA.nodes||[]).length); });
  return pm;
}

function runCausalBFS(sourceId){
  const adj=buildAdjacency();
  causalPaths=[];
  causalVisited=new Set();
  causalVisited.add(sourceId);
  let frontier=[sourceId];
  let depth=0;
  while(frontier.length>0 && depth<12){
    const next=[];
    for(const cur of frontier){
      const neighbors=adj[cur]||[];
      for(const {to,strength} of neighbors){
        if(causalVisited.has(to)) continue;
        causalVisited.add(to);
        causalPaths.push({from:cur,to,depth:depth+1,strength});
        next.push(to);
      }
    }
    frontier=next;
    depth++;
  }
  causalAnimT0=performance.now();
}

function clearCausalVisuals(){
  if(causalEdgeMesh){ scene.remove(causalEdgeMesh); causalEdgeMesh.geometry.dispose(); causalEdgeMesh.material.dispose(); causalEdgeMesh=null; }
  if(causalParticles){ scene.remove(causalParticles); causalParticles.geometry.dispose(); causalParticles.material.dispose(); causalParticles=null; }
  causalParticleData=[];
  // restore node colors
  nodeMeshes.forEach(m=>{
    if(m.userData&&m.userData._causalHL){
      m.material.emissiveIntensity=0.35;
      m.material.emissive.setHex(colorFor(m.userData,document.querySelector('input[name=cmode]:checked').value));
      m.userData._causalHL=false;
    }
  });
}

function buildCausalVisuals(){
  clearCausalVisuals();
  if(!causalPaths.length) return;
  const pm=getPosMap();
  const maxDepth=causalPaths.reduce((m,e)=>Math.max(m,e.depth),1);

  // Build thick edge segments with colors based on strength
  const positions=[];
  const colors=[];
  const edgeEndpoints=[]; // for particles
  causalPaths.forEach(e=>{
    const pa=pm[e.from], pb=pm[e.to];
    if(!pa||!pb) return;
    positions.push(pa[0],pa[1],pa[2], pb[0],pb[1],pb[2]);
    // Color: red-hot for strong, dim for weak
    const r=0.6+0.4*e.strength;
    const g=0.15+0.15*(1-e.strength);
    const b=0.2+0.2*(1-e.strength);
    colors.push(r,g,b, r,g,b);
    edgeEndpoints.push({a:new THREE.Vector3(pa[0],pa[1],pa[2]), b:new THREE.Vector3(pb[0],pb[1],pb[2]), depth:e.depth, strength:e.strength});
  });

  if(!positions.length) return;

  const geom=new THREE.BufferGeometry();
  geom.setAttribute('position',new THREE.Float32BufferAttribute(positions,3));
  geom.setAttribute('color',new THREE.Float32BufferAttribute(colors,3));
  const mat=new THREE.LineBasicMaterial({vertexColors:true,transparent:true,opacity:0.0,linewidth:1});
  causalEdgeMesh=new THREE.LineSegments(geom,mat);
  scene.add(causalEdgeMesh);

  // Particle system — flowing dots along edges
  const PARTICLES_PER_EDGE=3;
  const pCount=edgeEndpoints.length*PARTICLES_PER_EDGE;
  const pPos=new Float32Array(pCount*3);
  const pCol=new Float32Array(pCount*3);
  const pSiz=new Float32Array(pCount);
  causalParticleData=[];
  let pi=0;
  edgeEndpoints.forEach((ep,ei)=>{
    for(let k=0;k<PARTICLES_PER_EDGE;k++){
      const t0=k/PARTICLES_PER_EDGE;
      const speed=0.4+0.6*ep.strength;
      causalParticleData.push({a:ep.a,b:ep.b,t:t0,speed,depth:ep.depth,strength:ep.strength,idx:pi});
      pPos[pi*3]=ep.a.x; pPos[pi*3+1]=ep.a.y; pPos[pi*3+2]=ep.a.z;
      pCol[pi*3]=1.0; pCol[pi*3+1]=0.35; pCol[pi*3+2]=0.4;
      pSiz[pi]=2.5+2.5*ep.strength;
      pi++;
    }
  });
  const pGeom=new THREE.BufferGeometry();
  pGeom.setAttribute('position',new THREE.Float32BufferAttribute(pPos,3));
  pGeom.setAttribute('color',new THREE.Float32BufferAttribute(pCol,3));
  pGeom.setAttribute('size',new THREE.Float32BufferAttribute(pSiz,1));
  const pMat=new THREE.PointsMaterial({size:3.5,vertexColors:true,transparent:true,opacity:0.0,sizeAttenuation:true,blending:THREE.AdditiveBlending,depthWrite:false});
  causalParticles=new THREE.Points(pGeom,pMat);
  scene.add(causalParticles);
}

function updateCausalAnim(){
  if(!causalMode||!causalPaths.length) return;
  const elapsed=performance.now()-causalAnimT0;
  const maxDepth=causalPaths.reduce((m,e)=>Math.max(m,e.depth),1);
  const revealedDepth=elapsed/CAUSAL_STEP_MS;

  // Fade in edges by depth
  if(causalEdgeMesh){
    const posArr=causalEdgeMesh.geometry.attributes.position.array;
    const colArr=causalEdgeMesh.geometry.attributes.color.array;
    // We need to track which segments are revealed
    let si=0;
    const pm=getPosMap();
    causalPaths.forEach((e,i)=>{
      const pa=pm[e.from], pb=pm[e.to];
      if(!pa||!pb){ si++; return; }
      const depthFade=Math.max(0,Math.min(1,(revealedDepth-e.depth+1)));
      // Pulse effect
      const pulse=0.7+0.3*Math.sin(elapsed*0.004+e.depth);
      const alpha=depthFade*pulse;
      const r=(0.6+0.4*e.strength)*alpha;
      const g=(0.15+0.15*(1-e.strength))*alpha;
      const b=(0.2+0.2*(1-e.strength))*alpha;
      colArr[si*6]=r; colArr[si*6+1]=g; colArr[si*6+2]=b;
      colArr[si*6+3]=r; colArr[si*6+4]=g; colArr[si*6+5]=b;
      si++;
    });
    causalEdgeMesh.geometry.attributes.color.needsUpdate=true;
    causalEdgeMesh.material.opacity=1.0;
  }

  // Animate particles flowing along edges
  if(causalParticles&&causalParticleData.length){
    const posArr=causalParticles.geometry.attributes.position.array;
    const colArr=causalParticles.geometry.attributes.color.array;
    const dt=elapsed*0.001;
    causalParticleData.forEach(p=>{
      const depthFade=Math.max(0,Math.min(1,(revealedDepth-p.depth+1)));
      if(depthFade<=0){
        posArr[p.idx*3]=p.a.x; posArr[p.idx*3+1]=p.a.y; posArr[p.idx*3+2]=p.a.z;
        colArr[p.idx*3]=0; colArr[p.idx*3+1]=0; colArr[p.idx*3+2]=0;
        return;
      }
      // Parametric position along edge, cycling
      const rawT=(p.t+dt*p.speed)%1.0;
      const x=p.a.x+(p.b.x-p.a.x)*rawT;
      const y=p.a.y+(p.b.y-p.a.y)*rawT;
      const z=p.a.z+(p.b.z-p.a.z)*rawT;
      posArr[p.idx*3]=x; posArr[p.idx*3+1]=y; posArr[p.idx*3+2]=z;
      const bright=depthFade*(0.6+0.4*Math.sin(dt*3+p.idx));
      colArr[p.idx*3]=1.0*bright; colArr[p.idx*3+1]=0.3*bright; colArr[p.idx*3+2]=0.4*bright;
    });
    causalParticles.geometry.attributes.position.needsUpdate=true;
    causalParticles.geometry.attributes.color.needsUpdate=true;
    causalParticles.material.opacity=0.85;
  }

  // Highlight BFS-visited nodes with glow by depth
  const nodeById={};
  nodeMeshes.forEach(m=>{ if(m.userData&&m.userData.id) nodeById[m.userData.id]=m; });
  // Source node: bright white glow
  if(causalSource&&nodeById[causalSource]){
    const src=nodeById[causalSource];
    src.material.emissive.setHex(0xffffff);
    src.material.emissiveIntensity=0.8+0.2*Math.sin(elapsed*0.005);
    src.userData._causalHL=true;
  }
  causalPaths.forEach(e=>{
    const depthFade=Math.max(0,Math.min(1,(revealedDepth-e.depth+1)));
    if(depthFade<=0) return;
    const m=nodeById[e.to];
    if(!m) return;
    const hue=e.depth/maxDepth;
    // Red -> orange -> yellow gradient by depth
    const r=1.0;
    const g=Math.min(1,hue*1.5);
    const b=0.1;
    m.material.emissive.setRGB(r*depthFade,g*depthFade,b*depthFade);
    m.material.emissiveIntensity=0.5+0.3*depthFade;
    m.userData._causalHL=true;
  });
}

// Click handler for BFS start
addEventListener('click',ev=>{
  if(!causalMode||!DATA) return;
  const clickMouse=new THREE.Vector2((ev.clientX/innerWidth)*2-1,-(ev.clientY/innerHeight)*2+1);
  const rc=new THREE.Raycaster();
  rc.setFromCamera(clickMouse,camera);
  const hits=rc.intersectObjects(nodeMeshes);
  if(!hits.length) return;
  const n=hits[0].object.userData;
  if(!n||!n.id||n.grade==='GAP') return;
  clearCausalVisuals();
  causalSource=n.id;
  runCausalBFS(n.id);
  buildCausalVisuals();
});

// ═══ LAYOUT SWITCH ═══
function setLayout(mode){
  LAYOUT_MODE=mode;
  location.hash='layout='+mode;
  TWEEN_FROM.clear();
  nodeMeshes.forEach(m=>{if(m.userData&&m.userData.id) TWEEN_FROM.set(m.userData.id, m.position.clone());});
  TWEEN_T0=performance.now();
  const badge=document.getElementById('layout-badge');
  if(badge) badge.textContent='LAYOUT: '+mode;
  rebuild();
}
document.querySelectorAll('button[data-layout]').forEach(b=>{
  b.addEventListener('click',()=>setLayout(b.dataset.layout));
});
addEventListener('keydown',e=>{
  const map={'1':'3d_default','2':'1d_spine','3':'2d_grid','4':'3d_cube','5':'hyperroll'};
  if(map[e.key]) setLayout(map[e.key]);
  if(e.key==='c'||e.key==='C'){
    causalMode=!causalMode;
    const badge=document.getElementById('causal-badge');
    badge.style.display=causalMode?'block':'none';
    if(!causalMode){
      clearCausalVisuals();
      causalSource=null;
      causalPaths=[];
      causalVisited.clear();
    }
  }
});
