<div>atlas 3D map → <a href="atlas3d.html">atlas3d.html</a></div>
<script>
// ATLAS-P3-1 — WebSocket live probe. Redirects to atlas3d.html immediately;
// before redirect, opportunistically connect ws://127.0.0.1:8765 and forward
// events via BroadcastChannel('atlas-ws') for any already-open atlas3d.html tabs.
(function(){
  try {
    var WS_URL = 'ws://127.0.0.1:8765';
    var chan = ('BroadcastChannel' in window) ? new BroadcastChannel('atlas-ws') : null;
    var ws = new WebSocket(WS_URL);
    var fallback = setTimeout(function(){ try{ws.close();}catch(e){} }, 1800);
    ws.onopen = function(){ clearTimeout(fallback); };
    ws.onmessage = function(ev){
      try {
        var msg = JSON.parse(ev.data);
        if (chan) chan.postMessage(msg);
      } catch(e) {}
    };
  } catch(e) { /* fall through to redirect */ }
  location.replace('atlas3d.html');
})();
</script>
</body>
