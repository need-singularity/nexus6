{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.175.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.175.0/examples/jsm/"}}

<script type="module">
import * as THREE from 'three';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';

// ── Colors per layer ──
const LAYER_COLORS = [0xff6666, 0xffaa44, 0x44ff88, 0x44bbff, 0xcc66ff];
const LAYER_Y = [0, 40, 80, 130, 190];  // Y heights — wider gaps for visibility
const LAYER_RADIUS = [55, 75, 100, 120, 70]; // L6 tightened from 180→120

let mapData = null;
let nodeMap = {};        // id → {node, mesh_index, pos}
let layerVisible = [true, true, true, true, true];
let nodeMeshes = null;   // InstancedMesh
let edgeLines = null;
let hoveredIdx = -1;
let selectedId = null;

// ── Scene setup ──
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x07071a, 0.002);

const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.5, 1200);
camera.position.set(0, 100, 280);

const renderer = new THREE.WebGLRenderer({antialias: true, alpha: false});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x07071a);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 60, 0);
controls.maxDistance = 600;

// ── Lights ──
scene.add(new THREE.AmbientLight(0x334466, 1.2));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
dirLight.position.set(50, 120, 80);
scene.add(dirLight);

// ── Raycaster ──
const raycaster = new THREE.Raycaster();
raycaster.params.Points = {threshold: 1.5};
const mouse = new THREE.Vector2();

// ── Parse atlas.n6 (sole data source) ──
const DOMAIN_TO_LAYER = {
  // L0: particles/constants/foundations
  foundation: 0, sub_quark: 0, quark: 0, particle: 0, nuclear: 0,
  number_theory: 0, algebra: 0, topology: 0, geometry: 0, meta: 0, mathematics: 0,
  // L1: atoms/bonds/laws
  atom: 1, bond: 1, physics: 1, architecture: 1, chemistry: 1,
  // L2: molecules/genetics/materials
  molecule: 2, genetic: 2, bio: 2, material: 2, consciousness: 2, biology: 2,
  // L3: domain applications
  geology: 3, meteorology: 3, economics: 3, linguistics: 3, music: 3,
  oceanography: 3, electrical: 3, crossing: 3, dse: 3,
  n6atlas: 3, discovery: 3, bt: 3,
  // L4: celestial/cosmological
  celestial: 4, galactic: 4, cosmological: 4, multiversal: 4, convergence: 4, cosmology: 4
};
const TYPE_LABEL = {P:'primitive',C:'constant',L:'law',F:'formula',R:'relation',S:'symmetry',X:'crossing','?':'unknown'};

function parseAtlasN6(text) {
  const nodes = [];
  const edges = [];
  const nodeIds = new Set();
  let cur = null;

  for (const raw of text.split('\n')) {
    const line = raw.trimEnd();
    if (!line || line.startsWith('#') && !cur) {
      // section comment or blank — skip
      if (line.startsWith('# ══') || line.startsWith('# ──')) cur = null;
      continue;
    }

    // New node: @T id = expr :: domain [grade]
    const nm = line.match(/^@(\S)\s+(\S+)\s*(?:=\s*(.+?))?\s*::\s*(\S+)\s*(?:\[([^\]]+)\])?/);
    if (nm) {
      const [, type, id, expr, domain, gradeRaw] = nm;
      const grade = gradeRaw && gradeRaw.includes('*') ? 'EXACT'
                  : gradeRaw && gradeRaw.includes('!') ? 'EXACT'
                  : gradeRaw && gradeRaw.includes('?') ? 'CONJECTURE'
                  : gradeRaw && parseInt(gradeRaw) >= 8 ? 'CLOSE' : 'EMPIRICAL';
      cur = {
        id, label: id, layer: DOMAIN_TO_LAYER[domain] ?? 3,
        type: TYPE_LABEL[type] || type, level: domain,
        description: expr || '', grade, n6_expr: expr || '',
        _src: 'atlas.n6'
      };
      nodes.push(cur);
      nodeIds.add(id);
      continue;
    }

    if (!cur) continue;

    // Description string
    const desc = line.match(/^\s+"(.+)"/);
    if (desc) { cur.description = desc[1]; continue; }

    // Dependency edges: <- id1, id2
    const dep = line.match(/^\s+<-\s+(.+)/);
    if (dep) {
      dep[1].split(',').map(s => s.trim()).filter(Boolean).forEach(src => {
        edges.push({from: src, to: cur.id, type: 'depends'});
      });
      continue;
    }

    // Derives: -> id1, id2
    const der = line.match(/^\s+->\s+(.+)/);
    if (der) {
      der[1].split(',').map(s => s.trim()).filter(Boolean).forEach(tgt => {
        edges.push({from: cur.id, to: tgt, type: 'derives'});
      });
      continue;
    }

    // Converges: ~> expr
    const conv = line.match(/^\s+~>\s+(.+)/);
    if (conv) {
      // convergence annotation — attach to description
      cur.description += ' | ' + conv[1];
      continue;
    }

    // Application: => text
    const app = line.match(/^\s+=>\s+"?(.+)"?/);
    if (app && !cur._app) { cur._app = app[1]; continue; }

    // Equivalence: == expr (check for id references)
    const eq = line.match(/^\s+==\s+(.+)/);
    if (eq) {
      // try to extract id references
      eq[1].split(/[+\-*/=\s,()]+/).filter(s => /^[a-z_]\w+$/.test(s)).forEach(ref => {
        edges.push({from: ref, to: cur.id, type: 'equivalent'});
      });
    }
  }

  // Filter edges to only existing node ids
  const validEdges = edges.filter(e => nodeIds.has(e.from) && nodeIds.has(e.to) && e.from !== e.to);
  return {nodes, edges: validEdges};
}

// ── Auto-bridge: connect adjacent layers via id-prefix matching ──
function autoBridge(nodes, edges) {
  const edgeSet = new Set(edges.map(e => e.from + '>' + e.to));
  const byLayer = [[], [], [], [], []];
  nodes.forEach(n => byLayer[n.layer].push(n));

  // Helper: add a bridge edge if it doesn't already exist
  function addBridge(a, b) {
    const key = a.id + '>' + b.id;
    const keyR = b.id + '>' + a.id;
    if (edgeSet.has(key) || edgeSet.has(keyR)) return false;
    edges.push({from: a.id, to: b.id, type: 'bridge'});
    edgeSet.add(key);
    return true;
  }

  // Helper: parse original level number from node ID (e.g. "L5" from "L5-bio-xxx")
  function parseLevel(id) {
    const m = id.match(/^L(\d+)/);
    return m ? parseInt(m[1]) : -1;
  }

  // Helper: extract all keyword segments from a node ID (skip the level prefix)
  // e.g. "L5-bio-carbon-bond" -> ["bio", "carbon", "bond"]
  // e.g. "L6-geo-carbon-cycle" -> ["geo", "carbon", "cycle"]
  function extractSegments(id) {
    const parts = id.split('-');
    return parts[0].match(/^L\d+/) ? parts.slice(1) : parts;
  }

  const pairs = [[0,1],[1,2],[2,3],[3,4]];
  const bridgeCounts = {}; // "la-lb" -> count

  // ── Strategy 1: Original prefix-based matching (within adjacent display layers) ──
  for (const [la, lb] of pairs) {
    const nodesA = byLayer[la], nodesB = byLayer[lb];
    if (!nodesA.length || !nodesB.length) continue;

    const pairKey = la + '-' + lb;
    if (!bridgeCounts[pairKey]) bridgeCounts[pairKey] = 0;

    const prefixMap = new Map();
    const smaller = nodesA.length < nodesB.length ? nodesA : nodesB;
    const larger = nodesA.length < nodesB.length ? nodesB : nodesA;

    smaller.forEach(n => {
      const parts = n.id.split('-');
      for (let len = 2; len <= Math.min(3, parts.length); len++) {
        const pfx = parts.slice(0, len).join('-');
        if (!prefixMap.has(pfx)) prefixMap.set(pfx, []);
        prefixMap.get(pfx).push(n);
      }
    });

    larger.forEach(n => {
      const parts = n.id.split('-');
      for (let len = Math.min(3, parts.length); len >= 2; len--) {
        const pfx = parts.slice(0, len).join('-');
        const matches = prefixMap.get(pfx);
        if (matches && matches.length) {
          const m = matches[0];
          if (addBridge(m, n)) bridgeCounts[pairKey]++;
          break;
        }
      }
    });
  }

  // ── Strategy 2: Level-adjacency bridging ──
  // Group nodes by their ORIGINAL level number (L0, L1, ..., L7+)
  const byLevel = new Map(); // level number -> [node]
  nodes.forEach(n => {
    const lv = parseLevel(n.id);
    if (lv < 0) return;
    if (!byLevel.has(lv)) byLevel.set(lv, []);
    byLevel.get(lv).push(n);
  });

  // Find adjacent original-level pairs that span different display layers
  const allLevels = Array.from(byLevel.keys()).sort((a, b) => a - b);
  for (let i = 0; i < allLevels.length - 1; i++) {
    const lvA = allLevels[i], lvB = allLevels[i + 1];
    const levelNodesA = byLevel.get(lvA), levelNodesB = byLevel.get(lvB);
    if (!levelNodesA.length || !levelNodesB.length) continue;

    // Only interesting if they are in different display layers
    const dispA = levelNodesA[0].layer, dispB = levelNodesB[0].layer;
    if (dispA === dispB) continue;

    const pairKey = Math.min(dispA, dispB) + '-' + Math.max(dispA, dispB);
    if (!bridgeCounts[pairKey]) bridgeCounts[pairKey] = 0;

    // Connect nodes from lvA to lvB: use keyword overlap for relevance
    const segIndexB = new Map(); // keyword -> [node]
    levelNodesB.forEach(n => {
      extractSegments(n.id).forEach(seg => {
        if (seg.length < 3) return; // skip very short segments
        if (!segIndexB.has(seg)) segIndexB.set(seg, []);
        segIndexB.get(seg).push(n);
      });
    });

    // First pass: match by shared keyword segments
    let added = 0;
    for (const nA of levelNodesA) {
      if (added >= 200) break;
      const segsA = extractSegments(nA.id);
      for (const seg of segsA) {
        if (seg.length < 3) continue;
        const matches = segIndexB.get(seg);
        if (matches && matches.length) {
          for (let mi = 0; mi < Math.min(2, matches.length); mi++) {
            if (addBridge(nA, matches[mi])) { added++; bridgeCounts[pairKey]++; }
          }
          break;
        }
      }
    }

    // Second pass: round-robin to ensure coverage between level-adjacent pairs
    const targetMin = 30;
    if (added < targetMin) {
      for (let j = 0; j < levelNodesA.length && added < targetMin; j++) {
        const bIdx = j % levelNodesB.length;
        if (addBridge(levelNodesA[j], levelNodesB[bIdx])) { added++; bridgeCounts[pairKey]++; }
      }
    }
  }

  // ── Strategy 3: Domain-keyword thread matching across layers ──
  // Index every keyword segment (beyond the level prefix) to find cross-layer keyword overlap
  const keywordMap = new Map(); // keyword -> layer -> [nodes]
  nodes.forEach(n => {
    const segs = extractSegments(n.id);
    segs.forEach(seg => {
      if (seg.length < 3) return; // skip trivial segments
      if (!keywordMap.has(seg)) keywordMap.set(seg, new Map());
      const lm = keywordMap.get(seg);
      if (!lm.has(n.layer)) lm.set(n.layer, []);
      lm.get(n.layer).push(n);
    });
  });

  for (const [keyword, layerMap] of keywordMap) {
    for (const [la, lb] of pairs) {
      const aNodes = layerMap.get(la), bNodes = layerMap.get(lb);
      if (!aNodes || !bNodes) continue;
      const pairKey = la + '-' + lb;
      if (!bridgeCounts[pairKey]) bridgeCounts[pairKey] = 0;
      // Connect up to 5 pairs per keyword per layer-pair
      const limit = Math.min(5, aNodes.length, bNodes.length);
      for (let i = 0; i < limit; i++) {
        const a = aNodes[i % aNodes.length], b = bNodes[i % bNodes.length];
        if (addBridge(a, b)) bridgeCounts[pairKey]++;
      }
    }
  }

  // ── Strategy 4: Guarantee minimum 100 bridges per adjacent layer pair ──
  for (const [la, lb] of pairs) {
    const pairKey = la + '-' + lb;
    const current = bridgeCounts[pairKey] || 0;
    if (current >= 100) continue;

    const nodesA = byLayer[la], nodesB = byLayer[lb];
    if (!nodesA.length || !nodesB.length) continue;

    let added = current;
    // Distribute bridges evenly using stride through both arrays
    const stepA = Math.max(1, (nodesA.length / (100 - added + 1)) | 0);
    const stepB = Math.max(1, (nodesB.length / (100 - added + 1)) | 0);
    let ai = 0, bi = 0, attempts = 0;
    while (added < 100 && attempts < nodesA.length * 3) {
      if (addBridge(nodesA[ai % nodesA.length], nodesB[bi % nodesB.length])) added++;
      ai += stepA;
      bi += stepB;
      attempts++;
    }
    bridgeCounts[pairKey] = added;
  }
}

// ── Load data ──
async function loadData() {
  const resp = await fetch('_mirror_atlas.n6');
  const text = await resp.text();
  const atlas = parseAtlasN6(text);
  mapData = {nodes: atlas.nodes, edges: atlas.edges};
  autoBridge(mapData.nodes, mapData.edges);
  buildScene();
  document.getElementById('loading').style.display = 'none';
  updateStats();
}

function goldenAngle(i, total, radius) {
  const golden = Math.PI * (3 - Math.sqrt(5));
  const r = radius * Math.sqrt(i / total);
  const theta = golden * i;
  return [r * Math.cos(theta), r * Math.sin(theta)];
}

function buildScene() {
  const nodes = mapData.nodes;
  const edges = mapData.edges;

  // ── Assign positions ──
  const layerIndices = [0, 0, 0, 0, 0];
  const layerTotals = [0, 0, 0, 0, 0];
  nodes.forEach(n => layerTotals[n.layer]++);

  nodes.forEach((n, i) => {
    const L = n.layer;
    const li = layerIndices[L]++;
    const [x, z] = goldenAngle(li, layerTotals[L], LAYER_RADIUS[L]);
    const y = LAYER_Y[L] + (Math.random() - 0.5) * 6;
    n._pos = new THREE.Vector3(x, y, z);
    n._idx = i;
    nodeMap[n.id] = n;
  });

  // ── Instanced spheres ──
  const geo = new THREE.SphereGeometry(0.6, 8, 6);
  const mat = new THREE.MeshPhongMaterial({});
  nodeMeshes = new THREE.InstancedMesh(geo, mat, nodes.length);
  nodeMeshes.instanceMatrix.setUsage(THREE.DynamicDrawUsage);

  const colorAttr = new THREE.InstancedBufferAttribute(new Float32Array(nodes.length * 3), 3);
  nodeMeshes.instanceColor = colorAttr;

  const dummy = new THREE.Object3D();
  const tmpColor = new THREE.Color();

  nodes.forEach((n, i) => {
    dummy.position.copy(n._pos);
    // size by grade + type
    let s = 0.6;
    if (n.grade === 'EXACT') s = 1.0;
    else if (n.grade === 'CLOSE') s = 0.8;
    else if (n.grade === 'EMPIRICAL') s = 0.7;
    else if (n.grade === 'CONJECTURE') s = 0.5;
    if (n.type === 'convention') s *= 0.7;
    dummy.scale.setScalar(s);
    dummy.updateMatrix();
    nodeMeshes.setMatrixAt(i, dummy.matrix);

    tmpColor.setHex(LAYER_COLORS[n.layer]);
    colorAttr.setXYZ(i, tmpColor.r, tmpColor.g, tmpColor.b);
  });

  scene.add(nodeMeshes);

  // ── Edges ──
  buildEdges(edges);

  // ── Layer planes (subtle grids) ──
  for (let L = 0; L < 5; L++) {
    const planeGeo = new THREE.PlaneGeometry(LAYER_RADIUS[L] * 2.4, LAYER_RADIUS[L] * 2.4);
    const planeMat = new THREE.MeshBasicMaterial({
      color: LAYER_COLORS[L], transparent: true, opacity: 0.03, side: THREE.DoubleSide
    });
    const plane = new THREE.Mesh(planeGeo, planeMat);
    plane.rotation.x = -Math.PI / 2;
    plane.position.y = LAYER_Y[L];
    plane.userData = {layer: L};
    scene.add(plane);
  }

  // ── Layer labels ──
  const LAYER_LABELS = ['L0: Particles', 'L1-2: Atoms/Bonds', 'L3-5: Molecules', 'L6: Domains', 'L7+: Cosmic'];
  for (let L = 0; L < 5; L++) {
    const canvas = document.createElement('canvas');
    canvas.width = 1024; canvas.height = 512;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, 1024, 512);
    ctx.fillStyle = '#' + LAYER_COLORS[L].toString(16).padStart(6, '0');
    ctx.font = 'bold 80px sans-serif';
    ctx.textBaseline = 'middle';
    ctx.fillText(LAYER_LABELS[L], 40, 256);
    const tex = new THREE.CanvasTexture(canvas);
    const spriteMat = new THREE.SpriteMaterial({map: tex, transparent: true, opacity: 0.85, depthTest: false});
    const sprite = new THREE.Sprite(spriteMat);
    sprite.position.set(-LAYER_RADIUS[L] - 20, LAYER_Y[L] + 5, 0);
    sprite.scale.set(50, 25, 1);
    sprite.userData = {layer: L};
    scene.add(sprite);
  }
}

let crossEdgeLines = null;

function buildEdges(edges) {
  if (edgeLines) scene.remove(edgeLines);
  if (crossEdgeLines) scene.remove(crossEdgeLines);

  const samePos = [], sameCols = [];
  const crossPos = [], crossCols = [];
  const tmpColor = new THREE.Color();

  edges.forEach(e => {
    const src = nodeMap[e.source || e.from];
    const tgt = nodeMap[e.target || e.to];
    if (!src || !tgt) return;
    if (!layerVisible[src.layer] || !layerVisible[tgt.layer]) return;

    const isCross = src.layer !== tgt.layer;
    const pos = isCross ? crossPos : samePos;
    const cols = isCross ? crossCols : sameCols;

    pos.push(src._pos.x, src._pos.y, src._pos.z);
    pos.push(tgt._pos.x, tgt._pos.y, tgt._pos.z);

    const srcC = new THREE.Color(LAYER_COLORS[src.layer]);
    const tgtC = new THREE.Color(LAYER_COLORS[tgt.layer]);
    tmpColor.copy(srcC).lerp(tgtC, 0.5);
    if (isCross) tmpColor.lerp(new THREE.Color(0xffffff), 0.3); // brighten cross edges
    cols.push(tmpColor.r, tmpColor.g, tmpColor.b);
    cols.push(tmpColor.r, tmpColor.g, tmpColor.b);
  });

  // Same-layer edges — subtle
  if (samePos.length) {
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(samePos, 3));
    geo.setAttribute('color', new THREE.Float32BufferAttribute(sameCols, 3));
    const mat = new THREE.LineBasicMaterial({vertexColors: true, transparent: true, opacity: 0.08, depthWrite: false});
    edgeLines = new THREE.LineSegments(geo, mat);
    scene.add(edgeLines);
  }

  // Cross-layer edges — prominent
  if (crossPos.length) {
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(crossPos, 3));
    geo.setAttribute('color', new THREE.Float32BufferAttribute(crossCols, 3));
    const mat = new THREE.LineBasicMaterial({vertexColors: true, transparent: true, opacity: 0.35, depthWrite: false});
    crossEdgeLines = new THREE.LineSegments(geo, mat);
    scene.add(crossEdgeLines);
  }
}

// ── Visibility ──
function updateVisibility() {
  if (!mapData) return;
  const dummy = new THREE.Object3D();
  const searchTerm = document.getElementById('search').value.toLowerCase();

  mapData.nodes.forEach((n, i) => {
    const visible = layerVisible[n.layer] &&
      (!searchTerm || n.label.toLowerCase().includes(searchTerm) || (n.id && n.id.toLowerCase().includes(searchTerm)));

    dummy.position.copy(n._pos);
    // size by grade + type
    let s = 0.6;
    if (n.grade === 'EXACT') s = 1.0;
    else if (n.grade === 'CLOSE') s = 0.8;
    else if (n.grade === 'EMPIRICAL') s = 0.7;
    else if (n.grade === 'CONJECTURE') s = 0.5;
    if (n.type === 'convention') s *= 0.7;

    if (!visible) s = 0;
    else if (searchTerm && visible) s *= 2; // highlight matches

    dummy.scale.setScalar(s);
    dummy.updateMatrix();
    nodeMeshes.setMatrixAt(i, dummy.matrix);
  });
  nodeMeshes.instanceMatrix.needsUpdate = true;

  // Rebuild edges
  buildEdges(mapData.edges);
  updateStats();
}

function updateStats() {
  if (!mapData) return;
  const searchTerm = document.getElementById('search').value.toLowerCase();
  let vis = 0;
  mapData.nodes.forEach(n => {
    if (layerVisible[n.layer] && (!searchTerm || n.label.toLowerCase().includes(searchTerm) || n.id.toLowerCase().includes(searchTerm)))
      vis++;
  });
  document.getElementById('stats').textContent = `${vis}/${mapData.nodes.length} nodes`;
}

// ── Interaction ──
function onMouseMove(e) {
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
}

function onClick(e) {
  if (!mapData || !nodeMeshes) return;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObject(nodeMeshes);
  if (hits.length > 0) {
    const idx = hits[0].instanceId;
    const node = mapData.nodes[idx];
    showInfo(node);
  }
}

function showInfo(node) {
  selectedId = node.id;
  const panel = document.getElementById('info');
  document.getElementById('info-title').textContent = node.label;

  let html = `<span class="tag" style="background:${'#' + LAYER_COLORS[node.layer].toString(16).padStart(6,'0')}40;color:#${ LAYER_COLORS[node.layer].toString(16).padStart(6,'0')}">${node.type}</span>`;
  html += `<span class="tag" style="background:#333">Layer ${node.layer}</span>`;

  html += '<table>';
  if (node.level) html += `<tr><td>Level</td><td>${node.level}</td></tr>`;
  if (node.description) html += `<tr><td>Detail</td><td>${node.description}</td></tr>`;
  if (node.measured != null) html += `<tr><td>Measured</td><td>${node.measured}${node.unit ? ' ' + node.unit : ''}</td></tr>`;
  if (node.grade) html += `<tr><td>Grade</td><td>${node.grade}</td></tr>`;
  if (node.causal) html += `<tr><td>Causal</td><td>${node.causal}</td></tr>`;
  if (node.n6_expr) html += `<tr><td>n6 Expr</td><td>${node.n6_expr}</td></tr>`;
  if (node.thread) html += `<tr><td>Thread</td><td>${node.thread}</td></tr>`;
  if (node.bt_refs && node.bt_refs.length) html += `<tr><td>BT Refs</td><td>${node.bt_refs.join(', ')}</td></tr>`;
  html += '</table>';

  // Connected nodes — split real vs bridge
  const realConn = [];
  const bridgeConn = [];
  mapData.edges.forEach(e => {
    const eSrc = e.source || e.from;
    const eTgt = e.target || e.to;
    const isBridge = e.type === 'bridge';
    if (eSrc === node.id && nodeMap[eTgt]) (isBridge ? bridgeConn : realConn).push({id: eTgt, type: e.type, dir: '→'});
    if (eTgt === node.id && nodeMap[eSrc]) (isBridge ? bridgeConn : realConn).push({id: eSrc, type: e.type, dir: '←'});
  });
  const totalConn = realConn.length + bridgeConn.length;
  if (totalConn) {
    html += `<h3 style="margin-top:12px;font-size:13px;color:#888">연결: ${realConn.length} (실제) + ${bridgeConn.length} (브릿지)</h3><div style="max-height:180px;overflow-y:auto">`;
    const showList = realConn.concat(bridgeConn);
    showList.slice(0, 30).forEach(c => {
      const cn = nodeMap[c.id];
      html += `<div style="font-size:11px;padding:2px 0;color:#aaa">${c.dir} <span style="color:#${ LAYER_COLORS[cn.layer].toString(16).padStart(6,'0')}">${cn.label}</span> <span style="color:#555">(${c.type})</span></div>`;
    });
    if (showList.length > 30) html += `<div style="color:#555;font-size:11px">...+${showList.length - 30} more</div>`;
    html += '</div>';
  }

  document.getElementById('info-body').innerHTML = html;
  panel.style.display = 'block';

  // Highlight connected edges
  highlightNode(node);
}

function highlightNode(node) {
  if (!edgeLines) return;
  const posArr = edgeLines.geometry.attributes.position.array;
  const colArr = edgeLines.geometry.attributes.color.array;
  // Reset opacity
  edgeLines.material.opacity = 0.06;

  // Rebuild edges with highlight
  if (!mapData) return;
  const positions = [];
  const colors = [];
  const tmpColor = new THREE.Color();

  mapData.edges.forEach(e => {
    const src = nodeMap[e.source || e.from];
    const tgt = nodeMap[e.target || e.to];
    if (!src || !tgt) return;
    if (!layerVisible[src.layer] || !layerVisible[tgt.layer]) return;

    const eSrc = e.source || e.from;
    const eTgt = e.target || e.to;
    const isHighlight = (eSrc === node.id || eTgt === node.id);

    positions.push(src._pos.x, src._pos.y, src._pos.z);
    positions.push(tgt._pos.x, tgt._pos.y, tgt._pos.z);

    if (isHighlight) {
      tmpColor.setHex(0xffffff);
    } else {
      const srcC = new THREE.Color(LAYER_COLORS[src.layer]);
      const tgtC = new THREE.Color(LAYER_COLORS[tgt.layer]);
      tmpColor.copy(srcC).lerp(tgtC, 0.5);
    }
    colors.push(tmpColor.r, tmpColor.g, tmpColor.b);
    colors.push(tmpColor.r, tmpColor.g, tmpColor.b);
  });

  edgeLines.geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  edgeLines.geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
  edgeLines.material.opacity = 0.15;
}

// ── Event listeners ──
window.addEventListener('mousemove', onMouseMove);
window.addEventListener('click', onClick);
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

document.querySelectorAll('.layer-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const L = parseInt(btn.dataset.layer);
    layerVisible[L] = !layerVisible[L];
    btn.classList.toggle('active');
    updateVisibility();

    // Toggle layer planes and labels
    scene.children.forEach(c => {
      if (c.userData && c.userData.layer === L) c.visible = layerVisible[L];
    });
  });
});

document.getElementById('search').addEventListener('input', updateVisibility);
document.querySelector('#info .close').addEventListener('click', () => {
  document.getElementById('info').style.display = 'none';
  selectedId = null;
  if (mapData) buildEdges(mapData.edges);
});

// ── Animate ──
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

// ── Load ──
loadData();
</script>
</body>
</html>
