<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>n=6 Reality Map 3D</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#07071a;color:#e0e0e0;font-family:'Segoe UI',system-ui,sans-serif}
canvas{display:block}

/* HUD */
#hud{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;gap:12px;padding:8px 16px;background:rgba(7,7,26,.92);border-bottom:1px solid #223;z-index:10;font-size:13px}
#hud h1{font-size:15px;font-weight:600;white-space:nowrap;color:#8bf}
#search{flex:1;max-width:340px;padding:5px 10px;background:#111;border:1px solid #334;border-radius:4px;color:#eee;font-size:13px;outline:none}
#search:focus{border-color:#66f}
.layer-btn{padding:3px 10px;border:1px solid #334;border-radius:12px;background:transparent;color:#aaa;cursor:pointer;font-size:12px;transition:.2s}
.layer-btn.active{border-color:var(--lc);color:var(--lc);background:rgba(255,255,255,.06)}
.layer-btn:hover{background:rgba(255,255,255,.08)}
#stats{margin-left:auto;color:#666;font-size:11px;white-space:nowrap}

/* Info panel */
#info{position:fixed;right:16px;top:56px;width:320px;max-height:calc(100vh - 72px);overflow-y:auto;background:rgba(10,10,30,.94);border:1px solid #334;border-radius:8px;padding:16px;display:none;z-index:10;font-size:13px;line-height:1.6}
#info h2{font-size:15px;margin-bottom:8px;color:#adf}
#info .tag{display:inline-block;padding:1px 8px;border-radius:10px;font-size:11px;margin:2px}
#info .close{position:absolute;top:8px;right:12px;cursor:pointer;color:#666;font-size:18px}
#info .close:hover{color:#fff}
#info table{width:100%;border-collapse:collapse;margin-top:8px}
#info td{padding:2px 6px;border-bottom:1px solid #222}
#info td:first-child{color:#888;width:90px}

/* Legend */
#legend{position:fixed;left:16px;bottom:16px;background:rgba(10,10,30,.9);border:1px solid #334;border-radius:8px;padding:12px 16px;z-index:10;font-size:12px}
#legend div{display:flex;align-items:center;gap:8px;margin:3px 0}
#legend .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* Loading */
#loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#07071a;z-index:100;font-size:18px;color:#668}
</style>
</head>
<body>

<div id="loading">n=6 Reality Map Loading...</div>

<div id="hud">
  <h1>n=6 Reality Map</h1>
  <input id="search" type="text" placeholder="Search nodes...">
  <button class="layer-btn active" data-layer="0" style="--lc:#f66">L0 Particles</button>
  <button class="layer-btn active" data-layer="1" style="--lc:#fa4">L1-2 Atoms/Bonds</button>
  <button class="layer-btn active" data-layer="2" style="--lc:#4f8">L3-5 Molecules</button>
  <button class="layer-btn active" data-layer="3" style="--lc:#4bf">L6 Domains</button>
  <button class="layer-btn active" data-layer="4" style="--lc:#c6f">L7+ Cosmic</button>
  <span id="stats"></span>
</div>

<div id="info">
  <span class="close">&times;</span>
  <h2 id="info-title"></h2>
  <div id="info-body"></div>
</div>

<div id="legend">
  <div><span class="dot" style="background:#f66"></span> L0: Particles / Constants</div>
  <div><span class="dot" style="background:#fa4"></span> L1-2: Atoms / Bonds / Laws</div>
  <div><span class="dot" style="background:#4f8"></span> L3-5: Molecules / Genetics / Materials</div>
  <div><span class="dot" style="background:#4bf"></span> L6: Domain Applications</div>
  <div><span class="dot" style="background:#c6f"></span> L7+: Celestial / Cosmological</div>
</div>

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.175.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.175.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';

// ── Colors per layer ──
const LAYER_COLORS = [0xff6666, 0xffaa44, 0x44ff88, 0x44bbff, 0xcc66ff];
const LAYER_Y = [0, 30, 60, 90, 120];  // Y heights
const LAYER_RADIUS = [50, 70, 100, 180, 80]; // spread radius per layer (L3 large for ~4k domain nodes)

let mapData = null;
let nodeMap = {};        // id → {node, mesh_index, pos}
let layerVisible = [true, true, true, true, true];
let nodeMeshes = null;   // InstancedMesh
let edgeLines = null;
let hoveredIdx = -1;
let selectedId = null;

// ── Scene setup ──
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x07071a, 0.002);

const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.5, 1200);
camera.position.set(0, 100, 280);

const renderer = new THREE.WebGLRenderer({antialias: true, alpha: false});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x07071a);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 60, 0);
controls.maxDistance = 600;

// ── Lights ──
scene.add(new THREE.AmbientLight(0x334466, 1.2));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
dirLight.position.set(50, 120, 80);
scene.add(dirLight);

// ── Raycaster ──
const raycaster = new THREE.Raycaster();
raycaster.params.Points = {threshold: 1.5};
const mouse = new THREE.Vector2();

// ── Schema adapter: reality_map_live.json → mapData ──
function levelToLayer(level) {
  const m = level.match(/^L(-?\d+)/);
  if (!m) return 3;
  const n = parseInt(m[1]);
  if (n <= 0) return 0;   // L-2, L-1, L0 → particles/constants
  if (n <= 2) return 1;   // L1, L2 → atoms/bonds/laws
  if (n <= 5) return 2;   // L3~L5 → molecules/genetics/materials
  if (n <= 6) return 3;   // L6 → domain applications
  return 4;               // L7+ → celestial/galactic/cosmological
}

function adaptSchema(raw) {
  const nodeIds = new Set(raw.nodes.map(n => n.id));

  // Adapt nodes
  const nodes = raw.nodes.map(n => ({
    id:          n.id,
    label:       n.claim || n.id,
    layer:       levelToLayer(n.level || ''),
    type:        n.origin || 'natural',
    level:       n.level,
    description: n.detail || n.cause || '',
    grade:       n.grade,
    causal:      n.causal,
    measured:    n.measured,
    unit:        n.unit,
    thread:      n.thread,
    n6_expr:     n.n6_expr,
    bt_refs:     n.bt_refs
  }));

  // Build edges: explicit edges array + children/siblings
  const edgeSet = new Set();
  const edges = [];
  function addEdge(from, to, type) {
    const key = from + '>' + to;
    if (edgeSet.has(key)) return;
    if (!nodeIds.has(from) || !nodeIds.has(to)) return;
    edgeSet.add(key);
    edges.push({from, to, type});
  }

  // Explicit edges from the file
  if (raw.edges) {
    raw.edges.forEach(e => addEdge(e.from, e.to, e.relation || 'causal'));
  }

  // Implicit edges from children/siblings
  raw.nodes.forEach(n => {
    (n.children || []).forEach(c => addEdge(n.id, c, 'child'));
    (n.siblings || []).forEach(s => {
      // siblings are bidirectional; store one direction
      const key1 = n.id + '>' + s, key2 = s + '>' + n.id;
      if (!edgeSet.has(key1) && !edgeSet.has(key2)) addEdge(n.id, s, 'sibling');
    });
  });

  return {nodes, edges};
}

// ── Load data ──
async function loadData() {
  const resp = await fetch('reality_map_live.json');
  const raw = await resp.json();
  mapData = adaptSchema(raw);
  buildScene();
  document.getElementById('loading').style.display = 'none';
  updateStats();
}

function goldenAngle(i, total, radius) {
  const golden = Math.PI * (3 - Math.sqrt(5));
  const r = radius * Math.sqrt(i / total);
  const theta = golden * i;
  return [r * Math.cos(theta), r * Math.sin(theta)];
}

function buildScene() {
  const nodes = mapData.nodes;
  const edges = mapData.edges;

  // ── Assign positions ──
  const layerIndices = [0, 0, 0, 0, 0];
  const layerTotals = [0, 0, 0, 0, 0];
  nodes.forEach(n => layerTotals[n.layer]++);

  nodes.forEach((n, i) => {
    const L = n.layer;
    const li = layerIndices[L]++;
    const [x, z] = goldenAngle(li, layerTotals[L], LAYER_RADIUS[L]);
    const y = LAYER_Y[L] + (Math.random() - 0.5) * 6;
    n._pos = new THREE.Vector3(x, y, z);
    n._idx = i;
    nodeMap[n.id] = n;
  });

  // ── Instanced spheres ──
  const geo = new THREE.SphereGeometry(0.6, 8, 6);
  const mat = new THREE.MeshPhongMaterial({});
  nodeMeshes = new THREE.InstancedMesh(geo, mat, nodes.length);
  nodeMeshes.instanceMatrix.setUsage(THREE.DynamicDrawUsage);

  const colorAttr = new THREE.InstancedBufferAttribute(new Float32Array(nodes.length * 3), 3);
  nodeMeshes.instanceColor = colorAttr;

  const dummy = new THREE.Object3D();
  const tmpColor = new THREE.Color();

  nodes.forEach((n, i) => {
    dummy.position.copy(n._pos);
    // size by grade + type
    let s = 0.6;
    if (n.grade === 'EXACT') s = 1.0;
    else if (n.grade === 'CLOSE') s = 0.8;
    else if (n.grade === 'EMPIRICAL') s = 0.7;
    else if (n.grade === 'CONJECTURE') s = 0.5;
    if (n.type === 'convention') s *= 0.7;
    dummy.scale.setScalar(s);
    dummy.updateMatrix();
    nodeMeshes.setMatrixAt(i, dummy.matrix);

    tmpColor.setHex(LAYER_COLORS[n.layer]);
    colorAttr.setXYZ(i, tmpColor.r, tmpColor.g, tmpColor.b);
  });

  scene.add(nodeMeshes);

  // ── Edges ──
  buildEdges(edges);

  // ── Layer planes (subtle grids) ──
  for (let L = 0; L < 5; L++) {
    const planeGeo = new THREE.PlaneGeometry(LAYER_RADIUS[L] * 2.4, LAYER_RADIUS[L] * 2.4);
    const planeMat = new THREE.MeshBasicMaterial({
      color: LAYER_COLORS[L], transparent: true, opacity: 0.03, side: THREE.DoubleSide
    });
    const plane = new THREE.Mesh(planeGeo, planeMat);
    plane.rotation.x = -Math.PI / 2;
    plane.position.y = LAYER_Y[L];
    plane.userData = {layer: L};
    scene.add(plane);
  }

  // ── Layer labels ──
  const LAYER_LABELS = ['L0: Particles', 'L1-2: Atoms/Bonds', 'L3-5: Molecules', 'L6: Domains', 'L7+: Cosmic'];
  for (let L = 0; L < 5; L++) {
    const canvas = document.createElement('canvas');
    canvas.width = 1024; canvas.height = 512;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, 1024, 512);
    ctx.fillStyle = '#' + LAYER_COLORS[L].toString(16).padStart(6, '0');
    ctx.font = 'bold 80px sans-serif';
    ctx.textBaseline = 'middle';
    ctx.fillText(LAYER_LABELS[L], 40, 256);
    const tex = new THREE.CanvasTexture(canvas);
    const spriteMat = new THREE.SpriteMaterial({map: tex, transparent: true, opacity: 0.85, depthTest: false});
    const sprite = new THREE.Sprite(spriteMat);
    sprite.position.set(-LAYER_RADIUS[L] - 20, LAYER_Y[L] + 5, 0);
    sprite.scale.set(50, 25, 1);
    sprite.userData = {layer: L};
    scene.add(sprite);
  }
}

function buildEdges(edges) {
  if (edgeLines) scene.remove(edgeLines);

  const positions = [];
  const colors = [];
  const tmpColor = new THREE.Color();

  edges.forEach(e => {
    const src = nodeMap[e.source || e.from];
    const tgt = nodeMap[e.target || e.to];
    if (!src || !tgt) return;
    if (!layerVisible[src.layer] || !layerVisible[tgt.layer]) return;

    positions.push(src._pos.x, src._pos.y, src._pos.z);
    positions.push(tgt._pos.x, tgt._pos.y, tgt._pos.z);

    // edge color: blend of source/target layer
    const srcC = new THREE.Color(LAYER_COLORS[src.layer]);
    const tgtC = new THREE.Color(LAYER_COLORS[tgt.layer]);
    tmpColor.copy(srcC).lerp(tgtC, 0.5);
    colors.push(tmpColor.r, tmpColor.g, tmpColor.b);
    colors.push(tmpColor.r, tmpColor.g, tmpColor.b);
  });

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
  const mat = new THREE.LineBasicMaterial({vertexColors: true, transparent: true, opacity: 0.12, depthWrite: false});
  edgeLines = new THREE.LineSegments(geo, mat);
  scene.add(edgeLines);
}

// ── Visibility ──
function updateVisibility() {
  if (!mapData) return;
  const dummy = new THREE.Object3D();
  const searchTerm = document.getElementById('search').value.toLowerCase();

  mapData.nodes.forEach((n, i) => {
    const visible = layerVisible[n.layer] &&
      (!searchTerm || n.label.toLowerCase().includes(searchTerm) || (n.id && n.id.toLowerCase().includes(searchTerm)));

    dummy.position.copy(n._pos);
    // size by grade + type
    let s = 0.6;
    if (n.grade === 'EXACT') s = 1.0;
    else if (n.grade === 'CLOSE') s = 0.8;
    else if (n.grade === 'EMPIRICAL') s = 0.7;
    else if (n.grade === 'CONJECTURE') s = 0.5;
    if (n.type === 'convention') s *= 0.7;

    if (!visible) s = 0;
    else if (searchTerm && visible) s *= 2; // highlight matches

    dummy.scale.setScalar(s);
    dummy.updateMatrix();
    nodeMeshes.setMatrixAt(i, dummy.matrix);
  });
  nodeMeshes.instanceMatrix.needsUpdate = true;

  // Rebuild edges
  buildEdges(mapData.edges);
  updateStats();
}

function updateStats() {
  if (!mapData) return;
  const searchTerm = document.getElementById('search').value.toLowerCase();
  let vis = 0;
  mapData.nodes.forEach(n => {
    if (layerVisible[n.layer] && (!searchTerm || n.label.toLowerCase().includes(searchTerm) || n.id.toLowerCase().includes(searchTerm)))
      vis++;
  });
  document.getElementById('stats').textContent = `${vis}/${mapData.nodes.length} nodes`;
}

// ── Interaction ──
function onMouseMove(e) {
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
}

function onClick(e) {
  if (!mapData || !nodeMeshes) return;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObject(nodeMeshes);
  if (hits.length > 0) {
    const idx = hits[0].instanceId;
    const node = mapData.nodes[idx];
    showInfo(node);
  }
}

function showInfo(node) {
  selectedId = node.id;
  const panel = document.getElementById('info');
  document.getElementById('info-title').textContent = node.label;

  let html = `<span class="tag" style="background:${'#' + LAYER_COLORS[node.layer].toString(16).padStart(6,'0')}40;color:#${ LAYER_COLORS[node.layer].toString(16).padStart(6,'0')}">${node.type}</span>`;
  html += `<span class="tag" style="background:#333">Layer ${node.layer}</span>`;

  html += '<table>';
  if (node.level) html += `<tr><td>Level</td><td>${node.level}</td></tr>`;
  if (node.description) html += `<tr><td>Detail</td><td>${node.description}</td></tr>`;
  if (node.measured != null) html += `<tr><td>Measured</td><td>${node.measured}${node.unit ? ' ' + node.unit : ''}</td></tr>`;
  if (node.grade) html += `<tr><td>Grade</td><td>${node.grade}</td></tr>`;
  if (node.causal) html += `<tr><td>Causal</td><td>${node.causal}</td></tr>`;
  if (node.n6_expr) html += `<tr><td>n6 Expr</td><td>${node.n6_expr}</td></tr>`;
  if (node.thread) html += `<tr><td>Thread</td><td>${node.thread}</td></tr>`;
  if (node.bt_refs && node.bt_refs.length) html += `<tr><td>BT Refs</td><td>${node.bt_refs.join(', ')}</td></tr>`;
  html += '</table>';

  // Connected nodes
  const connected = [];
  mapData.edges.forEach(e => {
    const eSrc = e.source || e.from;
    const eTgt = e.target || e.to;
    if (eSrc === node.id && nodeMap[eTgt]) connected.push({id: eTgt, type: e.type, dir: '→'});
    if (eTgt === node.id && nodeMap[eSrc]) connected.push({id: eSrc, type: e.type, dir: '←'});
  });
  if (connected.length) {
    html += `<h3 style="margin-top:12px;font-size:13px;color:#888">Connections (${connected.length})</h3><div style="max-height:180px;overflow-y:auto">`;
    connected.slice(0, 30).forEach(c => {
      const cn = nodeMap[c.id];
      html += `<div style="font-size:11px;padding:2px 0;color:#aaa">${c.dir} <span style="color:#${ LAYER_COLORS[cn.layer].toString(16).padStart(6,'0')}">${cn.label}</span> <span style="color:#555">(${c.type})</span></div>`;
    });
    if (connected.length > 30) html += `<div style="color:#555;font-size:11px">...+${connected.length - 30} more</div>`;
    html += '</div>';
  }

  document.getElementById('info-body').innerHTML = html;
  panel.style.display = 'block';

  // Highlight connected edges
  highlightNode(node);
}

function highlightNode(node) {
  if (!edgeLines) return;
  const posArr = edgeLines.geometry.attributes.position.array;
  const colArr = edgeLines.geometry.attributes.color.array;
  // Reset opacity
  edgeLines.material.opacity = 0.06;

  // Rebuild edges with highlight
  if (!mapData) return;
  const positions = [];
  const colors = [];
  const tmpColor = new THREE.Color();

  mapData.edges.forEach(e => {
    const src = nodeMap[e.source || e.from];
    const tgt = nodeMap[e.target || e.to];
    if (!src || !tgt) return;
    if (!layerVisible[src.layer] || !layerVisible[tgt.layer]) return;

    const eSrc = e.source || e.from;
    const eTgt = e.target || e.to;
    const isHighlight = (eSrc === node.id || eTgt === node.id);

    positions.push(src._pos.x, src._pos.y, src._pos.z);
    positions.push(tgt._pos.x, tgt._pos.y, tgt._pos.z);

    if (isHighlight) {
      tmpColor.setHex(0xffffff);
    } else {
      const srcC = new THREE.Color(LAYER_COLORS[src.layer]);
      const tgtC = new THREE.Color(LAYER_COLORS[tgt.layer]);
      tmpColor.copy(srcC).lerp(tgtC, 0.5);
    }
    colors.push(tmpColor.r, tmpColor.g, tmpColor.b);
    colors.push(tmpColor.r, tmpColor.g, tmpColor.b);
  });

  edgeLines.geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  edgeLines.geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
  edgeLines.material.opacity = 0.15;
}

// ── Event listeners ──
window.addEventListener('mousemove', onMouseMove);
window.addEventListener('click', onClick);
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

document.querySelectorAll('.layer-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const L = parseInt(btn.dataset.layer);
    layerVisible[L] = !layerVisible[L];
    btn.classList.toggle('active');
    updateVisibility();

    // Toggle layer planes and labels
    scene.children.forEach(c => {
      if (c.userData && c.userData.layer === L) c.visible = layerVisible[L];
    });
  });
});

document.getElementById('search').addEventListener('input', updateVisibility);
document.querySelector('#info .close').addEventListener('click', () => {
  document.getElementById('info').style.display = 'none';
  selectedId = null;
  if (mapData) buildEdges(mapData.edges);
});

// ── Animate ──
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

// ── Load ──
loadData();
</script>
</body>
</html>
