name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'n6/atlas.n6'
      - '.github/workflows/pages.yml'
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Refresh atlas3d sidecars (manifest + coords + overlay + theorem + tail)
        run: |
          bin/atlas3d publish --no-commit
          bin/atlas3d snapshot
          bin/atlas3d overlay
          bin/atlas3d theorem
          bin/atlas3d tail || true
      - name: Resolve symlinks in docs (materialize atlas.n6 + prevent tar race)
        run: |
          # Replace any symlinks in docs/ with their current target contents so
          # upload-pages-artifact's tar step doesn't race against a mutating
          # symlink target (observed failure: "File removed before we read it").
          find docs -type l | while read link; do
            target=$(readlink -f "$link" || true)
            rm -f "$link"
            if [ -n "$target" ] && [ -e "$target" ]; then
              cp -a "$target" "$link" || true
            else
              touch "$link"
            fi
          done
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
