name: Hexa Syntax Check

on:
  push:
    branches: [main]
    paths: ['**/*.hexa']
  pull_request:
    branches: [main]
    paths: ['**/*.hexa']

jobs:
  hexa-syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Find hexa files
        run: |
          echo "::group::Hexa files"
          find . -name '*.hexa' -not -path './.git/*' | sort
          echo "::endgroup::"
          COUNT=$(find . -name '*.hexa' -not -path './.git/*' | wc -l)
          echo "Found $COUNT .hexa files"

      - name: Lint hexa syntax
        run: |
          ERRORS=0
          while IFS= read -r f; do
            # balanced braces
            OPEN=$(grep -o '{' "$f" | wc -l)
            CLOSE=$(grep -o '}' "$f" | wc -l)
            if [ "$OPEN" -ne "$CLOSE" ]; then
              echo "::error file=$f::Unbalanced braces: {=$OPEN }=$CLOSE"
              ERRORS=$((ERRORS + 1))
            fi
            # balanced parens
            OPEN=$(grep -o '(' "$f" | wc -l)
            CLOSE=$(grep -o ')' "$f" | wc -l)
            if [ "$OPEN" -ne "$CLOSE" ]; then
              echo "::error file=$f::Unbalanced parens: (=$OPEN )=$CLOSE"
              ERRORS=$((ERRORS + 1))
            fi
            # no python/js import statements (outside comments)
            if grep -nP '^\s*import\s' "$f" | grep -v '//' > /dev/null 2>&1; then
              echo "::error file=$f::Contains 'import' statement (unsupported in hexa)"
              ERRORS=$((ERRORS + 1))
            fi
            # no python def/class
            if grep -nP '^\s*(def|class)\s' "$f" | grep -v '//' > /dev/null 2>&1; then
              echo "::error file=$f::Contains Python syntax (def/class)"
              ERRORS=$((ERRORS + 1))
            fi
          done < <(find . -name '*.hexa' -not -path './.git/*')
          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::$ERRORS lint errors found"
            exit 1
          fi
          echo "All hexa files passed lint checks"
