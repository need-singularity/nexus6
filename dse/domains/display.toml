# =============================================================
# Compatibility Rules
# =============================================================

# Holographic displays require neural render or diffusion engine
[[rule]]
type       = "require"
if_level   = 5
if_id      = "LightField,Volumetric,Wavefront"
then_level = 3
then_ids   = "NeuralRender,DiffusionGen"

# ECoG/Retinal require advanced processor
[[rule]]
type       = "require"
if_level   = 6
if_id      = "ECoG-Visual,Retinal-Prosthesis"
then_level = 3
then_ids   = "NeuralRender,DiffusionGen"

# Cinema requires premium display material
[[rule]]
type       = "require"
if_level   = 4
if_id      = "Cinema"
then_level = 0
then_ids   = "MicroLED,QD-OLED,GaN"

# Synesthetic-6 requires neural interface
[[rule]]
type       = "require"
if_level   = 7
if_id      = "Synesthetic6"
then_level = 6
then_ids   = "EEG-Haptic,ECoG-Visual,Cochlear-N6,Retinal-Prosthesis"
