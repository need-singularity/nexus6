# ============================================================
# Scoring Rules
# ============================================================

[[rule]]
type = "bonus"
condition = "H-count in {3,6,9,10} = n/phi,n,sigma-n/phi,sigma-phi"
bonus = 0.10

[[rule]]
type = "bonus"
condition = "CN=6=n or CN=12=sigma (octahedral/fcc)"
bonus = 0.08

[[rule]]
type = "bonus"
condition = "Tc maps to n=6 expression (250,288,300)"
bonus = 0.10

[[rule]]
type = "penalty"
condition = "Pressure > 200 GPa (impractical for deployment)"
penalty = 0.15

[[rule]]
type = "bonus"
condition = "Ambient pressure operation"
bonus = 0.20
