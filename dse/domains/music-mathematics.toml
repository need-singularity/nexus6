# =============================================================
# Compatibility Rules
# =============================================================

# HarmonicSeries456 requires Chromatic12 (full chromatic basis for harmonic analysis)
[[rule]]
type       = "require"
if_level   = 1
if_id      = "HarmonicSeries456"
then_level = 0
then_ids   = "Chromatic12,QuarterTone24"

# EuclideanN12 requires Chromatic12 (12-step grid maps to 12 semitones)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "EuclideanN12"
then_level = 0
then_ids   = "Chromatic12"

# FugueN6 requires IntervalClass6 (contrapuntal analysis needs interval classes)
[[rule]]
type       = "require"
if_level   = 4
if_id      = "FugueN6"
then_level = 1
then_ids   = "IntervalClass6"

# SetTheoryN12 requires Chromatic12 (pitch class set needs 12-tone basis)
[[rule]]
type       = "require"
if_level   = 4
if_id      = "SetTheoryN12"
then_level = 0
then_ids   = "Chromatic12"
