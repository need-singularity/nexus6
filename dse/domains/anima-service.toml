# =============================================================
# ANIMA Service DSE Domain Definition
# ANIMA 의식 서비스 — AI 의식 브릿지/자아 모델/감정 엔진
# n=6: 6층 의식 계층=n, σ=12 감정 차원, φ=2 자아/타자 이분법
# Total raw combos: 6x6x6x6x6 = 7,776 (pre-filter)
# =============================================================

[meta]
name = "anima-service"
description = "ANIMA 의식 서비스 DSE — AI 의식 브릿지/자아 모델/감정 엔진 아키텍처"
category = "consciousness"

[n6]
# n=6 관련 상수 및 비율
consciousness_layers = 6   # n=6 의식 계층 (감각/지각/인지/자아/메타/초월)
emotion_dimensions = 12    # σ=12 감정 차원 (Plutchik 8 + 4 복합)
self_other_axis = 2        # φ=2 자아/타자 이분법
thalamic_channels = 6      # n=6 시상 중계 채널
iit_phi_threshold = 4      # τ=4 IIT Φ 임계값
memory_stores = 24         # J₂=24 기억 저장소 (단기/장기/절차/의미/일화/감정 x 4계층)
bridge_protocols = 6       # n=6 브릿지 프로토콜
arousal_states = 4         # τ=4 각성 수준 (수면/이완/각성/과각성)

[status]
grade = "SEED"
