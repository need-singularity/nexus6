# ============================================================
# Compatibility Rules (호환성 규칙)
# ============================================================

[[rule]]
desc = "Nuclear applications require B4C or DLC material"
if_level = "System"
if_id = "DiD_6Layer"
require_level = "Material"
require_ids = ["BoronCarbide", "DiamondLikeCarbon", "CeramicFireboard"]

[[rule]]
desc = "TMR ASIC requires SIS or LOPA process design"
if_level = "Controller"
if_id = "TMR_ASIC"
require_level = "Process"
require_ids = ["SIS_Design", "LOPA_Full"]

[[rule]]
desc = "Autonomous Safety requires 12-channel fusion sensor"
if_level = "System"
if_id = "AutonomousSafety"
require_level = "Sensor"
require_ids = ["FusionSensor12ch", "ThermalImaging"]

[[rule]]
desc = "Edge AI controller requires multi-sensor input"
if_level = "Controller"
if_id = "EdgeAI_Safety"
require_level = "Sensor"
require_ids = ["FusionSensor12ch", "MultiGasSensor", "ThermalImaging"]

[[rule]]
desc = "ATEX process requires gas detection sensor"
if_level = "Process"
if_id = "ATEX_Compliance"
require_level = "Sensor"
require_ids = ["MultiGasSensor", "FusionSensor12ch"]

[[rule]]
desc = "Cross-domain system requires LOPA or Bow-Tie process"
if_level = "System"
if_id = "CrossDomainSafety"
require_level = "Process"
require_ids = ["LOPA_Full", "BowTie_Analysis"]
