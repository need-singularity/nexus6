# N6 Safety DSE — Integrated Safety Architecture
# 5 Materials x 6 Process x 6 Sensor x 5 Controller x 6 System = 5,400 combos
# BT-43 (CN=6 cathode), BT-60 (DC power chain), BT-118~122 (environment)
# BT-123~127 (robotics safety), H-SF-01~30, H-SFX-01~20, H-SAFE-EX-01~10
# Core equation: (1/(sigma-phi))^n = 10^{-6} = universal safety target
# Constants: n=6, sigma=12, phi=2, tau=4, J2=24, sopfr=5, mu=1

[meta]
name = "safety"
desc = "Safety (Protection Material + Process + Sensor + Controller + System)"
version = "1.0"
levels = 5
total_hint = 5400

[scoring]
n6     = 0.30
perf   = 0.25
power  = 0.10
cost   = 0.15
safety = 0.20

