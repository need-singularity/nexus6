# =============================================================
# AI Efficiency DSE Domain Definition
# AI 연산 효율 — 모델 압축/희소성/양자화/가지치기
# n=6: φ=2 비트 양자화, τ=4 가지치기 전략, σ=12 어텐션 헤드
# Total raw combos: 6x6x6x6x6 = 7,776 (pre-filter)
# =============================================================

[meta]
name = "ai-efficiency"
description = "AI 연산 효율 DSE — 모델 압축/희소성/양자화/FLOPs 절감 아키텍처"
category = "ai"

[n6]
# n=6 관련 상수 및 비율
attention_heads = 12       # σ=12 어텐션 헤드 (멀티헤드)
expert_count = 6           # n=6 MoE 전문가 (Egyptian: 1/2+1/3+1/6=1)
pruning_strategies = 4     # τ=4 가지치기 전략
quantization_bits = 2      # φ=2 비트 극한 양자화
flops_reduction_pct = 71   # Cyclotomic 활성화 71% FLOPs 절감
mertens_dropout = 0.288    # p=1-6/π²=0.288 Mertens 드롭아웃
boltzmann_sparsity = 0.63  # 63% Boltzmann 게이트 희소성
bottleneck_ratio = 0.67    # φ/n=1/3 → 67% 파라미터 절감

[status]
grade = "SEED"
