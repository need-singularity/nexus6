# =============================================================
# Rules: n=6 consistency checks
# =============================================================

[[rule]]
type  = "n6_exact"
field = "fps_standard"
value = 60
expr  = "sigma * sopfr = 12 * 5 = 60"
desc  = "Standard frame rate = sigma * sopfr"

[[rule]]
type  = "n6_exact"
field = "fps_high"
value = 144
expr  = "sigma^2 = 12^2 = 144"
desc  = "High refresh rate = sigma squared"

[[rule]]
type  = "n6_exact"
field = "conn_per_domain"
value = 6
expr  = "n = 6"
desc  = "HTTP/1.1 max connections per domain"

[[rule]]
type  = "n6_exact"
field = "http_status_classes"
value = 5
expr  = "sopfr = 5"
desc  = "HTTP status code classes (1xx~5xx)"

[[rule]]
type  = "n6_exact"
field = "js_compilation_tiers"
value = 4
expr  = "tau = 4"
desc  = "V8/JSC compilation tiers"

[[rule]]
type  = "n6_exact"
field = "js_primitive_types"
value = 7
expr  = "sigma - sopfr = 7"
desc  = "ECMAScript primitive types"

[[rule]]
type  = "n6_exact"
field = "css_box_layers"
value = 4
expr  = "tau = 4"
desc  = "CSS box model layers (margin/border/padding/content)"

[[rule]]
type  = "n6_exact"
field = "process_types"
value = 6
expr  = "n = 6"
desc  = "Chrome process types (Browser/Renderer/GPU/Network/Plugin/Utility)"

[[rule]]
type  = "n6_exact"
field = "origin_components"
value = 3
expr  = "n/phi = 3"
desc  = "Same-Origin Policy components (scheme/host/port)"

[[rule]]
type  = "n6_exact"
field = "cookie_attributes"
value = 6
expr  = "n = 6"
desc  = "Cookie attributes (Domain/Path/Secure/HttpOnly/SameSite/Expires)"

[[rule]]
type  = "n6_exact"
field = "web_pillars"
value = 6
expr  = "n = 6"
desc  = "Web platform pillars (HTML/CSS/JS/DOM/WebGL/WASM)"

[[rule]]
type  = "n6_exact"
field = "worker_types"
value = 3
expr  = "n/phi = 3"
desc  = "Web Worker types (Dedicated/Shared/Service)"
