# =============================================================
# Compatibility Rules
# =============================================================

# FusionDrive only for Mars or Deep Explore (overkill for LEO)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "FusionDrive"
then_level = 4
then_ids   = "MarsColony,DeepExplore"

# SolarSail cannot reach deep space (insufficient photon pressure)
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "SolarSail"
then_level = 4
then_ids   = "DeepExplore"

# Deep exploration requires LaserComm or QuantumComm
[[rule]]
type       = "require"
if_level   = 4
if_id      = "DeepExplore"
then_level = 3
then_ids   = "LaserComm,QuantumComm"

# Inflatable structures not suitable for Mars surface (needs rigidity)
[[rule]]
type       = "exclude"
if_level   = 2
if_id      = "Inflatable"
then_level = 4
then_ids   = "MarsColony"

# LEO constellation needs relay or laser comm (not quantum yet)
[[rule]]
type       = "require"
if_level   = 4
if_id      = "LEO_Const"
then_level = 3
then_ids   = "LaserComm,Relay,DeepSpace"

# NuclearThermal requires radiation shielding (crewed missions)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "NuclearThermal"
then_level = 2
then_ids   = "RadShield,CarbonComp"
