[meta]
name = "cancer-therapy"
desc = "Ultimate Cancer Therapy DSE (n=6 모달리티, sigma=12 바이오마커, phi=2 면역관문)"
levels = ["진단", "표적치료", "면역치료", "병용전략", "모니터링"]
vision = "n=6 기반 항암 치료 아키텍처 — 면역관문 phi=2 이진 + sigma=12 바이오마커 + tau=4 치료단계"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

