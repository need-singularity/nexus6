# =============================================================
# Cancer Therapy DSE Domain Definition
# 항암치료 아키텍처 — n=6 치료 모달리티 + sigma=12 바이오마커 + phi=2 면역관문
# Based on: N6 항암 정합, immuno-oncology, precision medicine
# Total raw combos: 6x6x6x6x5 = 6,480 (pre-filter)
