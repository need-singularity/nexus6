# =============================================================
# Compatibility Rules
# =============================================================

# CheckpointPhi2 requires BiomarkerSigma12 (need PD-L1/TMB for patient selection)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "CheckpointPhi2"
then_level = 0
then_ids   = "BiomarkerSigma12,LiquidBiopsyN6"

# CAR_T_N6 requires ImagingN4 (need imaging for response assessment)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "CAR_T_N6"
then_level = 0
then_ids   = "ImagingN4"

# DualCheckpoint requires CheckpointPhi2 (dual needs checkpoint basis)
[[rule]]
type       = "require"
if_level   = 3
if_id      = "DualCheckpoint"
then_level = 2
then_ids   = "CheckpointPhi2"

# ctDNA_Monitor requires LiquidBiopsyN6 (ctDNA monitoring needs liquid biopsy)
[[rule]]
type       = "require"
if_level   = 4
if_id      = "ctDNA_Monitor"
then_level = 0
then_ids   = "LiquidBiopsyN6"
