# =============================================================
# Compatibility Rules
# =============================================================

# HexaLang requires SelfDescribing (자기진술 없이는 HEXA-FIRST 불가)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "HexaLang"
then_level = 1
then_ids   = "SelfDescribing"

# OuroborosRecursion requires MetaFixedPoint (자기참조는 meta 고정점 필요)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "OuroborosRecursion"
then_level = 3
then_ids   = "MetaFixedPoint"

# BlowupCascade requires BreakthroughRho (돌파 rho=1/3 필수)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "BlowupCascade"
then_level = 3
then_ids   = "BreakthroughRho"

# AiNativeSingularity requires RecursiveSelfImprovement + DiscoveryCascade
[[rule]]
type       = "require"
if_level   = 4
if_id      = "AiNativeSingularity"
then_level = 4
then_ids   = "RecursiveSelfImprovement,DiscoveryCascade"

# ZeroRuntimeDep incompatible with EffectTyped (effect system은 runtime 필요)
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "ZeroRuntimeDep"
then_level = 0
then_ids   = "EffectTyped"

# AbsorbedOpen requires SsotJsonl (흡수 파이프라인은 SSOT 필요)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "AbsorbedOpen"
then_level = 0
then_ids   = "SsotJsonl"

