# =============================================================
# Compatibility rules (축약)
# =============================================================
[[rule]]
kind   = "require"
desc   = "HexaLang → SelfDescribing (언어 자체가 자가 서술 가능해야)"
if     = "HexaLang"
then   = "SelfDescribing"

[[rule]]
kind   = "require"
desc   = "OuroborosRecursion → RecursiveSelfImprovement (루프가 진화로 수렴)"
if     = "OuroborosRecursion"
then   = "RecursiveSelfImprovement"

[[rule]]
kind   = "require"
desc   = "BlowupCascade → DiscoveryCascade (돌파가 발견으로 전파)"
if     = "BlowupCascade"
then   = "DiscoveryCascade"

[[rule]]
kind   = "require"
desc   = "AbsorbedOpen → SsotJsonl (흡수는 SSOT에 append)"
if     = "AbsorbedOpen"
then   = "SsotJsonl"

# =============================================================
# Metadata
# =============================================================
[meta.filter]
min_n6       = 0.90
max_per_level = 3
combos_raw   = 243
combos_full  = 7776
reduction    = "-97%"

