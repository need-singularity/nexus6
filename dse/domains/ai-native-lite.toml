# =============================================================
# AI-Native LITE DSE Domain Definition
# ai-native.toml 의 축소 버전 — OOM 방지 + depth 1 탐색용
#
# 선정: 각 레벨 상위 3 후보 (n6 = 1.00 만)
# Total raw combos: 3x3x3x3x3 = 243 (pre-filter)
# (ai-native.toml 의 7,776 대비 -97%)
#
# 사용: hexa blowup.hexa ai-native-lite 1 --no-graph
# =============================================================

[meta]
name = "ai-native-lite"
desc = "AI-Native LITE — ai-native.toml 축소판 (243 combos, 각 레벨 top3 n6=1.00)"
levels = ["Substrate", "Surface", "Loop", "Convergence", "Emergence"]
vision = "n=6 AI-native 골격만 — combo 폭발 없이 빠른 수렴 탐색"

[scoring]
n6    = 0.50
perf  = 0.20
power = 0.15
cost  = 0.15

