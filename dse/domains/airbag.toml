# =============================================================
# Airbag DSE Domain Definition
# 에어백 시스템 — 차량 안전 구속 장치 설계
# n=6: 6개 에어백 존=n, σ=12 ms 전개 시간, τ=4 센서 유형
# Total raw combos: 6x6x6x6x6 = 7,776 (pre-filter)
# =============================================================

[meta]
name = "airbag"
description = "에어백 DSE — 차량 안전 구속 장치 / 센서-점화-쿠션-제어 아키텍처"
category = "automotive-safety"

[n6]
# n=6 관련 상수 및 비율
airbag_zones = 6           # n=6 에어백 배치 존 (운전석/조수석/측면/커튼/무릎/후방)
deploy_time_ms = 12        # σ=12 ms 목표 전개 시간 (σ=2n)
sensor_types = 4           # τ=4 센서 유형 (가속도/압력/자이로/초음파)
inflator_chambers = 2      # φ=2 이중 챔버 인플레이터
vent_holes = 6             # n=6 배기 구멍 (압력 조절)
crash_modes = 24           # J₂=24 충돌 시나리오 (정면/측면/후방/전복 x 속도 x 각도)
fabric_layers = 4          # τ=4 쿠션 직물 레이어
pyrotechnic_charges = 6    # n=6 점화 장약

[status]
grade = "SEED"
