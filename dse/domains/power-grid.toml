# =============================================================
# Compatibility Rules
# =============================================================

# Fusion generation requires advanced conversion (24-pulse or VSC)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "Fusion"
then_level = 1
then_ids   = "TwentyFourPulse,VSC_MMC"

# HVDC 1100kV requires 12-pulse or 24-pulse conversion
[[rule]]
type       = "require"
if_level   = 2
if_id      = "HVDC_1100"
then_level = 1
then_ids   = "TwelvePulse,TwentyFourPulse"

# Superconducting cable only with DC chain or Microgrid (short runs)
[[rule]]
type       = "exclude"
if_level   = 2
if_id      = "Superconducting"
then_level = 4
then_ids   = "Residential"

# HVAC legacy incompatible with DC chain distribution
[[rule]]
type       = "exclude"
if_level   = 2
if_id      = "HVAC_765"
then_level = 3
then_ids   = "DC_Chain"

# Photonic DC consumption requires advanced distribution
[[rule]]
type       = "require"
if_level   = 4
if_id      = "Photonic_DC"
then_level = 3
then_ids   = "DC_Chain,Smart_Grid"

# Geothermal incompatible with HVDC 1100kV (too small capacity)
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "Geothermal"
then_level = 2
then_ids   = "HVDC_1100"
