# =============================================================
# HEXA Power Grid DSE Domain Definition
# 궁극의 전력망 — n=6 기반 발전→변환→송전→배전→소비
# BT-60 (DC power chain) + BT-62 (Grid frequency pair) +
# BT-68 (HVDC voltage ladder) + BT-74 (95/5 THD resonance)
# Total raw combos: 6x5x5x5x6 = 4,500 (pre-filter)
# =============================================================

[meta]
name = "power-grid"
desc = "Ultimate Power Grid DSE (BT-60/62/68/74)"
levels = ["Generation", "Conversion", "Transmission", "Distribution", "Consumption"]
vision = "n=6 pulse rectifiers to sigma/(sigma-phi)=1.2 PUE — unified grid"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

