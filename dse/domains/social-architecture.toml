# =============================================================
# Rules / Constraints
# =============================================================

[[rule]]
type = "n6_minimum"
threshold = 0.60
description = "각 후보 n6 점수 최소 0.60 이상"

[[rule]]
type = "resilience_minimum"
threshold = 0.50
description = "사회 시스템은 회복탄력성 0.50 이상 필수"

[[rule]]
type = "team_size_constraint"
description = "Level 2 팀 크기는 n=6 기반이어야 함 (6, 12, 24 = n, σ, J₂)"

[[rule]]
type = "governance_trias"
description = "Level 4 거버넌스는 최소 n/φ=3 분권 구조 포함"

[[rule]]
type = "dunbar_cap"
description = "단일 조직 유닛의 개인관계 상한 = σ²+n=150 (Level 3)"

[[rule]]
type = "christaller_hex"
description = "공간 배치는 정육각형(n=6) 최적화 적용 (Level 4)"
