# ============================================================
# Compatibility Rules
# ============================================================

# Optical process requires optical species (Sr/Yb)
[[rule]]
type = "require"
if_level = 1
if_id = "Optical-429THz"
then_level = 0
then_ids = ["Sr-87", "Yb-171"]

# Nuclear UV process requires Th-229
[[rule]]
type = "require"
if_level = 1
if_id = "Nuclear-UV"
then_level = 0
then_ids = ["Th-229"]

# Microwave process for Cs/Rb only
[[rule]]
type = "require"
if_level = 1
if_id = "Microwave-9GHz"
then_level = 0
then_ids = ["Cs-133", "Rb-87"]

# MEMS for Quartz only
[[rule]]
type = "require"
if_level = 1
if_id = "MEMS-32kHz"
then_level = 0
then_ids = ["Quartz-SiO2"]

# Optical lattice core requires optical species
[[rule]]
type = "require"
if_level = 2
if_id = "Optical-Lattice"
then_level = 0
then_ids = ["Sr-87", "Yb-171"]

# Ion trap core for Al+ or Yb
[[rule]]
type = "require"
if_level = 2
if_id = "Ion-Trap"
then_level = 0
then_ids = ["Yb-171"]

# Nuclear clock core requires Th-229
[[rule]]
type = "require"
if_level = 2
if_id = "Nuclear-Clock"
then_level = 0
then_ids = ["Th-229"]

# CSAC core for Cs/Rb
[[rule]]
type = "require"
if_level = 2
if_id = "CSAC"
then_level = 0
then_ids = ["Cs-133", "Rb-87"]

# H-Maser is standalone
[[rule]]
type = "require"
if_level = 2
if_id = "H-Maser"
then_level = 1
then_ids = ["Microwave-9GHz"]

# Quantum clock chip needs optical or ion trap core
[[rule]]
type = "require"
if_level = 3
if_id = "Quantum-Clock-Chip"
then_level = 2
then_ids = ["Ion-Trap", "Optical-Lattice"]

# CSAC chip pairs with CSAC core
[[rule]]
type = "require"
if_level = 3
if_id = "CSAC-Chip"
then_level = 2
then_ids = ["CSAC"]

# OCXO pairs with any microwave/MEMS process
[[rule]]
type = "require"
if_level = 3
if_id = "OCXO-6th"
then_level = 1
then_ids = ["Microwave-9GHz", "MEMS-32kHz"]

# Quantum sync requires quantum-level clocks
[[rule]]
type = "require"
if_level = 4
if_id = "Quantum-Sync"
then_level = 2
then_ids = ["Optical-Lattice", "Ion-Trap", "Nuclear-Clock"]
