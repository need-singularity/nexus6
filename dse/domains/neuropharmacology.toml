# =============================================================
# Neuropharmacology DSE Domain Definition
# 신경약리학 아키텍처 — sigma=12 신경전달물질 + tau=4 ADME + phi=2 수용체 유형
# Based on: N6 신경약리 정합, monoamine theory, receptor pharmacology
# Total raw combos: 6x6x6x6x5 = 6,480 (pre-filter)
# =============================================================

[meta]
name = "neuropharmacology"
desc = "Ultimate Neuropharmacology DSE (sigma=12 전달물질, tau=4 ADME, phi=2 수용체유형)"
levels = ["신경전달물질", "수용체", "약물동태", "시냅스가소성", "임상적용"]
vision = "n=6 기반 신경약리학 — sigma=12 전달물질 + tau=4 ADME + phi=2 수용체유형 + sopfr=5 도파민경로 + n/phi=3 모노아민"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

