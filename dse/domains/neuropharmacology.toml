# =============================================================
# Compatibility Rules
# =============================================================

# ADME_Tau4 requires MonoamineN3 or NTSigma12 (PK needs NT target)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "ADME_Tau4"
then_level = 0
then_ids   = "MonoamineN3,NTSigma12"

# PlasticityN6 requires GluReceptorN4 (plasticity needs glutamate receptors)
[[rule]]
type       = "require"
if_level   = 3
if_id      = "PlasticityN6"
then_level = 1
then_ids   = "GluReceptorN4"

# AntidepressantN6 requires MonoamineN3 (antidepressants target monoamines)
[[rule]]
type       = "require"
if_level   = 4
if_id      = "AntidepressantN6"
then_level = 0
then_ids   = "MonoamineN3"

# CYP450_N6 requires ADME_Tau4 (metabolism enzymes are part of ADME)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "CYP450_N6"
then_level = 2
then_ids   = "ADME_Tau4"
